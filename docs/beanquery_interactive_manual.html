t card   -30 USD  Expenses:Food               \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "dc7c6c956ac2538b0d09b22f92f5cfa5", "console": [], "id": "HnMC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us now use the \u003Ccode\u003Eother_accounts\u003C/code\u003E column to select all expenses, which were paid with the cash, rather then with the credit card.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c747129ae55689439054ea6e15613dd9", "console": [], "id": "wadT", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='wadT-0' random-id='f8ab33d8-2188-1b07-13c2-21190c7c3eb6'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position\u0026#92;nWHERE  account ~ \u0026#x27;^Expenses\u0026#x27; AND\u0026#x27;Assets:Cash\u0026#x27; IN other_accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Expenses, paid with cash\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "def700a3ed5ab76660d2c89ab76924dc", "console": [], "id": "VCRE", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account         narration       positio\n----------  -------------  ------------------  -------\n2023-01-02  Expenses:Food  Shopping with cash   10 USD\n2023-01-02  Expenses:Misc  Shopping with cash   10 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "b2365c9dc190d6d8a18dd0ca4e245fa5", "console": [], "id": "hgqU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.1.4. The \u201cbalance\u201d column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e98bc06e6c60ab4515cfcdb82a961b47", "console": [], "id": "PSUk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne common desired output is a journal of entries over time (also called a \u201cregister\u201d in Ledger).\nFor this type of report, it is convenient to also render a column of the cumulative balance of the selected postings rows. Access to the previous row is not a standard SQL feature, so we get a little creative and provide a special column called \u201cbalance\u201d which is automatically calculated based on the previous selected rows. This provides the ability to render typical account statements such as those mailed to you by a bank. Output might look like this:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d25fbd1e29d78896e495181af55a39d2", "console": [], "id": "mfOT", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='mfOT-0' random-id='4b0ed266-3acd-c61a-a8de-23bac881b2ee'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Bank-A\u0026#92;n2023-01-01 open Assets:Bank-B\u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -1000 USD\u0026#92;n  Assets:Bank-A    750 USD\u0026#92;n  Assets:Bank-B    250 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping using Bank-A\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    100 USD\u0026#92;n  Assets:Bank-A   -100 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Shopping using Bank-B\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    110 USD\u0026#92;n  Assets:Bank-B   -110 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Shopping using Bank-A again\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    120 USD\u0026#92;n  Assets:Bank-A   -120 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;balance\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "961a0829b8a2888d56e13b87adc4147a", "console": [], "id": "vGiW", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='vGiW-0' random-id='38fa51fc-eb01-e271-2393-9f31ec79d053'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b4658fb30c9384a8eff289c5f8947039", "console": [], "id": "SYQT", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-01  Assets:Bank-A  Salary                        750 USD   750 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD   650 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD   530 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "42c6de622c5092f1cf490138a32db274", "console": [], "id": "bMrW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that the beanquery starts counting balance from 0 and takes into account all postings, which pass through the filter. Therefore if the goal is to have a bank equivalent balance information, then one shall not put any filters, which would filter out any postings to the bank account account. E.g. if we put a filter to start later, then the result would be different.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAlso selecting more than 1 bank account would create a result, different from what you get from your bank statement:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a0b99c3df44c17d246d68f9e1ec9688c", "console": [], "id": "PSQn", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2147e6f303ee8cbb5b342f02abf185ef", "console": [], "id": "OfTS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "0bd1be882cfedabed8002734e18993f4", "console": [], "id": "lQxp", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='PSQn-0' random-id='0999aa0f-e597-e841-175e-2a6dc4325de3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; AND date \u0026gt; 2023-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance, starting later\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD  -100 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD  -220 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='OfTS-0' random-id='babd20d6-203a-49cf-8172-55967ff85142'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; OR account = \u0026#92;\u0026quot;Assets:Bank-B\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A, Bank-B balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position   balance \n----------  -------------  ---------------------------  --------  ---------\n2023-01-01  Assets:Bank-A  Salary                        750 USD    750 USD\n2023-01-01  Assets:Bank-B  Salary                        250 USD   1000 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD    900 USD\n2023-01-03  Assets:Bank-B  Shopping using Bank-B        -110 USD    790 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD    670 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "e1fa3f758a3752c4063ddcf75a37a1aa", "console": [], "id": "Plbk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E10.2. Transactions table\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "848f652981d12f7c7200027fcc8a08e9", "console": [], "id": "rSYo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.2.1. The `id` column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a7b96f6e6046f7c159e6efdfd5e23d0f", "console": [], "id": "HuZB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA special column exists that identifies each transaction uniquely: \u201cid\u201d. It is a unique hash automatically computed from the transaction and should be stable between runs.\nThis hash is derived from the contents of the transaction object itself (if you change something about the transaction, e.g. you edit the narration, the id will change).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: even though the \u003Ccode\u003Eid\u003C/code\u003E field logically belongs to the transaction, it is not available in the \u003Ccode\u003Etransactions\u003C/code\u003E table. The only way to find it is to look in postings via traditional query.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d34c907c57a51e09900c8600fdbc6f95", "console": [], "id": "WfYj", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='WfYj-0' random-id='8bce7d75-eb7e-7990-1003-004bcd3f028f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for to test id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "f18dee945e6316822c8af94f57969d49", "console": [], "id": "Ynfw", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='Ynfw-0' random-id='bedca56e-6f60-0d05-796d-0d39649fbd4d'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, id\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Show some columns including the id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "03a0c2084f6527f553470ff61fdd082e", "console": [], "id": "LqFA", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account     narration   position                 id               \n----------  -------------  ----------  --------  --------------------------------\n2023-01-01  Income:Salary  Salary      -100 USD  8c969675c23279856156d912149d33a8\n2023-01-01  Assets:Cash    Salary       100 USD  8c969675c23279856156d912149d33a8\n2023-01-02  Expenses:Food  Shopping 1    10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Assets:Cash    Shopping 1   -10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Expenses:Food  Shopping 2    20 USD  95808f6293b038c097ec1436b8527193\n2023-01-02  Assets:Cash    Shopping 2   -20 USD  95808f6293b038c097ec1436b8527193\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "f9a71e6bb027e1d2ea2cf2299b6ed02d", "console": [], "id": "uDnK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOnce the \u003Ccode\u003Eid\u003C/code\u003E field is known, one can use it also for the transaction - level filtering.  E.g. one can use the \u003Ccode\u003EPRINT\u003C/code\u003E query (discussed later) to print the specific entry. This can be useful during debugging.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "503b68c06d9189b9ad202058bb4dd0e4", "console": [], "id": "aWBL", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='aWBL-0' random-id='1d275212-9311-b5da-d7e2-95992eac6784'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT from id = \u0026#x27;5801fa0babefb50972631ce070888875\u0026#x27;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;PRINT specific entry by id\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "c8ad9277c2f1138dff67c5cba0b30ee8", "console": [], "id": "MIsd", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E\n2023-01-02 * \u0026quot;Shopping 1\u0026quot;\n  Expenses:Food   10 USD\n  Assets:Cash    -10 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "ac7fd32590d090bf6957d381b46b3925", "console": [], "id": "IrqS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E10.3. Preliminary conclusions on using the SELECT Query\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c155d8112639030ef9153b3531b3b924", "console": [], "id": "Lpqv", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EFrom everything mentioned above one can probably make the following practical conclusions on usage of the SELECT query in beancount.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Euse traditional form of the beanquery query on postings\u003C/li\u003E\n\u003Cli\u003Euse the #table form for all other tables\u003C/li\u003E\n\u003Cli\u003Eno particular need to use the \u003Cstrong\u003EFROM\u003C/strong\u003E - clause filtering in the SELECT query, as all the fields are also available for the \u003Cstrong\u003EWHERE\u003C/strong\u003E clause\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "96a09b5513133f81e59114e15c5eda25", "console": [], "id": "upgv", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E10.4. Statement operators (OPEN ON, CLOSE ON, CLEAR)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "deef850cd054e782d54d52e96c96310f", "console": [], "id": "WJUG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shell provides a few operators designed to facilitate the generation of balance sheets and income statements. The particular methodology used to define these operations should be described in detail in the \u003Ca href=\"https://docs.google.com/document/d/100tGcA4blh6KSXPRGCZpUlyxaRUwFHEvnz_k9DyZFn4/edit?usp=sharing\" rel=\"noopener noreferrer\" target=\"_blank\"\u003E\u201cintroduction to double-entry bookkeeping\u201d\u003C/a\u003E document that accompanies Beancount and is mostly located in the source code in the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize\u003C/a\u003E module.\nThese special operators are provided on the FROM clause that is made available on the various forms of query commands in the shell. These further transform the set of entries selected by the FROM expression at the transaction levels (not postings).\nPlease note that these are not from standard SQL; these are extensions provided by this shell language only.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor demonstrations let use use the following ledger (borrowed with some changes from the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize_test.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize_test\u003C/a\u003E)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c352c8da2d2339d810509bd51294d047", "console": [], "id": "pCao", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='pCao-0' random-id='a5c8d8a9-82f6-a87e-85aa-9f9aa730cc20'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ea31770aa929a60b2beb9040789acd57", "console": [], "id": "wEIy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.4.1. Opening a Period (OPEN ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d92b52aa88faa9c6d589716884e9544b", "console": [], "id": "wlyU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOpening an exercise period at a particular date replaces all entries before that date by summarization entries that book the expected balance against an Equity \u201copening balances\u201d account and implicitly clears the income and expenses to zero by transferring their balances to an Equity \u201cprevious earnings\u201d account (see beancount.ops.summarize.open() for implementation details)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "546657158cab5b13e3b34fc2304d9a92", "console": [], "id": "PieA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2011319e3cedbd5a9733b3827c7ed32b", "console": [], "id": "GrQN", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='PieA-0' random-id='55ee626a-9916-690b-1ad2-2de95138fe37'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM OPEN ON 2012-08-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how OPEN ON converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOn the left side you see the original ledger for reference and on the right side the ledger transformed by the OPEN ON statement\u003C/span\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='pCao-0' random-id='a5c8d8a9-82f6-a87e-85aa-9f9aa730cc20'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "4187297008fece96ea93324c9ebd5451", "console": [], "id": "Ilkb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts on the date before 2012-08-01  without and with OPEN ON 2012-08-01 clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "25c2ec94688850a32a4df00108141a91", "console": [], "id": "mySd", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1de01b3a001e93854fabc1365151e9b5", "console": [], "id": "vGkK", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "fdb70b22a5ba5f6032d11efe9c76393a", "console": [], "id": "zmIa", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ea16be637fb83ed6129236da81abedcf", "console": [], "id": "NOfw", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "344c066f0596dd958caa1e6917be38ee", "console": [], "id": "jXAc", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='mySd-0' random-id='fffdeb2f-c27d-c206-7bc3-6ca526fe0303'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;n\u0026#92;nWHERE \u0026#92;n   date \u0026lt; 2012-08-01\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Without OPEN ON\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E       account               acc_balance     \n----------------------  ---------------------\nAssets:CA:Checking       6000 CAD            \nAssets:US:Checking                   1400 USD\nExpenses:Shopping                     200 USD\nExpenses:Taxes                       3600 USD\nIncome:Salary                      -10000 USD\nLiabilities:CreditCard               -200 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='zmIa-0' random-id='99253366-818d-f40a-1ef6-f2552b48f77f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;nFROM OPEN ON 2012-08-01\u0026#92;nWHERE \u0026#92;n   date \u0026lt; 2012-08-01\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;With OPEN ON\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E          account                acc_balance     \n---------------------------  --------------------\nAssets:CA:Checking            6000 CAD           \nAssets:US:Checking                       1400 USD\nEquity:Conversions:Previous  -6000 CAD   5000 USD\nEquity:Earnings:Previous                -6200 USD\nEquity:Opening-Balances                          \nLiabilities:CreditCard                   -200 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "8fc48ceeb2fafb60d7b35696e101e5ba", "console": [], "id": "mSxP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne can see, that balances on Assets and Liabilities did not change, but Income and Expenses were summarized in to the Equity:Earnings:Previous\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "248c409e9c7bf42dcf2e196a47447242", "console": [], "id": "IZEX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.4.2. Closing a Period (CLOSE ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "67603d20c0ca94192359d274d2a0c558", "console": [], "id": "UFLA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EClosing an exercise period involves mainly truncating all entries that come after the given date and ensuring that currency conversions are correctly corrected for (see beancount.ops.summarize.close() for implementation details).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote that the closing date should be one day after the last transaction you would like to include (this is in line with the convention we use everywhere in Beancount whereby starting dates are inclusive and ending dates exclusive).\nThe closing date is optional. If the date is not specified, the date one day beyond the date of the last entry is used.\nClosing a period leaves the Income and Expenses accounts as they are, that is, their balances are not cleared to zero to Equity. This is because closing is also used to produce final balances for income statements. \u201cClearing\u201d, as described in the next section, is only needed for balance sheets.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c57ca7fa331d2e276b8248f335e64dd0", "console": [], "id": "RCUM", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "86a97061e997c681fc68481569c9501a", "console": [], "id": "ynmH", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='RCUM-0' random-id='a76e76a4-2eee-5938-756e-4994cd045e2f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM CLOSE ON 2013-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how CLOSE ON converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOn the left side you see the original ledger for reference and on the right side the ledger transformed by the CLOSE ON statement\u003C/span\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='pCao-0' random-id='a5c8d8a9-82f6-a87e-85aa-9f9aa730cc20'\u003E\u003Cmarimo-cod ded?\nWhy is it not possible to put this like this\u003C/span\u003E\n\u003Cdiv class=\"language-cbmbas codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"mf\"\u003E2012\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E12\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E31\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EC\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s\"\u003E\u0026quot;Conversion for (-8000 USD, 9750 CAD)\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E   \u003C/span\u003E\u003Cspan class=\"mf\"\u003E8000\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EUSD\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"err\"\u003E@@\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "bc338b179bfe46738345d187e75930f4", "console": [], "id": "eooq", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.4.3. Clearing Income \u0026 Expenses (CLEAR clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "17f060e06f10d086ddb3c170094bfa61", "console": [], "id": "ChmK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIn order to produce a balance sheet, we need to transfer final balances of the Income and Expenses to an Equity \u201ccurrent earnings\u201d account (sometimes called \u201cretained earnings\u201d or \u201cnet income\u201d; you can select the specific account name to use using options in the input file). The resulting balances of income statement accounts should be zero (see beancount.ops.summarize.clear() for implementation details).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3399baf8e6c755597a59c00189c2c184", "console": [], "id": "KdvC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "8f957af9932f68d364c8a10380edba9e", "console": [], "id": "vkvV", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='KdvC-0' random-id='7a54a5ef-b2b3-9c0e-12d9-54d327d99d4b'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM CLEAR\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how CLEAR converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOn the left side you see the original ledger for reference and on the right side the ledger transformed by the CLEAR statement\u003C/span\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='pCao-0' random-id='a5c8d8a9-82f6-a87e-85aa-9f9aa730cc20'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E2011-01-01 open Income:Salary\n2011-01-01 open Expenses:Taxes\n2011-01-01 open Expenses:Shopping\n2011-01-01 open Liabilities:CreditCard\n2011-01-01 open Assets:US:Checking\n2011-01-01 open Assets:CA:Checking\n\n2011-03-01 * \u0026quot;Some income and expense to be summarized\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\n2012-03-02 * \u0026quot;Some expenses and liabilities to be summarized\u0026quot;\n  Liabilities:CreditCard  -200 USD\n  Expenses:Shopping        200 USD\n\n2012-03-03 * \u0026quot;Some conversion to be summarized\u0026quot;\n  Assets:US:Checking  -5000 USD @ 1.2 CAD\n  Assets:CA:Checking   6000 CAD\n\n2012-08-01 * \u0026quot;Some income and expense to show\u0026quot;\n  Income:Salary       -11000 USD\n  Expenses:Taxes        3200 USD\n  Assets:US:Checking    7800 USD\n\n2012-08-02 * \u0026quot;Some other conversion to be summarized\u0026quot;\n  Assets:US:Checking  -3000 USD @ 1.25 CAD\n  Assets:CA:Checking   3750 CAD\n\n2013-02-01 * \u0026quot;Some income and expense to be truncated\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Expenses:Shopping\u0026#x27; (Transfer balance)\u0026quot;\n  Expenses:Shopping        -200 USD\n  Equity:Earnings:Current   200 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Expenses:Taxes\u0026#x27; (Transfer balance)\u0026quot;\n  Expenses:Taxes           -10400 USD\n  Equity:Earnings:Current   10400 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Income:Salary\u0026#x27; (Transfer balance)\u0026quot;\n  Income:Salary             31000 USD\n  Equity:Earnings:Current  -31000 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "58cc6d2993ab3087384c440d33bb821d", "console": [], "id": "EKSN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts without and with CLEAR clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4689f02b4a4d4639b12abbb3b0d33f52", "console": [], "id": "tasN", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "16efabb81655b2060ac771053a218811", "console": [], "id": "SXvM", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "35916c7eefd77076017d80773d0178c4", "console": [], "id": "CFll", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='tasN-0' random-id='4d6f01a0-0ce3-1553-64f8-277cb717bb3e'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Without CLEAR\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E       account               acc_balance     \n----------------------  ---------------------\nAssets:CA:Checking       9750 CAD            \nAssets:US:Checking                  12600 USD\nExpenses:Shopping                     200 USD\nExpenses:Taxes                      10400 USD\nIncome:Salary                      -31000 USD\nLiabilities:CreditCard               -200 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='SXvM-0' random-id='e41f176d-f2e7-e598-3b81-f6bc521ac78c'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;nFROM CLEAR\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u00 ta for an income statement for year 2012, you could issue the following statement:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "cdeffe3f059054dee3749085838ab5f0", "console": [], "id": "bHhy", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='bHhy-0' random-id='f3838972-c237-4ba3-b366-a158d86c7c64'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, sum(position) \u0026#92;nFROM OPEN ON 2012-01-01 CLOSE ON 2013-01-01\u0026#92;nWHERE account ~ \u0026#92;\u0026quot;Income|Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1\u0026#92;nORDER BY 1\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Income statement example using OPEN ON and CLOSE ON\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "388c89bffef6c7fe7c498ff34d0dc93e", "console": [], "id": "ctlq", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E     account       sum(positi\n-----------------  ----------\nExpenses:Shopping     200 USD\nExpenses:Taxes       3200 USD\nIncome:Salary      -11000 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "c4b416c3c1c9bbdc89c27adae255c8d6", "console": [], "id": "NtNR", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe same can be achieved by using more traditional WHERE filtering:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7c1c4cc79f2481ec780154e541e1d8c5", "console": [], "id": "nebC", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='nebC-0' random-id='d1db9d3e-644c-a675-f3f1-64e69bfceafa'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, sum(position) \u0026#92;nWHERE \u0026#92;n     date \u0026gt;= 2012-01-01 and date \u0026lt; 2013-01-01\u0026#92;n     AND account ~ \u0026#92;\u0026quot;Income|Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1\u0026#92;nORDER BY 1\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Income statement example using WHERE filter\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "388c89bffef6c7fe7c498ff34d0dc93e", "console": [], "id": "ZsHO", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E     account       sum(positi\n-----------------  ----------\nExpenses:Shopping     200 USD\nExpenses:Taxes       3200 USD\nIncome:Salary      -11000 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "ebec5ac0613338d51739650c174ba08e", "console": [], "id": "HNXk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo generate a balance sheet, you would add the CLEAR option and select the other accounts:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "65e6f53cb875e375f1855f92604ed976", "console": [], "id": "bhgI", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='bhgI-0' random-id='1f3f39cd-d417-31a0-af12-cb38947f609c'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, sum(position) \u0026#92;nFROM OPEN ON 2012-01-01 CLOSE ON 2013-01-01 CLEAR\u0026#92;nWHERE not account ~ \u0026#92;\u0026quot;Income|Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1\u0026#92;nORDER BY 1;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Balance sheet example using OPEN ON, CLOSE ON, CLEAR\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "afb287395434b21ab1e290e786aa6b94", "console": [], "id": "DlKN", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E         account               sum(position)    \n--------------------------  --------------------\nAssets:CA:Checking           9750 CAD           \nAssets:US:Checking                      6200 USD\nEquity:Conversions:Current  -9750 CAD   8000 USD\nEquity:Earnings:Current                -7600 USD\nEquity:Earnings:Previous               -6400 USD\nEquity:Opening-Balances                         \nLiabilities:CreditCard                  -200 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "2730d2e5671f4922af6396b56b31a82f", "console": [], "id": "iFMf", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E11. High-level shortcuts (JOURNAL, BALANCE, PRINT)\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "86da3589a041190ebd44337d58c1e5ea", "console": [], "id": "QYfb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThere are two types of queries that are very common for accounting applications: journals and balances reports. While we have explicit implementations of such reports that can be produced using the bean-report tool, we are also able to synthesize good approximations of such reports using SELECT statements. This section describes a few additional selection commands that translate directly into SELECT statements and which are then run with the same query code. These are intended as convenient shortcuts.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "813c85afffe559a4d43006aae9156335", "console": [], "id": "qJXu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E11.1. Selecting Journals (JOURNAL query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5d0302f1d98706d337d72018fe20e588", "console": [], "id": "LdJG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"test\"\u003ETest\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e181efcf155eef21719f37511de1f32f", "console": [], "id": "fOSF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "854189ecfa459726958701c709516222", "console": [], "id": "gZOs", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='gZOs-0' random-id='c930d2b3-22c0-4af4-c7f9-5353398fd483'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2012-01-01 open Assets:Cash\u0026#92;n2012-01-01 open Expenses:Food\u0026#92;n\u0026#92;n2012-01-01 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2012-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;
