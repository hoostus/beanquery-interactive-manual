      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

"code": "", "code_hash": "4242159ff64703256459810a10befe72", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "wtAr", "name": "_"}, {"code": "", "code_hash": "8543c784a82690914e2ba13b4e2e2313", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "SQfX", "name": "_"}], "metadata": {"marimo_version": "0.22.0"}, "version": "1"},
            "session": {"cells": [{"code_hash": "4b61833de086cb8adb359ea534634913", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1\u003EInteractive beanquery manual\u003C/h1\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "07e1151242c0c44660b1739d81165465", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c9b0b6eb3c9e3800534831cafa258ed0", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "259bf39da3aadddf67aad2cda771c86b", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E1. Introduction to this document\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8c1ce796e5eade2317b8e49b55bc0bb9", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E1.1. Purpose and scope\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e6f8726f6c85aa7cdeb4d1e549f2c7b9", "console": [], "id": "PKri", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis is an interactive manual/tutorial for the \u003Ca href=\"https://github.com/beancount/beanquery\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebeanquery\u003C/a\u003E - a customizable and extensible lightweight SQL query tool for the \u003Ca href=\"https://github.com/beancount/beancount/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EBeancount\u003C/a\u003E ledger data.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe goal is for this document to be a follow up of the beancount v2 \u003Ca href=\"https://docs.google.com/document/d/1s0GOZMcrKKCLlP29MD7kHO4L88evrwWdIO0p4EwRBE0/edit?usp=sharing\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EBeancount Query Language\u003C/a\u003E document.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt is created with the following features in mind:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eto cover latest features of the beanquery\u003C/li\u003E\n\u003Cli\u003Eto include a lot of actual examples on actual ledgers\u003C/li\u003E\n\u003Cli\u003Eto be self-documenting for the query outputs (query outputs are computed with actual beanquery as a part of the notebook execution)\u003C/li\u003E\n\u003Cli\u003Eto be interactive. If it is run as a marimo notebook, then a reader can experiment by changing default ledgers and/or queries to get an updated query outputs.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "98a36b8bd96ef99fdac945458e67413b", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E1.2. How to use this manual\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d7b7e557afccd9a508adfc6157325b1b", "console": [], "id": "SFPL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe document assumes no prior knowledge of the SQL language and is structured as much as possible in a form of the tutorial, where the next chapters are based on the material, covered in the previous ones. As a downside the material is more scattered across the document, then this otherwise could be the case.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor someone already familiar with the SQL it may make sense to search for special notes, which highlight differences to the classical SQL, wherever applicable, rathe then to read the entire document:\u003C/span\u003E\n\u003Cdiv class=\"admonition attention\"\u003E\n\u003Cp class=\"admonition-title\"\u003EDifference to SQL!\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ESome difference is explained here\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EYou can read the manual as a normal text document.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe cool feature of this notebook though is that if you read the document as a marimo notebook, you can interact with the document by changing a default text both for ledger and query in all the examples. As soon an input widget will lose focus, a query will be re-executed and output will be updated.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote, that throughout the document some unresolved questions, marked with double questions marks.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.: ?? Why do we need this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAs well as some TODOs, marked with #TODO.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.: \u003Cem\u003E#TODO: we need to investigate this\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c92f602a62530a1d113121853e732df7", "console": [], "id": "BYtC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E2. Introduction to beanquery\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e66ab3cccc7ccb6aff8eab0fabca38f0", "console": [], "id": "RGSE", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBeanquery parses a Beancount ledger and creates an in-memory database represented in a form of several tables. Beanquery then exposes a command-line tool that acts like a client to that in-memory database in which you can type queries in a variant of SQL.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EBeanquery started as an experiment in beancount v2, but in v3 (when \u003Cstrong\u003Ebean-report\u003C/strong\u003E and \u003Cstrong\u003Ebean-web\u003C/strong\u003E have been discontinued) became practically the only tool to query information out of beancount ledger. Thus one can say, that in v3 beancount has moved towards the \u003Ca href=\"https://www.techtarget.com/searchbusinessanalytics/definition/self-service-business-intelligence-BI\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ESelf-service business intelligence\u003C/a\u003E model instead of providing off the shelf ready to use reports.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo one might ask: Why create another SQL client? Why not output the data to an SQLite database and allow the user to use that SQL client? Apparently this experiment was conducted by creating the \u003Ca href=\"https://github.com/beancount/beancount/blob/v2/beancount/scripts/sql.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebean-sql\u003C/a\u003E. It appears, that writing queries was painful and carrying out operations on lots that are held at cost was difficult.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ETherefore the beanquery has some extrax, that are essential to be able to use it to query a Beancount ledger. These extras include (but are not necessarily limited to) the following:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EIt allows to easily filter at two levels simultaneously: You can filter whole transactions, which has the benefit of respecting the accounting equation, and then, usually for presentation purposes, you can also filter at the postings level.\u003C/li\u003E\n\u003Cli\u003EObjects in one table, already have reference to related object in another table. E.g. records in the postings table have areference to related object from the transactions table. So one can say, that these tables have already been pre-joined (even though technically this not correct)\u003C/li\u003E\n\u003Cli\u003EThe client supports the semantics of inventory booking implemented in Beancount. It also supports aggregation functions on inventory objects and rendering functions (e.g., COST() to render the cost of an inventory instead of its contents).\u003C/li\u003E\n\u003Cli\u003EThe client supports some functions, which run on postings, but in a background access other tables (e.g. CONVERT() function, which formally operates on the amount, position or inventory, but in a background uses the prices table as well).\u003C/li\u003E\n\u003Cli\u003EThe client allows you to flatten multiple lots into separate postings to produce lists of holdings each with their associated cost basis.  \u003Cem\u003E\u003Cstrong\u003E??\u003C/strong\u003E Need to put some examples here\u003C/em\u003E\u003C/li\u003E\n\u003Cli\u003ETransactions can be summarized in a manner useful to produce balance sheets and income statements. For example, our SQL variant explicitly supports a \u201cclose\u201d operation with an effect similar to closing the year, which inserts transactions to clear income statement accounts to equity and removes past history.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6a5ec4c7c794d956f8897f53af020bdb", "console": [], "id": "Kclp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E3. How to install beanquery\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f8bb4edc18e17d11d682d7b63c08e4dd", "console": [], "id": "emfo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003Epip install beanquery\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2c318eec5a6460ed533ef12e2a18ccd3", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E4. How to run beanquery CLI\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "09bab577dc125452f7b6048c0df6f886", "console": [], "id": "nWHF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo run beanquery type\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EOPTIONS\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EFILENAME\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EQUERY\u003Cspan class=\"o\"\u003E]\u003C/span\u003E...\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EResult:\u003C/strong\u003E beanquery will load ledger and start the beanquery client\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003Ee.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebean-query\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etest.bean\nInput\u003Cspan class=\"w\"\u003E \u003C/span\u003Efile:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Beancount\u0026quot;\u003C/span\u003E\nReady\u003Cspan class=\"w\"\u003E \u003C/span\u003Ewith\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E3\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Edirectives\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"m\"\u003E2\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Ein\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E1\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions,\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E0\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Evalidation\u003Cspan class=\"w\"\u003E \u003C/span\u003Eerrors\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EYou can also start beanquery as a python module\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Epython\u003Cspan class=\"w\"\u003E \u003C/span\u003E-m\u003Cspan class=\"w\"\u003E \u003C/span\u003Ebeanquery\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EOPTIONS\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EFILENAME\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EQUERY\u003Cspan class=\"o\"\u003E]\u003C/span\u003E...\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "82b9c15837f0504fa2c109e60fb32b92", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E5. How to get help\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9f46e1022ef72c3719b3a43abcca9d59", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo get a help from the built in system, type \u003Ccode\u003E.help\u003C/code\u003E when in the beanquery client\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.help\n\nShell\u003Cspan class=\"w\"\u003E \u003C/span\u003Eutility\u003Cspan class=\"w\"\u003E \u003C/span\u003Ecommands\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Etype\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u0026lt;topic\u0026gt;\u003Cspan class=\"o\"\u003E)\u003C/span\u003E:\n\u003Cspan class=\"o\"\u003E===========================================\u003C/span\u003E\nEOF\u003Cspan class=\"w\"\u003E    \u003C/span\u003Edescribe\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Eexit\u003C/span\u003E\u003Cspan class=\"w\"\u003E     \u003C/span\u003Eformat\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehistory\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eparse\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ereload\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\nclear\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eerrors\u003Cspan class=\"w\"\u003E    \u003C/span\u003Eexplain\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E    \u003C/span\u003Eoutput\u003Cspan class=\"w\"\u003E   \u003C/span\u003Equit\u003Cspan class=\"w\"\u003E   \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E     \u003C/span\u003Etables\n\nBeancount\u003Cspan class=\"w\"\u003E \u003C/span\u003Equery\u003Cspan class=\"w\"\u003E \u003C/span\u003Ecommands:\n\u003Cspan class=\"o\"\u003E=========================\u003C/span\u003E\nbalances\u003Cspan class=\"w\"\u003E  \u003C/span\u003Efrom\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ejournal\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eprint\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"k\"\u003Eselect\u003C/span\u003E\u003Cspan class=\"w\"\u003E 03Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nTo see the list of columns in the \u003Cstrong\u003Etransactions\u003C/strong\u003E table type:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Emeta\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Emetadata\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Edate\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Edate\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eflag\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Epayee\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Enarration\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etags\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Elinks\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "98d067edf3385d85c282ad7942414cea", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E6. Available tables. Introduction\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c6c411e0a46bf5e6672d5433279bd8f2", "console": [], "id": "qnkX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe beanquery list of tables which beanquery exposes to the user can be derived by issuing the \u003Ccode\u003E.tables\u003C/code\u003E command.\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.tables\naccounts\nbalances\ncommodities\ndocuments\nentries\nevents\nnotes\npostings\nprices\ntransactions\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EList of fields in every table can be obtained using the \u003Ccode\u003E.describe \u0026lt;table_name\u0026gt;\u003C/code\u003E command\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ffc7a5ca0d3756f0bac3b0d3aaceca48", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E7. Types of queries\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9c8f743f45a77521de29b6a83a4acfb4", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBeanquery supports the following type of queries, further discussed in this document\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ESELECT\u003C/li\u003E\n\u003Cli\u003EBALANCES\u003C/li\u003E\n\u003Cli\u003EJOURNAL\u003C/li\u003E\n\u003Cli\u003EPRINT\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "76ba9d543fb1b08f945acf69fbe1f8d8", "console": [], "id": "DnEU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E8. SELECT Query\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "18b8dcff859a84893051c99f7c37db4c", "console": [], "id": "ulZA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe beanquery SELECT query loosely follows the standard SQL query with some deviations, which will be discussed throughout this manual\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt has to be noted, that originally \u003Cstrong\u003Ebeanquery\u003C/strong\u003E was designed to be used to extract information on postings table only. In this situation the \u003Cstrong\u003EFROM\u003C/strong\u003E part of the SQL query was \"hijacked\" to be used for transaction-level filtering and \u003Cstrong\u003EWHERE\u003C/strong\u003E was used for posting-level filtering, which introduced so-called  two-level filtering syntax\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, the SELECT query structure looked like this (written in the the informal EBNF language):\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT [DISTINCT] [\u0026lt;targets\u0026gt;|*]\n[FROM \u0026lt;entry-filter-logical-expression\u0026gt; [OPEN ON \u0026lt;date\u0026gt;] [CLOSE [ON \u0026lt;date\u0026gt;]] [CLEAR]]\n[WHERE \u0026lt;posting-filter-logical-expression\u0026gt;]\n[GROUP BY \u0026lt;groups\u0026gt;]\n[ORDER BY \u0026lt;groups\u0026gt; [ASC|DESC]]\n[LIMIT num]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us call is the \u003Cstrong\u003Etraditional SELECT query form\u003C/strong\u003E.\u003C/span\u003E\n\u003Cdetails class=\"info\"\u003E\n\u003Csummary\u003E\u003Cstrong\u003ENote about the informal EBNF language\u003C/strong\u003E\u003C/summary\u003E\n\u003Cspan class=\"paragraph\"\u003EIn this manual, queries are described using a simplified notation that shows the structure of a command.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notation is based on an \u003Cstrong\u003Einformal version of Extended Backus\u2013Naur Form (EBNF)\u003C/strong\u003E, but you do not need to know anything about EBNF to use it. It is designed to be easy to read and understand.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EHere is how to interpret it:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EWords written in \u003Cstrong\u003EUPPERCASE\u003C/strong\u003E are keywords that must be typed exactly as shown\u003C/li\u003E\n\u003Cli\u003EItems in \u003Cstrong\u003Esquare brackets \u003Ccode\u003E[ ... ]\u003C/code\u003E\u003C/strong\u003E are optional\u003C/li\u003E\n\u003Cli\u003EThe symbol \u003Ccode\u003E|\u003C/code\u003E means \u201cor\u201d (choose one of the alternatives)\u003C/li\u003E\n\u003Cli\u003EText inside \u003Cstrong\u003Eangle brackets \u003Ccode\u003E\u0026lt;...\u0026gt;\u003C/code\u003E\u003C/strong\u003E is a placeholder \u2014 you replace it with your own value\u003C/li\u003E\n\u003Cli\u003EItems written next to each other should be written in that order\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EExample:\u003C/strong\u003E\u003C/span\u003E\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"k\"\u003EDISTINCT\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026lt;\u003C/span\u003E\u003Cspan class=\"n\"\u003Etargets\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E|\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026lt;\u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThis means:\u003C/span\u003E\n\u003Cdiv class=\"language-mysql highlight\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EStart\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Ewith\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`SELECT`\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EOptionally\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eadd\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`DISTINCT`\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EEither\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eprovide\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eone\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emore\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etargets\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ewhat\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eyou\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ewant\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eselect\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eput\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Easterisks\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EThen\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eoptionally\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eput\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`FROM`\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Efollowed\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eby\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Esome\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpressions\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eare\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ediscussed\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Elater\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EIn simple terms:\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThink of this syntax as a \u003Cstrong\u003Etemplate\u003C/strong\u003E for writing queries:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt shows what parts are required, what parts are optional, and where you need to insert your own values.\u003C/span\u003E\n\u003C/details\u003E\n\u003Cspan class=\"paragraph\"\u003ELater on, in beancount v3, when the beanquery was moved to be a standalone tool, it was extended to query more tables (see above), in this situation the FROM part was needed again to select a table, so the new form of the SELECT query was introduced\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT [DISTINCT] [\u0026lt;targets\u0026gt;|*]\n[FROM #\u0026lt;table-name\u0026gt;]\n[WHERE \u0026lt;posting-filter-logical-expression\u0026gt;]\n[GROUP BY \u0026lt;groups\u0026gt;]\n[ORDER BY \u0026lt;groups\u0026gt; [ASC|DESC]]\n[LIMIT num]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nLet us call it the \u003Cstrong\u003E#table\u003C/strong\u003E query form.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote, that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EThe \u003Cstrong\u003E#table\u003C/strong\u003E form is activated by adding the # symbol in front of the table name\u003C/li\u003E\n\u003Cli\u003EThe \u003Cstrong\u003E#table\u003C/strong\u003E form allows to query tables, different from postings table, but in case it is used to query postings table (which is possible), it lacks some functionality, available in the traditional form, namely the \u003Ccode\u003E[OPEN ON \u0026lt;date\u0026gt;] [CLOSE [ON \u0026lt;date\u0026gt;]] [CLEAR]\u003C/code\u003E part. (This may actually be a \u003Ca href=\"https://github.com/beancount/beanquery/issues/274\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebug\u003C/a\u003E, rather then a feature).\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cdiv class=\"admonition attention\"\u003E\n\u003Cp class=\"admonition-title\"\u003EDifference to SQL!\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, let emphasize\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EIn the traditional BQL the FROM clause is used to describe the posting-level filter, not describe the source of the data\u003C/li\u003E\n\u003Cli\u003EIn the \u003Cstrong\u003E#table\u003C/strong\u003E syntax the table name has to be preceded by the # symbol\u003C/li\u003E\n\u003Cli\u003EIn the BQL using a wildcard as the target list (\u201c*\u201d) selects a good default list of columns, whilst the normal SQL the * is used to describe the complete set of columns, available in the table\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EAt the moment beanquery supports both query types. Let us explore this on a simple ledger\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fc7efc9e591207b58f660a55b1024144", "console": [], "id": "ecfG", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ecfG-0' random-id='2d018796-78f5-94ba-e906-64eb22db34a1'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for SELECT query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "3af374bb9c0a5832c2acc104f1e2ac08", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us create a query which shows postings to the account \u003Ccode\u003EExpenses:Food\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f78c0df3a0d711e77bc6f57dd5d111d3", "console": [], "id": "ZBYS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "20ae4cc5b1af0c3b685e4ea1980dfd83", "console": [], "id": "aLJB", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "09390aac08cdbe76a6103dfd265d2165", "console": [], "id": "nHfw", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='ZBYS-0' random-id='4f42a52c-e61e-4b52-7001-6d8a06bd6a32'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT *\u0026#92;nWHERE account = \u0026#92;\u0026quot;Expenses:Food\u0026#92;\u0026quot;\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Traditional query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     f  p  narration   positio\n----------  -  -  ----------  -------\n2023-01-02  *     Shopping 1   20 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='aLJB-0' random-id='6c396c2b-35eb-7c3d-89e5-28f8103bf709'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT *\u0026#92;nFROM #postings\u0026#92;nWHERE account = \u0026#92;\u0026quot;Expenses:Food\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The same query, but using the #table syntax\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     f  p  narration   positio\n----------  -  -  ----------  -------\n2023-01-02  *     Shopping 1   20 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "e589c94bb8d3d456b4cb7e2e4ca24594", "console": [], "id": "xXTn", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that here we use the wildcard symbol (*) to list some columns, instead of specifying column names manually.\u003C/span\u003E\n\u003Cdiv class=\"admonition attention\"\u003E\n\u003Cp class=\"admonition-title\"\u003EDifference to SQL!\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EIn the BQL using a wildcard as the target list (\u201c*\u201d) selects a good default list of columns, whilst the normal SQL the * is used to describe the complete set of columns, available in the table\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a26d4e58981794d9f6634d206accd3c8", "console": [], "id": "AjVT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us query the \u003Cstrong\u003Eaccounts\u003C/strong\u003E table\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "98f5870a107ea16265a9040177126e93", "console": [], "id": "pHFh", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='pHFh-0' random-id='30372ba6-3148-80d4-c7d5-224656545b52'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, open.date, close.date\u0026#92;nFROM #accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;# table syntax query on accounts (only #table style can be used for the accounts table)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ffbefcb10ae8f0abf8c74c3610f13fa7", "console": [], "id": "NCOB", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   account     open.date   c\n-------------  ----------  -\nIncome:Salary  2023-01-01   \nAssets:Cash    2023-01-01   \nExpenses:Food  2023-01-01   \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "e23a066fea1eedc9d3d8b26dec52cdcf", "console": [], "id": "aqbW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E9. Expressions\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9143b6eba8417fc15cf41c86fad7adbe", "console": [], "id": "TRpd", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWhen we talked about SQL query we mentioned, but not defined the notion of an expression. Let us correct this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAn \u003Cstrong\u003Eexpression\u003C/strong\u003E is something, which can be evaluated to a value.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EA \u003Cstrong\u003Elogical expression\u003C/strong\u003E is an expression, which can be evaluated to a  logical value (\u003Ccode\u003ETRUE\u003C/code\u003E or \u003Ccode\u003EFALSE\u003C/code\u003E)\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn beanquery an expression is constructed by combining \u003Cstrong\u003Etable columns\u003C/strong\u003E, \u003Cstrong\u003Econstants\u003C/strong\u003E, \u003Cstrong\u003Eoperators\u003C/strong\u003E, and \u003Cstrong\u003Efunctions\u003C/strong\u003E.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "db8f24b39d3ebaca02ce94aa9c0b3598", "console": [], "id": "TXez", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E9.1. Operators\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "264984cd6aba81e7c498cddffb90e0c2", "console": [], "id": "dNNg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ECommon comparison and logical operators are provided to operate on the available data columns:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E= (equality), != (inequality)\u003C/li\u003E\n\u003Cli\u003E\u0026lt; (less than), \u0026lt;= (less than or equal)\u003C/li\u003E\n\u003Cli\u003E\u0026gt; (greater than), \u0026gt;= (greater than or equal)\u003C/li\u003E\n\u003Cli\u003EAND (logical conjunction)\u003C/li\u003E\n\u003Cli\u003EOR (logical disjunction)\u003C/li\u003E\n\u003Cli\u003ENOT (logical negation)\u003C/li\u003E\n\u003Cli\u003EIN (set membership)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBinquery  also provides a regular expression search operator into a string object:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E~ (search regexp)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe below example demonstrates few of these operators\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "09ad2614e4f8164ae77f7ad046b0551b", "console": [], "id": "yCnT", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='yCnT-0' random-id='c1b9ce28-e74c-0210-98ef-acba430df2f3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;John\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot; #trip-berlin\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-02-03 * \u0026#92;\u0026quot;Richard\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot; #trip-london\u0026#92;n  Expenses:Misc   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger to demonstrate operators\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "e8e5db5d4323a6380a5d511f6b867d84", "console": [], "id": "wlCL", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='wlCL-0' random-id='0353bd85-3a54-623a-fb8a-dbfc028a6327'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n     date, account, payee,narration, position\u0026#92;nWHERE \u0026#92;n      account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;n      AND \u0026#92;\u0026quot;trip-london\u0026#92;\u0026quot; IN tags\u0026#92;n      AND NOT payee = \u0026#92;\u0026quot;John\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Operators demo query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9bb5edf2b9d6e1f2a363668aa21bc37d", "console": [], "id": "kqZH", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account      payee   narration   positio\n----------  -------------  -------  ----------  -------\n2023-02-03  Expenses:Misc  Richard  Shopping 2   20 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "4307ea36312a5e6b2be3f79b0886d94f", "console": [], "id": "wAgl", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E9.2. Constants\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "59dbb1223f9b4098bc5e2f2a9c6333b1", "console": [], "id": "rEll", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe following types of constants can be entered in the beanquery expression\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EString: \u003Ccode\u003E\"I am a string\"\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EDate:  Dates are entered in \u003Ccode\u003EYYYY-MM-DD format: SELECT * WHERE date \u0026lt; 2024-05-20..\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EInteger: \u003Ccode\u003E1\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EBoolean: \u003Ccode\u003ETRUE, FALSE\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ENumber:  \u003Ccode\u003E1.2\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ENull object: \u003Ccode\u003ENULL\u003C/code\u003E       ?? How can we use this NULL in practice?\u003C/li\u003E\n\u003Cli\u003E?? can we enter a set of strings constant in an expression?\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9952dfbdeec9b8ba95b7df04946d5c83", "console": [], "id": "dGlV", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='dGlV-0' random-id='5310460a-ff77-eddd-9648-9a702d4c5108'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for constants\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "f3f7889aa12aff036badc4714951718d", "console": [], "id": "SdmI", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='SdmI-0' random-id='71ae1685-abcd-29d0-7428-3eddb62805e8'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n   \u0026#92;\u0026quot;I am a string\u0026#92;\u0026quot; as string_const, \u0026#92;n    2026-10-10 as date_const, \u0026#92;n    10 as int_const,  \u0026#92;n    NULL as null_const, \u0026#92;n    3.14 as number_const, \u0026#92;n    TRUE as bool_const\u0026#92;nFROM #transactions\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Query has no practical sense, but it demonstrates how to enter constants in beanquery\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "3e93b569f7ef662965927a9f268ecd4c", "console": [], "id": "lgWD", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E string_const  date_const  in  n  numb  bool\n-------------  ----------  --  -  ----  ----\nI am a string  2026-10-10  10     3.14  TRUE\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "16f02a271c2c2b132ce5779a617f2035", "console": [], "id": "yOPj", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E9.3. Columns and Functions in expressions\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "823374b404270c0f54fc556409494a8e", "console": [], "id": "fwwy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA full list of columns and functions, available to be used to construct expressions are available via the \u003Ccode\u003E.help XXX\u003C/code\u003E command:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003ESELECT\u003C/code\u003E clause expressions type \u003Ccode\u003E.help targets\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003EFROM\u003C/code\u003E clause expressions type \u003Ccode\u003E.help FROM\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003EWHERE\u003C/code\u003E clause expressions type \u003Ccode\u003E.help WHERE\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EExample (reduced):\u003C/span\u003E\n\u003Cdiv class=\"language-carbon codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nx\"\u003Ebeanquery\u003C/span\u003E\u003Cspan class=\"p\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"nx\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Efrom\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EA\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Elogical\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ethat\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Econsist\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecolumns\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eon\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirectives\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Emostly\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eand\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Esimple\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Efunctions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EColumns\u003C/span\u003E\n\u003Cspan class=\"o\"\u003E-------\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Eid\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003EUnique\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eid\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirective\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003EThe\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ethe\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirective\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EFunctions\u003C/span\u003E\n\u003Cspan class=\"o\"\u003E---------\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Eabs\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Edecimal\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eposition\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eposition\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003ECoerce\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ean\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eparticular\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecurrency\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003ECoerce\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ean\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eparticular\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecurrency\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ENote, that the list of table columns (in this example the list of table columns in the transactions table), available via the \u003Ccode\u003E.help from\u003C/code\u003E command is broader, then the list of columns available for the same table via the \u003Ccode\u003E.describe \u0026lt;table-name\u0026gt;\u003C/code\u003E.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g. in this case the \u003Ccode\u003E.describe transactions\u003C/code\u003E does not list the \u003Ccode\u003Eid\u003C/code\u003E and some other columns, otherwise available for the \u003Ccode\u003EFROM ...\u003C/code\u003E clause\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt; .describe transactions\ntable transactions:\n  meta (metadata)\n  date (date)\n  flag (str)\n  payee (str)\n  narration (str)\n  tags (set)\n  links (set)\n  accounts (set[str])\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: investigate this and raise an issue, if applicable\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4dd5a1b14d7e6ba97ce23c3567ae75eb", "console": [], "id": "LJZf", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2\u003E10. More on tables\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "21e106a0d1d20230d67ad4f32ef5722a", "console": [], "id": "urSm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section contains some additional information on some of the tables, available in beanquery.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e7d933aa47d574122258bc45986dc1ad", "console": [], "id": "jxvo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3\u003E10.1. The postings table\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c9f2b439a43fd7a70f45c1704a5b7160", "console": [], "id": "mWxS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EAs it was already mentioned, the beanquery was originally created to work with the postings table only, therefore the postings table has some notable and sometimes unexpected features\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d8d9d838bbc11f3b1910556839b272d3", "console": [], "id": "CcZR", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.1.1. Transactions columns in the postings table\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "61082876f85bbc98ffa857fb845b6ecf", "console": [], "id": "YWSi", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe relation between transactions and postings can be explained by the following simplified diagram:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "830b06e1757c4065578efcd2d494ebf1", "console": [], "id": "zlud", "outputs": [{"data": {"text/html": "\u003Cimg src='data:image/png; r simplicity) all of the transaction-level fields are also made avaiable in the posting objects (the only exeption being the transaction meta, which is not available from the posting). One can check this by comparing the outputs of the \u003Cstrong\u003E\u003Ccode\u003E.describe postings\u003C/code\u003E\u003C/strong\u003E and \u003Cstrong\u003E\u003Ccode\u003E.describe transactions\u003C/code\u003E\u003C/strong\u003E commands.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, from the beanquery data model the diagram looks more like this\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "cecbff2da3fc8af2291a9bbcb83857fa", "console": [], "id": "xvXZ", "outputs": [{"data": {"text/html": "\u003Cimg src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAuIAAACPCAYAAAC/Fr6SAAA5vElEQVR4Xu2dB5gVRbq/SyRIECQJKAgGVFRMGDGhGDEh5qwoKqIgZkVFERUzBgyYURExYM4K5hx2Tburq+i6Oee99/7/t2+91dShT9WZPmdmziHM/N7n+T0zXV0dTndV19dVX31tjBBCCCGEEEIIIYQQQgghhBCiHrRs2foH+yeRpErVvUev/xghhBBCCNFoko+//7skVSzKTFiIhBBCCCFE/YkMLUnKE2UmLERCCCGEEKL+RIaWJOWJMhMWIiGEEEIIUX8iQ0uS8kSZCQuREEIIIYSoP5GhJUl5osyEhUgIIYQQQtSfyNCSpDxRZsJCJIQQQggh6k9kaElSnigzYSESQgghhBD1JzK0JClPlJmwEAkhhBBCiPoTGVqSlCfKTFiIhBBCCCFE/YkMLUnKE2UmLERCCCGEEKL+RIZWtTR91tPJCePPrUjv/fyP0fZNUR9++5ei5ZPPujCZMu3uKN+SLMpMWIiEEEIIIUT9iQytamnUuLO80VZWb375m2j7pqYrbp6RDNl596K0du3bJzvsumeUd0nWgnsmhBBCCCEaSWRoVUuvffZD8vRbnxd0z5yXnRGHMZpNRx9997do+6am1dcckKy34aCiNPWICyGEEEI0XyJDq1Z69p0vnRG32/ADonXNQaUM8aVR3MOwEAkhhBBCiPoTGVq1Up4h/s7PfpdssuU2yVW33JfsfcBhSYflOyaDttg6ef3zX7r1U268K9l08LZJl67dk2Vbtkz6rb5mcugxY4pcWi69/g6X58UPvkp2H3GQy7t8x07JNjvskjz80ntFx5vx2CvJ4CE7ueO079AhWXeDQcmES6dG53XlLfcmm201JOnabcWkxbLLuuMedPQJyRtf/KooH73/x5x0ul3f351f39XWSI4ff47zfUf8trbt2tljLe/+x02F7bbafmfnwhOe27ZDd006rdDZ5d9o0y2Tq269vygPvejsh9+6x76HuN/Kb2F/s194J/od1RT3MCxEQgghhBCi/kSGVq2UZ4hjULMOQxfjGSPT9x6fet4lbt3W1qDGWD73kmudcR3ua+zZFyXLLLOM28fAjTd1hvCIQ45yBnS3FXsmb//0ty7fk6//OGmzXNtkwMCNknMmX5NMuOw6Z2yzv9MnTins76xJV7m0Lbcd6o7JsXGrIW3osL2Lzn2NtdZJWrZs5Yz0i66+xZ0 level filtering\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     f  p  narration   positio\n----------  -  -  ----------  -------\n2023-01-01  *     Shopping 1   10 USD\n2023-01-01  *     Shopping 1  -10 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "4e2feca76d0c8bef4d6993b75d580c66", "console": [], "id": "IpqN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWe can see, that we can use the field \u003Ccode\u003Edate\u003C/code\u003E both withing the FROM clause (transaction-level filter) as well as with the clause WHERE (postings-level filter)  .This is despite the fact, that logically speaking the \u003Ccode\u003Edate\u003C/code\u003E column shall be a transaction - level field only\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EConclusion:\u003C/strong\u003E at the moment there seems to be \u003Ca href=\"https://groups.google.com/g/beancount/c/HVK3_6p1FjM\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Elittle reason\u003C/a\u003E to use the FROM clause transaction level-filtering in the SELECT query, as everything can be done in the WHERE part\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c2a1bf88159c93b24f8791c57c4a71ae", "console": [], "id": "dxZZ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.1.2. The `entry` column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8be6a4c468323df701a3369d81592c1c", "console": [], "id": "dlnW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESuppose we would need to join postings with related transactions (e.g. to access posting meta field)\nIn a traditional SQL environment we would probably have to do something like this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Emeta\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EJOIN\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"k\"\u003EON\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etransaction_id\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eid\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nBeanquery however does not support \u003Ca href=\"https://groups.google.com/g/beancount/c/O0x0eZEp-Lk/m/WFnOS_flEQAJ\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Eyet\u003C/a\u003E table joining, from the other side postings table returns records that include a reference to the transaction that contains them, so they are kind of pre-joint already (this is in addition to the fact that transactions columns are also available in the postings table).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EOne can check this by issuing the \u003Ccode\u003E.describe postings\u003C/code\u003E command:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E....\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eentry\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Etransaction\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u0026lt;\u003Cspan class=\"o\"\u003E==\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethis\u003Cspan class=\"w\"\u003E \u003C/span\u003Eis\u003Cspan class=\"w\"\u003E \u003C/span\u003Ea\u003Cspan class=\"w\"\u003E \u003C/span\u003Ereference\u003Cspan class=\"w\"\u003E \u003C/span\u003Eto\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransaction\u003Cspan class=\"w\"\u003E \u003C/span\u003Efrom\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Eposting\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nLet us see, how we can do this my pulling both transaction meta and postings meta:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8feb8b2cb009b579ef4242386793df6d", "console": [], "id": "TTti", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='TTti-0' random-id='2e4ee96e-ab49-11e2-4adf-fdd8b133743d'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Cash USD\u0026#92;n2023-01-01 open Expenses:Food USD\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_meta\u0026#92;\u0026quot;     ; \u0026lt;= transaction-level meta\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting1\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting2\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta again\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_meta\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9ee927d14d1d2c0bc97fe174f54bdcea", "console": [], "id": "RKFZ", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='RKFZ-0' random-id='13b4f98a-c951-b87c-b59a-77c1d2d38546'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  date, narration, account, \u0026#92;n  meta[\u0026#x27;my_meta\u0026#x27;] as posting_meta, \u0026#92;n  entry.meta[\u0026#x27;my_meta\u0026#x27;] as trans_meta\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Pulling both transaction-level and posting-level meta together\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b2ac01a197a566e5b9a78756cda5eb88", "console": [], "id": "IaQp", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date     narration      account     posting_meta  trans_me\n----------  ----------  -------------  ------------  --------\n2023-01-01  Shopping 1  Expenses:Food  tr1_posting1  tr1_meta\n2023-01-01  Shopping 1  Assets:Cash    tr1_posting2  tr1_meta\n2023-01-02  Shopping 2  Expenses:Food  tr2_posting1  tr2_meta\n2023-01-02  Shopping 2  Assets:Cash    tr2_posting1  tr2_meta\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "ca6782775551d82741ade51c4813eed0", "console": [], "id": "IWgg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4\u003E10.1.3. The `other_accounts` column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ea7212310ca5e9f12bed49369b81dbe9", "console": [], "id": "fCoF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eother_accounts\u003C/code\u003E column is another notable column in the postings table. It contains the set of accounts from other postings in the same transaction.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "74fb5c32bd81b77ebe6769caeb39d19f", "console": [], "id": "LkGn", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='LkGn-0' random-id='5a5466d8-de44-1f5f-adc9-45d410cc2ec3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Liabilities:CreditCard\u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with cash\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Expenses:Misc   10 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with credit card\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food             30 USD\u0026#92;n  Liabilities:CreditCard   -30 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;other_accounts\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-e
