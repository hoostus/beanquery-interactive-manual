      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "63a250319d4538b0b1d8c359921024da", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ca href=\"https://github.com/Ev2geny/beanquery_interactive_manual\" target=\"_blank\"\u003E\n  \u003Cimg src=\"https://img.shields.io/badge/GitHub-Ev2geny%2Fbeanquery__interactive__manual-blue?logo=github\" alt=\"GitHub repository\"/\u003E\n\u003C/a\u003E\u003C/span\u003E\n\u003Ch1 id=\"interactive-beanquery-manual\"\u003EInteractive beanquery manual\u003C/h1\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1bd956582d81a7c369b65a1a5f995e6f", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003EVersion: 0.1.2\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4d740be46609ee79ee4e667c14b300e3", "console": [], "id": "vblA", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6bc419e84de49a98ec69812eda9b60ed", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"1-introduction-to-this-document\"\u003E1 Introduction to this document\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "316b3470287f34fa2127b8bb6c8fb167", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"11-purpose-and-scope\"\u003E1.1 Purpose and scope\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6b08932e9d697f81683c9a23d3f92813", "console": [], "id": "PKri", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis is an interactive manual and tutorial for \u003Ca href=\"https://github.com/beancount/beanquery\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebeanquery\u003C/a\u003E \u2014 a customizable, extensible, lightweight SQL query tool for \u003Ca href=\"https://github.com/beancount/beancount/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EBeancount\u003C/a\u003E ledger data.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis document is intended as a follow-up to the Beancount v2 \u003Ca href=\"https://docs.google.com/document/d/1s0GOZMcrKKCLlP29MD7kHO4L88evrwWdIO0p4EwRBE0/edit?usp=sharing\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EBeancount Query Language\u003C/a\u003E document.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt was created with the following goals in mind:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eto cover the latest features of beanquery\u003C/li\u003E\n\u003Cli\u003Eto include many real examples using actual ledgers\u003C/li\u003E\n\u003Cli\u003Eto be self-documenting: all query outputs are computed by running beanquery as part of the notebook execution\u003C/li\u003E\n\u003Cli\u003Eto be interactive: when run as a \u003Ca href=\"https://marimo.io/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Emarimo\u003C/a\u003E notebook, readers can experiment by changing the default ledgers and/or queries, with outputs updating automatically\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ECurrent state\u003C/strong\u003E: work is ongoing\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "aa9b67df3eaf23e95608611c021a1add", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"12-how-to-use-this-manual\"\u003E1.2 How to use this manual\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fdba48f70ac874c8c1043a2b1aa040b2", "console": [], "id": "SFPL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis document assumes no prior knowledge of SQL and is structured as much as possible as a tutorial, where each chapter builds on the material covered in the previous ones. As a result, the material is more spread throughout the document than it would be if it were written for an SQL-familiar reader. For example, the available tables are introduced in one chapter, and more detailed information about some of them is added in several later chapters.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis document is written as a \u003Ca href=\"https://docs.marimo.io/\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Emarimo\u003C/a\u003E notebook. You can read it as a normal HTML document.\nHowever, the cool feature of this notebook is that if you run it as a marimo notebook, you can interact with the document by changing the default text for both the ledger and the query in all examples. As soon as an input widget loses focus, the query is re-executed and the output is updated.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EBoth in HTML format and in the marimo notebook format, a clickable table of contents is available when hovering near the right side of the browser's vertical scroll bar.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6ccc06ea11269b93847693c62bb594eb", "console": [], "id": "BYtC", "outputs": [{"data": {"text/html": "\u003Cimg src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAz4AAAJoCAYAAACnazSGAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAO3JSURBVHhe7P19lFXHfecL3/+TDC9SHgFSyPPHo9y1RCOvCRFI5j6igSzNIsuzpPAik+tnSZFokAK0PHlMg67HyiiXjBNFylh005IjWbTamdiy7qOBIKD74HajZgRj3BYzsiQuoQU0NIpxjzsGESRoDvyeVW97V/2q9t5nd59z+vTh+1nZK+xdtatq1zkl16d/tev8LwQAAAAAAAAAdc7/wi8AAAAAAAAAQL0B8QEAAAAAAADUPRAfAAAAAAAAQN0D8QEAAAAAAADUPRAfAAAAAAAAQN0D8QEAAAAAAADUPRAfAAAAAAAAQN0D8QEAAA 65a2ed10a3f27f3a25d6", "console": [], "id": "emfo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBeanquery parses a Beancount ledger and creates an in-memory database represented as several tables. Beanquery then exposes a command-line tool that acts as a client to that in-memory database, where you can type queries in a variant of SQL.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EBeanquery started as an experiment in Beancount v2, but in v3 (when \u003Cstrong\u003Ebean-report\u003C/strong\u003E and \u003Cstrong\u003Ebean-web\u003C/strong\u003E were discontinued) it became practically the only tool for querying information from a Beancount ledger. Thus, one can say that in v3 Beancount has moved toward the \u003Ca href=\"https://www.techtarget.com/searchbusinessanalytics/definition/self-service-business-intelligence-BI\" rel=\"noopener noreferrer\" target=\"_blank\"\u003ESelf-service business intelligence\u003C/a\u003E model, instead of providing off-the-shelf ready-to-use reports.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo one might ask: why create another SQL client? Why not output the data to an SQLite database and let the user use any SQL client? Apparently this experiment was conducted by creating \u003Ca href=\"https://github.com/beancount/beancount/blob/v2/beancount/scripts/sql.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebean-sql\u003C/a\u003E. It turned out that writing queries was painful and carrying out operations on lots held at cost was difficult.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ETherefore beanquery has some extras that are essential for querying a Beancount ledger. These extras include (but are not necessarily limited to) the following:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EThe client supports the semantics of inventory booking implemented in Beancount. It also supports aggregation functions on inventory objects and rendering functions (e.g., COST() to render the cost of an inventory instead of its contents).\u003C/li\u003E\n\u003Cli\u003EThe client supports some functions that run on postings but in the background also access other tables (e.g. the CONVERT() function, which formally operates on amounts, positions, or inventories, but in the background also uses the prices table).\u003C/li\u003E\n\u003Cli\u003EIt allows filtering at two levels simultaneously: you can filter whole transactions, which has the benefit of respecting the accounting equation, and then, usually for presentation purposes, you can also filter at the posting level.\u003C/li\u003E\n\u003Cli\u003EObjects in one table already have references to related objects in another table. For example, records in the postings table have a reference to their related transaction object. So one can say that these tables have already been pre-joined (even though technically this is not entirely correct).\u003C/li\u003E\n\u003Cli\u003ETransactions can be summarized in a manner useful for producing balance sheets and income statements. For example, our SQL variant explicitly supports a \u201cclose\u201d operation with an effect similar to year-end closing, which inserts transactions to clear income statement accounts to equity and removes past history.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6b1f5f2eb7d2d6bf6b65d1a655a56a47", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"3-how-to-install-beanquery\"\u003E3 How to install beanquery\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f8bb4edc18e17d11d682d7b63c08e4dd", "console": [], "id": "nWHF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003Epip install beanquery\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a472f877de9c9b66476ebd52cd74b3f8", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"4-how-to-run-beanquery-cli\"\u003E4 How to run beanquery CLI\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4045c4578a0b234e75c5809231620012", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo run beanquery type\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebean-query\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EOPTIONS\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EFILENAME\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EQUERY\u003Cspan class=\"o\"\u003E]\u003C/span\u003E...\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThis launches the query tool in interactive mode, where you can enter multiple commands on the dataset loaded in memory. Beanquery parses the input file, prints a few basic statistics about your ledger, and provides a command prompt for you to enter query commands.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003Ee.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebean-query\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etest.bean\nInput\u003Cspan class=\"w\"\u003E \u003C/span\u003Efile:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Beancount\u0026quot;\u003C/span\u003E\nReady\u003Cspan class=\"w\"\u003E \u003C/span\u003Ewith\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E3\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Edirectives\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"m\"\u003E2\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Ein\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E1\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions,\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E0\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Evalidation\u003Cspan class=\"w\"\u003E \u003C/span\u003Eerrors\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EIf your ledger contains any errors, they are printed before the prompt.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003EPS\u003Cspan class=\"w\"\u003E \u003C/span\u003EC:\u003Cspan class=\"se\"\u003E\\_\u003C/span\u003Ecode\u003Cspan class=\"se\"\u003E\\b\u003C/span\u003Eean\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003Ebean-query\u003Cspan class=\"w\"\u003E \u003C/span\u003Etest.bean\nC:\u003Cspan class=\"se\"\u003E\\_\u003C/span\u003Ecode\u003Cspan class=\"se\"\u003E\\b\u003C/span\u003Eean\u003Cspan class=\"se\"\u003E\\t\u003C/span\u003Eest.bean:7:\u003Cspan class=\"w\"\u003E \u003C/span\u003Esyntax\u003Cspan class=\"w\"\u003E \u003C/span\u003Eerror,\u003Cspan class=\"w\"\u003E \u003C/span\u003Eunexpected\u003Cspan class=\"w\"\u003E \u003C/span\u003EACCOUNT\n\nInput\u003Cspan class=\"w\"\u003E \u003C/span\u003Efile:\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;Beancount\u0026quot;\u003C/span\u003E\nReady\u003Cspan class=\"w\"\u003E \u003C/span\u003Ewith\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E8\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Edirectives\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"m\"\u003E6\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Ein\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E4\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions,\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"m\"\u003E1\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Evalidation\u003Cspan class=\"w\"\u003E \u003C/span\u003Eerrors\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EYou can also start beanquery as a python module\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Epython\u003Cspan class=\"w\"\u003E \u003C/span\u003E-m\u003Cspan class=\"w\"\u003E \u003C/span\u003Ebeanquery\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EOPTIONS\u003Cspan class=\"o\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003EFILENAME\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E[\u003C/span\u003EQUERY\u003Cspan class=\"o\"\u003E]\u003C/span\u003E...\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EIf you\u2019d like to run queries directly from the command-line, without an interactive prompt, you can provide the query directly following your filename:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E$\u003Cspan class=\"w\"\u003E \u003C/span\u003Ebean-query\u003Cspan class=\"w\"\u003E \u003C/span\u003Emyfile.beancount\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s1\"\u003E\u0026#39;balances from year = 2014\u0026#39;\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E                     \u003C/span\u003Eaccount\u003Cspan class=\"w\"\u003E                       \u003C/span\u003Ebalance\n----------------------------------------------------------------------\n\u2026\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u0026lt;balances\u003Cspan class=\"w\"\u003E \u003C/span\u003Efollow\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u2026\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EAll the interactive commands are supported.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EShell variables\u003C/strong\u003E\nThe interactive shell has a few \u201cset\u201d variables that you can customize to change some of the behavior of the shell. These are like environment variables. Refer to \u003Cstrong\u003EAppendix A for more information.\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote, that in this document for demonstration purposes the following changes are done to default environmental variables:\u003C/span\u003E\n\u003Cdiv class=\"language-jasmin codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"kr\"\u003E.set\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nv\"\u003Enarrow\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"sx\"\u003Efalse\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d842cbb18034408f54d49649133bfe6b", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"5-how-to-get-help\"\u003E5 How to get help\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d519c92e835ee365414c15663735357e", "console": [], "id": "qnkX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo get help from the built-in system, type \u003Ccode\u003E.help\u003C/code\u003E when in the beanquery client\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.help\n\nShell\u003Cspan class=\"w\"\u003E \u003C/span\u003Eutility\u003Cspan class=\"w\"\u003E \u003C/span\u003Ecommands\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Etype\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u0026lt;topic\u0026gt;\u003Cspan class=\"o\"\u003E)\u003C/span\u003E:\n\u003Cspan class=\"o\"\u003E===========================================\u003C/span\u003E\nEOF\u003Cspan class=\"w\"\u003E    \u003C/span\u003Edescribe\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Eexit\u003C/span\u003E\u003Cspan class=\"w\"\u003E     \u003C/span\u003Eformat\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehistory\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eparse\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ereload\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\nclear\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eerrors\u003Cspan class=\"w\"\u003E    \u003C/span\u003Eexplain\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E    \u003C/span\u003Eoutput\u003Cspan class=\"w\"\u003E   \u003C/span\u003Equit\u003Cspan class=\"w\"\u003E   \u003C/span\u003Erun\u003Cspan class=\"w\"\u003E     \u003C/span\u003Etables\n\nBeancount\u003Cspan class=\"w\"\u003E \u003C/span\u003Equery\u003Cspan class=\"w\"\u003E \u003C/span\u003Ecommands:\n\u003Cspan class=\"o\"\u003E=========================\u003C/span\u003E\nbalances\u003Cspan class=\"w\"\u003E  \u003C/span\u003Efrom\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ejournal\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eprint\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"k\"\u003Eselect\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etargets\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ewhere\n\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ETo get help on a specific command type \u003Ccode\u003E.help \u0026lt;command name\u0026gt;\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt; .help select\nExtract data from a query on the postings.\n\nThe general form of a SELECT statement loosely follows SQL syntax, with\nsome mild and idiomatic extensions:\n.........\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ETo get the list of tables available in beanquery, type \u003Ccode\u003E.tables\u003C/code\u003E\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.tables\naccounts\nbalances\ncommodities\ndocuments\nentries\nevents\nnotes\npostings\nprices\ntransactions\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ETo see the list of columns available in a table, type \u003Ccode\u003E.describe \u0026lt;table name\u0026gt;\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor example, to see the columns in the \u003Cstrong\u003Epostings\u003C/strong\u003E table, type\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nb\"\u003Etype\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eid\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Edate\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Edate\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eyear\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eint\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Emonth\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eint\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eday\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eint\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Efilename\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Elineno\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eint\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Elocation\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eflag\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Epayee\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Enarration\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Edescription\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etags\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Elinks\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eposting_flag\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccount\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u \"\u003E(\u003C/span\u003Eamount\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Ebalance\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Einventory\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Emeta\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Edict\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eentry\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Etransaction\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nTo see the list of columns in the \u003Cstrong\u003Etransactions\u003C/strong\u003E table type:\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransactions:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Emeta\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Emetadata\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Edate\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Edate\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eflag\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Epayee\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Enarration\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Etags\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Elinks\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003E\u003Cspan class=\"nb\"\u003Eset\u003C/span\u003E\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0027d24c08435539a9e5b45818c8929f", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"6-available-tables-introduction\"\u003E6 Available tables. Introduction\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "13abee3c50a18bb489de3e06a922f104", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe list of tables which beanquery exposes to the user can be derived by issuing the \u003Ccode\u003E.tables\u003C/code\u003E command.\u003C/span\u003E\n\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.tables\naccounts\nbalances\ncommodities\ndocuments\nentries\nevents\nnotes\npostings\nprices\ntransactions\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThe list of fields in every table can be obtained using the \u003Ccode\u003E.describe \u0026lt;table_name\u0026gt;\u003C/code\u003E command.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: for the postings table, a more complete list of columns can be obtained using the \u003Ccode\u003E.help targets\u003C/code\u003E command.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e2c67a5840d523abbe8432ac1115fc2a", "console": [], "id": "DnEU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"7-types-of-queries\"\u003E7 Types of queries\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1c362f99e66626268f3762f3978a6cd7", "console": [], "id": "ulZA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBeanquery supports the following types of queries, further discussed in this document:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ESELECT\u003C/li\u003E\n\u003Cli\u003EBALANCES\u003C/li\u003E\n\u003Cli\u003EJOURNAL\u003C/li\u003E\n\u003Cli\u003EPRINT\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b7337688f826a2fbbbedc74057f3cdb1", "console": [], "id": "ecfG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"8-select-query\"\u003E8 SELECT Query\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c759a0ef05944aa555f5f13b45454f10", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe beanquery SELECT query loosely follows standard SQL syntax, with some deviations that will be discussed throughout this manual.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt should be noted that originally \u003Cstrong\u003Ebeanquery\u003C/strong\u003E was designed to extract information from the postings table only. In this situation the \u003Cstrong\u003EFROM\u003C/strong\u003E part of the SQL query was \"hijacked\" for transaction-level filtering and \u003Cstrong\u003EWHERE\u003C/strong\u003E was used for posting-level filtering, which introduced a so-called two-level filtering syntax:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe SELECT query structure looked like this (written in the informal EBNF language):\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT [DISTINCT] [\u0026lt;targets\u0026gt;|*]\n[FROM \u0026lt;entry-filter-logical-expression\u0026gt; [OPEN ON \u0026lt;date\u0026gt;] [CLOSE [ON \u0026lt;date\u0026gt;]] [CLEAR]]\n[WHERE \u0026lt;posting-filter-logical-expression\u0026gt;]\n[GROUP BY \u0026lt;groups\u0026gt;]\n[ORDER BY \u0026lt;groups\u0026gt; [ASC|DESC]]\n[LIMIT num]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us call it the \u003Cstrong\u003Etraditional SELECT query form\u003C/strong\u003E.\u003C/span\u003E\n\u003Cdetails class=\"info\"\u003E\n\u003Csummary\u003E\u003Cstrong\u003ENote about the informal EBNF language\u003C/strong\u003E\u003C/summary\u003E\n\u003Cspan class=\"paragraph\"\u003EIn this manual, queries are described using a simplified notation that shows the structure of a command.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notation is based on an \u003Cstrong\u003Einformal version of Extended Backus\u2013Naur Form (EBNF)\u003C/strong\u003E, but you do not need to know anything about EBNF to use it. It is designed to be easy to read and understand.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EHere is how to interpret it:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EWords written in \u003Cstrong\u003EUPPERCASE\u003C/strong\u003E are keywords that must be typed exactly as shown\u003C/li\u003E\n\u003Cli\u003EItems in \u003Cstrong\u003Esquare brackets \u003Ccode\u003E[ ... ]\u003C/code\u003E\u003C/strong\u003E are optional\u003C/li\u003E\n\u003Cli\u003EThe symbol \u003Ccode\u003E|\u003C/code\u003E means \u201cor\u201d (choose one of the alternatives)\u003C/li\u003E\n\u003Cli\u003EText inside \u003Cstrong\u003Eangle brackets \u003Ccode\u003E\u0026lt;...\u0026gt;\u003C/code\u003E\u003C/strong\u003E is a placeholder \u2014 you replace it with your own value\u003C/li\u003E\n\u003Cli\u003EItems written next to each other should be written in that order\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EExample:\u003C/strong\u003E\u003C/span\u003E\n\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"k\"\u003EDISTINCT\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026lt;\u003C/span\u003E\u003Cspan class=\"n\"\u003Etargets\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E|\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026lt;\u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"o\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003EThis means:\u003C/span\u003E\n\u003Cdiv class=\"language-mysql highlight\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EStart\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Ewith\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`SELECT`\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EOptionally\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eadd\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`DISTINCT`\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EEither\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eprovide\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eone\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Emore\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etargets\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Ewhat\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eyou\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ewant\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eselect\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eor\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eput\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Easterisks\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003EThen\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eoptionally\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eput\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n n-Quoted\"\u003E`FROM`\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Efollowed\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eby\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Esome\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"n\"\u003Eexpressions\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eare\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Ediscussed\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Elater\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EIn simple terms:\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThink of this syntax as a \u003Cstrong\u003Etemplate\u003C/strong\u003E for writing queries:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIt shows what parts are required, what parts are optional, and where you need to insert your own values.\u003C/span\u003E\n\u003C/details\u003E\n\u003Cspan class=\"paragraph\"\u003ELater, in Beancount v3, when beanquery was moved to a standalone tool, it was extended to query more tables (see above). In this situation the FROM part was needed again to select a table, so a new form of the SELECT query was introduced:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT [DISTINCT] [\u0026lt;targets\u0026gt;|*]\n[FROM #\u0026lt;table-name\u0026gt;]\n[WHERE \u0026lt;posting-filter-logical-expression\u0026gt;]\n[GROUP BY \u0026lt;groups\u0026gt;]\n[ORDER BY \u0026lt;groups\u0026gt; [ASC|DESC]]\n[LIMIT num]\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nLet us call it the \u003Cstrong\u003E#table\u003C/strong\u003E query form.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EThe \u003Cstrong\u003E#table\u003C/strong\u003E form is activated by adding the # symbol in front of the table name\u003C/li\u003E\n\u003Cli\u003EThe \u003Cstrong\u003E#table\u003C/strong\u003E form allows querying tables other than the postings table, but when used to query the postings table (which is possible), it lacks some functionality available in the traditional form, namely the \u003Ccode\u003E[OPEN ON \u0026lt;date\u0026gt;] [CLOSE [ON \u0026lt;date\u0026gt;]] [CLEAR]\u003C/code\u003E part. (This may actually be a \u003Ca href=\"https://github.com/beancount/beanquery/issues/274\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ebug\u003C/a\u003E, rather than a feature.)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, to summarize:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EIn the traditional BQL, the FROM clause is used to describe the posting-level filter, not to identify the data source\u003C/li\u003E\n\u003Cli\u003EIn the \u003Cstrong\u003E#table\u003C/strong\u003E syntax, the table name must be preceded by the # symbol\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003ECurrently beanquery supports both query types. Let us explore this with a simple ledger.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fc7efc9e591207b58f660a55b1024144", "console": [], "id": "ZBYS", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ZBYS-0' random-id='05553ec8-7e8e-33c5-6c29-22294b11cb0d'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for SELECT query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "3af374bb9c0a5832c2acc104f1e2ac08", "console": [], "id": "aLJB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us create a query which shows postings to the account \u003Ccode\u003EExpenses:Food\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f78c0df3a0d711e77bc6f57dd5d111d3", "console": [], "id": "nHfw", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "20ae4cc5b1af0c3b685e4ea1980dfd83", "console": [], "id": "xXTn", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "09390aac08cdbe76a6103dfd265d2165", "console": [], "id": "AjVT", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='nHfw-0' random-id='98dac8dc-451d-c944-2bba-075aaeac6389'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT *\u0026#92;nWHERE account = \u0026#92;\u0026quot;Expenses:Food\u0026#92;\u0026quot;\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Traditional query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     flag  payee  narration   position\n----------  ----  -----  ----------  --------\n2023-01-02  *            Shopping 1   20 USD \n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='xXTn-0' random-id='67609452-2c61-f09a-3d91-9161269794bd'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT *\u0026#92;nFROM #postings\u0026#92;nWHERE account = \u0026#92;\u0026quot;Expenses:Food\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The same query, but using the #table syntax\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     flag  payee  narration   position\n----------  ----  -----  ----------  --------\n2023-01-02  *            Shopping 1   20 USD \n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "c281953c6d037f68b1061d80a8db5708", "console": [], "id": "pHFh", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that here we use the wildcard symbol (*) to list some columns, instead of specifying column names manually.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EDifference to SQL: the BQL using a wildcard as the target list (\u201c*\u201d) selects a good default list of columns, whilst the traditional SQL the * is used to describe the complete set of columns, available in the table.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "287df92432b9a59fa7e9a8b1837fb036", "console": [], "id": "NCOB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us now query the \u003Cstrong\u003Eaccounts\u003C/strong\u003E table. Note, that for the \u003Cstrong\u003Eaccounts\u003C/strong\u003E table we have no choice, but to use the \u003Cstrong\u003E#table\u003C/strong\u003E query format.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b7c5e27f23ac00ca1eef39eec34e1474", "console": [], "id": "aqbW", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='aqbW-0' random-id='a359e7b1-67bd-3798-b5a9-aa65bb23ff61'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, open.date, close.date\u0026#92;nFROM #accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Querying on accounts (only #table style can be used for the accounts table)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ffbefcb10ae8f0abf8c74c3610f13fa7", "console": [], "id": "TRpd", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   account     open.date   close.date\n-------------  ----------  ----------\nIncome:Salary  2023-01-01            \nAssets:Cash    2023-01-01            \nExpenses:Food  2023-01-01            \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "6d66454c73bfc005ba87d6f77d81b54b", "console": [], "id": "TXez", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"9-expressions\"\u003E9 Expressions\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ef216902bc27de8851272691e7c23c13", "console": [], "id": "dNNg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWhen we talked about SQL query we mentioned, but not defined the notion of an expression. Let us correct this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAn \u003Cstrong\u003Eexpression\u003C/strong\u003E is something, which can be evaluated to a value.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EA \u003Cstrong\u003Elogical expression\u003C/strong\u003E is an expression, which can be evaluated to a  logical value (\u003Ccode\u003ETRUE\u003C/code\u003E or \u003Ccode\u003EFALSE\u003C/code\u003E)\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn beanquery an expression is constructed by combining \u003Cstrong\u003Etable columns\u003C/strong\u003E, \u003Cstrong\u003Econstants\u003C/strong\u003E, \u003Cstrong\u003Eoperators\u003C/strong\u003E, and \u003Cstrong\u003Efunctions\u003C/strong\u003E. All of these elements are described later in this document.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c6291aa46717a407db6024aa7af1cb65", "console": [], "id": "yCnT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"91-operators\"\u003E9.1 Operators\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ff10202732473832633534b7261d155a", "console": [], "id": "wlCL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ECommon comparison and logical operators are provided to operate on the available data columns:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E= (equality), != (inequality)\u003C/li\u003E\n\u003Cli\u003E\u0026lt; (less than), \u0026lt;= (less than or equal)\u003C/li\u003E\n\u003Cli\u003E\u0026gt; (greater than), \u0026gt;= (greater than or equal)\u003C/li\u003E\n\u003Cli\u003EAND (logical conjunction)\u003C/li\u003E\n\u003Cli\u003EOR (logical disjunction)\u003C/li\u003E\n\u003Cli\u003ENOT (logical negation)\u003C/li\u003E\n\u003Cli\u003EIN (set membership)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBeanquery also provides a regular expression search operator on string objects:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E~ (search regexp)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E?? Which not-logical operators are supported? E.g. I found, that the '+' operator also works. E.g.: \u003Ccode\u003ESELECT \"a\"+\"b\"\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe example below demonstrates a few of these operators\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "09ad2614e4f8164ae77f7ad046b0551b", "console": [], "id": "kqZH", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='kqZH-0' random-id='e22823b9-796b-af3c-9ec8-2243abb3ebdd'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;John\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot; #trip-berlin\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-02-03 * \u0026#92;\u0026quot;Richard\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot; #trip-london\u0026#92;n  Expenses:Misc   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger to demonstrate operators\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "e8e5db5d4323a6380a5d511f6b867d84", "console": [], "id": "wAgl", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='wAgl-0' random-id='acfdfed9-de4d-6c26-34c7-98667fbfec43'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n     date, account, payee,narration, position\u0026#92;nWHERE \u0026#92;n      account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;n      AND \u0026#92;\u0026quot;trip-london\u0026#92;\u0026quot; IN tags\u0026#92;n      AND NOT payee = \u0026#92;\u0026quot;John\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Operators demo query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9bb5edf2b9d6e1f2a363668aa21bc37d", "console": [], "id": "rEll", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account      payee   narration   position\n----------  -------------  -------  ----------  --------\n2023-02-03  Expenses:Misc  Richard  Shopping 2   20 USD \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "daca32083980c7b950354ba01e47aa8b", "console": [], "id": "dGlV", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"92-constants\"\u003E9.2 Constants\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "59dbb1223f9b4098bc5e2f2a9c6333b1", "console": [], "id": "SdmI", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe following types of constants can be entered in the beanquery expression\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003EString: \u003Ccode\u003E\"I am a string\"\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EDate:  Dates are entered in \u003Ccode\u003EYYYY-MM-DD format: SELECT * WHERE date \u0026lt; 2024-05-20..\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EInteger: \u003Ccode\u003E1\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EBoolean: \u003Ccode\u003ETRUE, FALSE\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ENumber:  \u003Ccode\u003E1.2\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ENull object: \u003Ccode\u003ENULL\u003C/code\u003E       ?? How can we use this NULL in practice?\u003C/li\u003E\n\u003Cli\u003E?? can we enter a set of strings constant in an expression?\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9952dfbdeec9b8ba95b7df04946d5c83", "console": [], "id": "lgWD", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='lgWD-0' random-id='bfafe73d-0c12-19e1-0b7e-6e9f1767d5e6'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for constants\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "f3f7889aa12aff036badc4714951718d", "console": [], "id": "yOPj", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='yOPj-0' random-id='751684c3-598a-7747-a37a-02accafa59a0'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n   \u0026#92;\u0026quot;I am a string\u0026#92;\u0026quot; as string_const, \u0026#92;n    2026-10-10 as date_const, \u0026#92;n    10 as int_const,  \u0026#92;n    NULL as null_const, \u0026#92;n    3.14 as number_const, \u0026#92;n    TRUE as bool_const\u0026#92;nFROM #transactions\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Query has no practical sense, but it demonstrates how to enter constants in beanquery\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "3e93b569f7ef662965927a9f268ecd4c", "console": [], "id": "fwwy", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E string_const  date_const  int_const  null_const  number_const  bool_const\n-------------  ----------  ---------  ----------  ------------  ----------\nI am a string  2026-10-10         10              3.14          TRUE      \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "e4fe43b463a7eeb7f5a4cb9a6c92fd29", "console": [], "id": "LJZf", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"93-columns-and-functions-in-expressions\"\u003E9.3 Columns and Functions in expressions\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "61becd60f511a8bcbc695308e8bb15f1", "console": [], "id": "urSm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA full list of columns and functions, available to be used to construct expressions are available via the \u003Ccode\u003E.help XXX\u003C/code\u003E command:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003ESELECT\u003C/code\u003E clause expressions type \u003Ccode\u003E.help targets\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003EFROM\u003C/code\u003E clause expressions type \u003Ccode\u003E.help FROM\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ETo get a help for the \u003Ccode\u003EWHERE\u003C/code\u003E clause expressions type \u003Ccode\u003E.help WHERE\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EExample (reduced):\u003C/span\u003E\n\u003Cdiv class=\"language-carbon codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"nx\"\u003Ebeanquery\u003C/span\u003E\u003Cspan class=\"p\"\u003E\u0026gt;\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"nx\"\u003Ehelp\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Efrom\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EA\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Elogical\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eexpression\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ethat\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Econsist\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecolumns\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eon\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirectives\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Emostly\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"k\"\u003Eand\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Esimple\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Efunctions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EColumns\u003C/span\u003E\n\u003Cspan class=\"o\"\u003E-------\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Eid\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003EUnique\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eid\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirective\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003EThe\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eof\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ethe\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edirective\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003EFunctions\u003C/span\u003E\n\u003Cspan class=\"o\"\u003E---------\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Eabs\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Edecimal\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eposition\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Eposition\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003ECoerce\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ean\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eamount\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eparticular\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecurrency\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"nx\"\u003Econvert\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Estr\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Edate\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"nx\"\u003ECoerce\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ean\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Einventory\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eto\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ea\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Eparticular\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nx\"\u003Ecurrency\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\n\n\u003Cspan class=\"o\"\u003E...\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ENote, that the list of table columns (in this example the list of table columns in the transactions table), available via the \u003Ccode\u003E.help from\u003C/code\u003E command is broader, then the list of columns available for the same table via the \u003Ccode\u003E.describe \u0026lt;table-name\u0026gt;\u003C/code\u003E.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g. in this case the \u003Ccode\u003E.describe transactions\u003C/code\u003E does not list the \u003Ccode\u003Eid\u003C/code\u003E and some other columns, otherwise available for the \u003Ccode\u003EFROM ...\u003C/code\u003E clause\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt; .describe transactions\ntable transactions:\n  meta (metadata)\n  date (date)\n  flag (str)\n  payee (str)\n  narration (str)\n  tags (set)\n  links (set)\n  accounts (set[str])\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n?? Why is that\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: investigate this and raise an issue, if applicable\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "bb43d2c3b2f4501d0eb8107f3d6439a6", "console": [], "id": "jxvo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"10-more-on-tables\"\u003E10 More on tables\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "21e106a0d1d20230d67ad4f32ef5722a", "console": [], "id": "mWxS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section contains some additional information on some of the tables, available in beanquery.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f6bb3916000eb389193ffc116bb0b49d", "console": [], "id": "CcZR", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"101-the-postings-table\"\u003E10.1 The postings table\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c9f2b439a43fd7a70f45c1704a5b7160", "console": [], "id": "YWSi", "outputs": [{"data": {" P/D+057xr5WbtlAAAAAElFTkSuQmCC\" alt=\"Diagram of transactions and postings\" /\u003E"}, "type": "data"}]}, {"code_hash": "39c7ddfbecfb8904c4bdeecc91c7e453", "console": [], "id": "CLip", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe contents of a ledger is parsed into a list of directives, most of which are \u201cTransaction\u201d objects which contain two or more \u201cPosting\u201d objects. Postings are always linked only to a single transaction (they are never shared between transactions). Each posting refers to its parent transaction but has a unique account name, amount and associated lot (possibly with a cost), a price and some other attributes. The parent transaction itself contains a few useful attributes as well, such as a date, the name of a payee, a narration string, a flag, links, tags, etc.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, one can think that attributes such as \u003Cstrong\u003Edate\u003C/strong\u003E or \u003Cstrong\u003Enarration\u003C/strong\u003E belong to the transaction object, whilst attributes like \u003Cstrong\u003Eaccount\u003C/strong\u003E belong to the posting object. However (probably for simplicity) all of the transaction-level fields are also made available in the posting objects (the only exception being the transaction meta, which is not available from the posting). One can check this by comparing the outputs of the \u003Cstrong\u003E\u003Ccode\u003E.describe postings\u003C/code\u003E\u003C/strong\u003E and \u003Cstrong\u003E\u003Ccode\u003E.describe transactions\u003C/code\u003E\u003C/strong\u003E commands.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, from the beanquery data model the diagram looks more like this\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "cecbff2da3fc8af2291a9bbcb83857fa", "console": [], "id": "YECM", "outputs": [{"data": {"text/html": "\u003Cimg src=\"d cba4-a41ae02ba409'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT *\u0026#92;nWHERE date = 2023-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Using posting level filtering\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date     flag  payee  narration   position\n----------  ----  -----  ----------  --------\n2023-01-01  *            Shopping 1   10 USD \n2023-01-01  *            Shopping 1  -10 USD \n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "ce332d9a005c3328c897dd4ef2bdc90b", "console": [], "id": "dlnW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWe can see that the field \u003Ccode\u003Edate\u003C/code\u003E can be used both within the FROM clause (transaction-level filter) and the WHERE clause (postings-level filter). This is despite the fact that, logically speaking, the \u003Ccode\u003Edate\u003C/code\u003E column should be a transaction-level field only.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EConclusion:\u003C/strong\u003E at the moment there seems to be \u003Ca href=\"https://groups.google.com/g/beancount/c/HVK3_6p1FjM\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Elittle reason\u003C/a\u003E to use the FROM clause transaction level-filtering in the SELECT query, as everything can be done in the WHERE part\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "dc8128c83b4b5a13f3510fe9da9674f2", "console": [], "id": "TTti", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1012-the-entry-column\"\u003E10.1.2 The \u003Ccode\u003Eentry\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0cf8ab42fa77ebf01fdc7684856d56b3", "console": [], "id": "RKFZ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESuppose we would need to join postings with related transactions (e.g. to access posting meta field)\nIn a traditional SQL environment we would probably have to do something like this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Emeta\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EJOIN\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"k\"\u003EON\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etransaction_id\u003C/span\u003E\u00
