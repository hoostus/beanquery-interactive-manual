0 USD\n\n2012-08-01 * \u0026quot;Some income and expense to show\u0026quot;\n  Income:Salary       -11000 USD\n  Expenses:Taxes        3200 USD\n  Assets:US:Checking    7800 USD\n\n2012-08-02 * \u0026quot;Some other conversion to be summarized\u0026quot;\n  Assets:US:Checking  -3000 USD @ 1.25 CAD\n  Assets:CA:Checking   3750 CAD\n\n2013-02-01 * \u0026quot;Some income and expense to be truncated\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "4187297008fece96ea93324c9ebd5451", "console": [], "id": "KoaX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts on the date before 2012-08-01  without and with OPEN ON 2012-08-01 clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "25c2ec94688850a32a4df00108141a91", "console": [], "id": "eLzN", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1de01b3a001e93854fabc1365151e9b5", "console": [], "id": "JHzP", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "fdb70b22a5ba5f6032d11efe9c76393a", "console": [], "id": "elJp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ea16be637fb83ed6129236da81abedcf", "console": [], "id": "EyBw", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "344c066f0596dd958caa1e6917be38ee", "console": [], "id": "MrKo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='eLzN-0' random-id='d5ebc14a-6a3d-f889-2492-c81f6d46a722'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;n\u0026#92;nWHERE \u0026#92;n   date \u0026lt; 2012-08-01\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Without OPEN ON\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E       account               acc_balance     \n----------------------  ---------------------\nAssets:CA:Checking       6000 CAD            \nAssets:US:Checking                   1400 USD\nExpenses:Shopping                     200 USD\nExpenses:Taxes                       3600 USD\nIncome:Salary                      -10000 USD\nLiabilities:CreditCard               -200 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='elJp-0' random-id='639a75c1-bb14-5392-674d-d4b0db53fa26'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;nFROM OPEN ON 2012-08-01\u0026#92;nWHERE \u0026#92;n   date \u0026lt; 2012-08-01\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;With OPEN ON\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E          account                acc_balance     \n---------------------------  --------------------\nAssets:CA:Checking            6000 CAD           \nAssets:US:Checking                       1400 USD\nEquity:Conversions:Previous  -6000 CAD   5000 USD\nEquity:Earnings:Previous                -6200 USD\nEquity:Opening-Balances                          \nLiabilities:CreditCard                   -200 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "66ef29534f154de4b1f6cae4b445f75e", "console": [], "id": "ngkg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne can see that balances on Assets and Liabilities did not change, but Income and Expenses were summarized into Equity:Earnings:Previous.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "35b824228db096e2fbe0253b71bbd59d", "console": [], "id": "BNjl", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1411-closing-a-period-close-on-clause\"\u003E14.1.1. Closing a Period (CLOSE ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "67603d20c0ca94192359d274d2a0c558", "console": [], "id": "zLYB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EClosing an exercise period involves mainly truncating all entries that come after the given date and ensuring that currency conversions are correctly corrected for (see beancount.ops.summarize.close() for implementation details).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote that the closing date should be one day after the last transaction you would like to include (this is in line with the convention we use everywhere in Beancount whereby starting dates are inclusive and ending dates exclusive).\nThe closing date is optional. If the date is not specified, the date one day beyond the date of the last entry is used.\nClosing a period leaves the Income and Expenses accounts as they are, that is, their balances are not cleared to zero to Equity. This is because closing is also used to produce final balances for income statements. \u201cClearing\u201d, as described in the next section, is only needed for balance sheets.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c57ca7fa331d2e276b8248f335e64dd0", "console": [], "id": "ofkl", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "86a97061e997c681fc68481569c9501a", "console": [], "id": "jaBo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='ofkl-0' random-id='da9eee74-c31f-18ec-7a8b-d4d86495ecf8'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM CLOSE ON 2013-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how CLOSE ON converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u 000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E2011-01-01 open Income:Salary\n2011-01-01 open Expenses:Taxes\n2011-01-01 open Expenses:Shopping\n2011-01-01 open Liabilities:CreditCard\n2011-01-01 open Assets:US:Checking\n2011-01-01 open Assets:CA:Checking\n\n2011-03-01 * \u0026quot;Some income and expense to be summarized\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\n2012-03-02 * \u0026quot;Some expenses and liabilities to be summarized\u0026quot;\n  Liabilities:CreditCard  -200 USD\n  Expenses:Shopping        200 USD\n\n2012-03-03 * \u0026quot;Some conversion to be summarized\u0026quot;\n  Assets:US:Checking  -5000 USD @ 1.2 CAD\n  Assets:CA:Checking   6000 CAD\n\n2012-08-01 * \u0026quot;Some income and expense to show\u0026quot;\n  Income:Salary       -11000 USD\n  Expenses:Taxes        3200 USD\n  Assets:US:Checking    7800 USD\n\n2012-08-02 * \u0026quot;Some other conversion to be summarized\u0026quot;\n  Assets:US:Checking  -3000 USD @ 1.25 CAD\n  Assets:CA:Checking   3750 CAD\n\n2012-12-31 C \u0026quot;Conversion for (-8000 USD, 9750 CAD)\u0026quot;\n  Equity:Conversions:Current   8000 USD @ 0 NOTHING\n  Equity:Conversions:Current  -9750 CAD @ 0 NOTHING\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "907a30e971f6fc96961cc88f599fcccb", "console": [], "id": "YCKg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E??\u003C/strong\u003E What is this   @ 0 NOTHING. Why is this needed?\nWhy is it not possible to put this like this\u003C/span\u003E\n\u003Cdiv class=\"language-cbmbas codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"mf\"\u003E2012\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E12\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E31\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EC\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s\"\u003E\u0026quot;Conversion for (-8000 USD, 9750 CAD)\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E   \u003C/span\u003E\u003Cspan class=\"mf\"\u003E8000\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EUSD\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"err\"\u003E@@\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7929019e8361920b223a4f08249b5aef", "console": [], "id": "TzTD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1412-clearing-income-expenses-clear-clause\"\u003E14.1.2. Clearing Income \u0026amp; Expenses (CLEAR clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "17f060e06f10d086ddb3c170094bfa61", "console": [], "id": "ywjc", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIn order to produce a balance sheet, we need to transfer final balances of the Income and Expenses to an Equity \u201ccurrent earnings\u201d account (sometimes called \u201cretained earnings\u201d or \u201cnet income\u201d; you can select the specific account name to use using options in the input file). The resulting balances of income statement accounts should be zero (see beancount.ops.summarize.clear() for implementation details).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3399baf8e6c755597a59c00189c2c184", "console": [], "id": "WyQu", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "8f957af9932f68d364c8a10380edba9e", "console": [], "id": "dGch", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='WyQu-0' random-id='689b5a20-e922-658f-a1d1-60d8c5d6f442'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM CLEAR\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how CLEAR converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOn the left side you see the original ledger for reference and on the right side the ledger transformed by the CLEAR statement\u003C/span\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='BzwM-0' random-id='8243b79a-0953-3053-d8f0-81d9ee71f728'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E2011-01-01 open Income:Salary\n2011-01-01 open Expenses:Taxes\n2011-01-01 open Expenses:Shopping\n2011-01-01 open Liabilities:CreditCard\n2011-01-01 open Assets:US:Checking\n2011-01-01 open Assets:CA:Checking\n\n2011-03-01 * \u0026quot;Some income and expense to be summarized\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\n2012-03-02 * \u0026quot;Some expenses and liabilities to be summarized\u0026quot;\n  Liabilities:CreditCard  -200 USD\n  Expenses:Shopping        200 USD\n\n2012-03-03 * \u0026quot;Some conversion to be summarized\u0026quot;\n  Assets:US:Checking  -5000 USD @ 1.2 CAD\n  Assets:CA:Checking   6000 CAD\n\n2012-08-01 * \u0026quot;Some income and expense to show\u0026quot;\n  Income:Salary       -11000 USD\n  Expenses:Taxes        3200 USD\n  Assets:US:Checking    7800 USD\n\n2012-08-02 * \u0026quot;Some other conversion to be summarized\u0026quot;\n  Assets:US:Checking  -3000 USD @ 1.25 CAD\n  Assets:CA:Checking   3750 CAD\n\n2013-02-01 * \u0026quot;Some income and expense to be truncated\u0026quot;\n  Income:Salary       -10000 USD\n  Expenses:Taxes        3600 USD\n  Assets:US:Checking    6400 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Expenses:Shopping\u0026#x27; (Transfer balance)\u0026quot;\n  Expenses:Shopping        -200 USD\n  Equity:Earnings:Current   200 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Expenses:Taxes\u0026#x27; (Transfer balance)\u0026quot;\n  Expenses:Taxes           -10400 USD\n  Equity:Earnings:Current   10400 USD\n\n2013-02-01 T \u0026quot;Transfer balance for \u0026#x27;Income:Salary\u0026#x27; (Transfer balance)\u0026quot;\n  Income:Salary             31000 USD\n  Equity:Earnings:Current  -31000 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "58cc6d2993ab3087384c440d33bb821d", "console": [], "id": "DpZg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts without and with CLEAR clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4689f02b4a4d4639b12abbb3b0d33f52", "console": [], "id": "NFPl", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "16efabb81655b2060ac771053a218811", "console": [], "id": "BxxS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "35916c7eefd77076017d80773d0178c4", "console": [], "id": "ZpGF", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='NFPl-0' random-id='802387bb-d2b4-a263-d680-343f43d48ee6'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  account, sum(position) as acc_balance\u0026#92;nGROUP BY account\u0026#92;nORDER BY account\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Without CLEAR\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E       account               acc_balance     \n----------------------  ---------------------\nAssets:CA:Checking       9750 CAD            \nAssets:US:Checking                  12600 USD\nExpenses:Shopping                     200 USD\nExpenses:Taxes                      10400 USD\nIncome:Salary                      -31000 USD\nLiabilities:CreditCard               -200 USD\n\u003C/pre\u003E\u003C/div\u003E 3E"}, "type": "data"}]}, {"code_hash": "ebec5ac0613338d51739650c174ba08e", "console": [], "id": "pgJK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo generate a balance sheet, you would add the CLEAR option and select the other accounts:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "65e6f53cb875e375f1855f92604ed976", "console": [], "id": "XAze", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='XAze-0' random-id='23b2f9ad-78b9-e7d4-46c8-db0376d9f622'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, sum(position) \u0026#92;nFROM OPEN ON 2012-01-01 CLOSE ON 2013-01-01 CLEAR\u0026#92;nWHERE not account ~ \u0026#92;\u0026quot;Income|Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1\u0026#92;nORDER BY 1;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Balance sheet example using OPEN ON, CLOSE ON, CLEAR\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "afb287395434b21ab1e290e786aa6b94", "console": [], "id": "cwqn", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E         account               sum(position)    \n--------------------------  --------------------\nAssets:CA:Checking           9750 CAD           \nAssets:US:Checking                      6200 USD\nEquity:Conversions:Current  -9750 CAD   8000 USD\nEquity:Earnings:Current                -7600 USD\nEquity:Earnings:Previous               -6400 USD\nEquity:Opening-Balances                         \nLiabilities:CreditCard                  -200 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "6925ae92204ceaf097e6c83886f0f1d6", "console": [], "id": "eYRD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"15-high-level-shortcuts-journal-balance-print\"\u003E15. High-level shortcuts (JOURNAL, BALANCE, PRINT)\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4d8e1a58b3440237d28e0167f3011599", "console": [], "id": "XZIo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThere are two types of queries that are very common for accounting applications: journals and balances reports. This section describes a few additional selection commands that translate directly into SELECT statements and which are then run with the same query code. These are intended as convenient shortcuts.  ?? It looks like the equivalent SELECT statements are more flexible (see more below).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn this section we will be using the following ledger for all the examples:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "332baf8687196e45943a294d0aa74906", "console": [], "id": "cNyH", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='cNyH-0' random-id='1958d455-4606-3464-4d49-2164631dd811'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Bank-A\u0026#92;n2023-01-01 open Assets:Bank-B\u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -1000 USD\u0026#92;n  Assets:Bank-A    750 USD\u0026#92;n  Assets:Bank-B    250 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping using Bank-A\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    100 USD\u0026#92;n  Assets:Bank-A   -100 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Shopping using Bank-B\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    110 USD\u0026#92;n  Assets:Bank-B   -110 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Shopping using Bank-A again\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    120 USD\u0026#92;n  Assets:Bank-A   -120 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for JOURNAL test\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "272b6e18928515e20109b34b9c9c682c", "console": [], "id": "VjEH", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"151-selecting-journals-journal-query\"\u003E15.1. Selecting Journals (JOURNAL query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "76f5ba720a3f5fc461cbe6f99f338fe5", "console": [], "id": "zesr", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA common type of query is one that generates a linear journal of entries (Ledger calls this a \u201cregister\u201d). This roughly corresponds to an account statement, but with our language, such a statement can be generated for any subset of postings.\nYou can generate a journal with the following syntax:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EJOURNAL \u0026lt;account-regexp\u0026gt; [AT \u0026lt;function\u0026gt;] [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe regular expression account-regexp is used to select which subset of accounts to generate a journal for. The optional \u003Ccode\u003EAT \u0026lt;function\u0026gt;\u003C/code\u003E clause is used to specify an aggregation function for the amounts rendered (typically \u003Ccode\u003EUNITS\u003C/code\u003E or \u003Ccode\u003ECOST\u003C/code\u003E). The \u003Ccode\u003EFROM\u003C/code\u003E clause follows the same rules as for the \u003Ccode\u003ESELECT\u003C/code\u003E statement and is optional.\nHere is an example journal-generating query:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4c0d164e2991a13010dcd69a59135968", "console": [], "id": "ISrK", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ISrK-0' random-id='625c1b34-7228-2e01-ce5b-041d97553ee4'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;JOURNAL \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;JOURNAL query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ee092d8a3be6bb98c818f27be691fa44", "console": [], "id": "oXQC", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date     f  M    MAXWIDTH(narration, 80)       account     position  balance \n----------  -  -  ---------------------------  -------------  --------  --------\n2023-01-01  *     Salary                       Assets:Bank-A   750 USD   750 USD\n2023-01-02  *     Shopping using Bank-A        Assets:Bank-A  -100 USD   650 USD\n2023-01-04  *     Shopping using Bank-A again  Assets:Bank-A  -120 USD   530 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "a96caeb65f7dc05b8cf34ed72e48a4b7", "console": [], "id": "xqqY", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='xqqY-0' random-id='1939d508-1793-a747-2730-568011c38669'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT date, narration, account, position, balance\u0026#92;nWHERE account ~ \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Equivalent to JOURNAL SELECT ... WHERE query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "2e539e8faf09a4c9f356e215ee27912a", "console": [], "id": "vAZI", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date              narration              account     position  balance \n----------  ---------------------------  -------------  --------  --------\n2023-01-01  Salary                       Assets:Bank-A   750 USD   750 USD\n2023-01-02  Shopping using Bank-A        Assets:Bank-A  -100 USD   650 USD\n2023-01-04  Shopping using Bank-A again  Assets:Bank-A  -120 USD   530 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "76a495b5181ba9f88bae4c3f01a7cd2c", "console": [], "id": "Cvjs", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"152-selecting-balances-balances-query\"\u003E15.2. Selecting Balances (BALANCES query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "881af78b6b39fc06e612019723dc38e0", "console": [], "id": "NGNk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe other most common type of report is a table of the balances of various accounts at a particular date. This can be viewed as a SELECT query aggregating positions grouping by account.\nYou can generate a balances report with the following syntax:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EBALANCES [AT \u0026lt;function\u0026gt;] [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe optional \u003Ccode\u003EAT \u0026lt;function\u0026gt;\u003C/code\u003E clause is used to specify an aggregation function for the balances rendered (usually UNITS or COST). The \u003Ccode\u003EFROM\u003C/code\u003E clause follows the same rules as for the SELECT statement and is optional.\nTo generate your balances at a particular date, close your set of entries using the \u003Ccode\u003EFROM\u2026 CLOSE ON\u003C/code\u003E form described above.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EObserve that typical balance sheets and income statements seen in an accounting context are subsets of tables of balances such as reported by this query. An income statement reports on just the transactions that appears during a period of time, and a balance sheet summarizes transactions before its reporting before and clears the income \u0026amp; expenses accumulated during the period to an equity account. Then some minor reformatting is carried out. Please consult the introduction document on double-entry bookkeeping for more details, and the section above that discusses the \u201copen\u201d, \u201cclose\u201d and \u201cclear\u201d operations.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5d683ff6532e8807460b35f2e3996293", "console": [], "id": "CWwK", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "280cee5c7dfbf6c3a45a652e347a7bae", "console": [], "id": "gYFm", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "fd350b514cec11895b7bf63d7ffe62f1", "console": [], "id": "iCCe", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6ecc96f793aa68162aaff6d55d079531", "console": [], "id": "ZVxg", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "15a73c2bda6e9dc59a43b24f08b6065f", "console": [], "id": "RzLA", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='CWwK-0' random-id='b996fc66-f05a-a4c1-43fe-a2327cc8195d'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;BALANCES \u0026#92;nFROM DATE \u0026lt;=2023-01-03 \u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;BALANCES query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   account     SUM((posi\n-------------  ---------\nAssets:Bank-A    650 USD\nAssets:Bank-B    140 USD\nIncome:Salary  -1000 USD\nExpenses:Misc    210 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='iCCe-0' random-id='2b43d8de-98fe-031e-89d0-90f65b82cc8c'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT account, SUM(position)\u0026#92;nWHERE date \u0026lt;=2023-01-03 \u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Equivalent to BALANCES SELECT ... WHERE query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   account     SUM(posit\n-------------  ---------\nIncome:Salary  -1000 USD\nAssets:Bank-A    650 USD\nAssets:Bank-B    140 USD\nExpenses:Misc    210 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "849712299a3e53463db455c5e2246081", "console": [], "id": "oRYm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E?? Seems that the SELECT ... WHERE  offers the same functionality, but with a better flexibility. E.g. it is also possible to filter spesific accounts, and / or apply the root() function to accounts.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.: would it be possible to do the following with the BALANCES query, where we select balances only for assets?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c7715c6e1b6d174d75ac386811379855", "console": [], "id": "CtVA", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='CtVA-0' random-id='c15727ab-ada8-924f-c179-7a2a79ff67d3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT root(account,1) as account_short, SUM(position)\u0026#92;nWHERE date \u0026lt;=2023-01-03 AND account ~ \u0026#92;\u0026quot;^Assets\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Balances per set of accounts with WHERE filter\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9c60a2aebe3cfadf6c7abddd2a5cee6f", "console": [], "id": "TSoP", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Eaccoun  SUM(posi\n------  --------\nAssets   790 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "3e7a34c54e5b5ff18301ac24179451cd", "console": [], "id": "vWAQ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"153-print-print-query\"\u003E15.3. Print (PRINT query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3f27d659bb688cee020c72f172ce51e3", "console": [], "id": "opEZ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIt can be useful to generate output in Beancount format, so that subsets of transactions can be saved to files, for example. The shell provides that ability via the PRINT command:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EPRINT [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe FROM clause obeys the usual semantics as described elsewhere in this document. The resulting filtered stream of Beancount entries is then printed out on the output in Beancount syntax.\nIn particular, just running the \u003Ccode\u003EPRINT\u003C/code\u003E command will spit out the parsed and loaded contents of a Beancount file. You can use this for troubleshooting if needed, or to expand transactions generated from a plugin you may be in the process of developing.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "badf3b038768bec54e96988312c59f9d", "console": [], "id": "zhCr", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='zhCr-0' random-id='1d78b303-add5-1d5e-1171-a240f7117b34'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM date \u0026gt;=2023-01-02 \u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Print entries from a specific date\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "5a8e7171febb002956edc981929d1815", "console": [], "id": "CCxq", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E\n2023-01-02 * \u0026quot;Shopping using Bank-A\u0026quot;\n  Expenses:Misc   100 USD\n  Assets:Bank-A  -100 USD\n\n2023-01-03 * \u0026quot;Shopping using Bank-B\u0026quot;\n  Expenses:Misc   110 USD\n  Assets:Bank-B  -110 USD\n\n2023-01-04 * \u0026quot;Shopping using Bank-A again\u0026quot;\n  Expenses:Misc   120 USD\n  Assets:Bank-A  -120 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "feaac33b7d5294c897f11e3f3584072d", "console": [], "id": "jKDm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that unlike any other type of query commands, the \u003Ccode\u003EPRINT\u003C/code\u003E does not produce a tabular data, but just a text output.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6115ace3b53421e579cf9c09a14f24aa", "console": [], "id": "OcMK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"16-usage-of-beanquery-with-data-frame\"\u003E16. Usage of beanquery with Data Frame\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4427d2e080c91086c05fd8c71899c04b", "console": [], "id": "QuIQ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add information\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "14c199b5f38bb3cd72e99ec7bef329db", "console": [], "id": "ZzbA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"17-working-around-beanquery-limitations\"\u003E17. Working around beanquery limitations\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "da77d56218bc2c92e5b0288805c5b73a", "console": [], "id": "ETTw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section will discuss of the beanquery limitations and how to work around them\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add information\u003C/em
