ogle.com/g/beancount/c/HVK3_6p1FjM\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Elittle reason\u003C/a\u003E to use the FROM clause transaction level-filtering in the SELECT query, as everything can be done in the WHERE part\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "87c9058123487e3800abdfc4a4141516", "console": [], "id": "RKFZ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1012-the-entry-column\"\u003E10.1.2. The \u003Ccode\u003Eentry\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0cf8ab42fa77ebf01fdc7684856d56b3", "console": [], "id": "IaQp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESuppose we would need to join postings with related transactions (e.g. to access posting meta field)\nIn a traditional SQL environment we would probably have to do something like this.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-sql codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"k\"\u003ESELECT\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"o\"\u003E*\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Emeta\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EFROM\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\n\u003Cspan class=\"k\"\u003EJOIN\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u003Cspan class=\"k\"\u003EON\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Epostings\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etransaction_id\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eid\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nBeanquery however does not support \u003Ca href=\"https://groups.google.com/g/beancount/c/O0x0eZEp-Lk/m/WFnOS_flEQAJ\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Eyet\u003C/a\u003E table joining. On the other hand, the postings table returns records that include a reference to the transaction that contains them, so they are kind of pre-joined already (in addition to the fact that transaction columns are also available in the postings table).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EOne can check this by issuing the \u003Ccode\u003E.describe postings\u003C/code\u003E command:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E....\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eentry\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Etransaction\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u0026lt;\u003Cspan class=\"o\"\u003E==\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethis\u003Cspan class=\"w\"\u003E \u003C/span\u003Eis\u003Cspan class=\"w\"\u003E \u003C/span\u003Ea\u003Cspan class=\"w\"\u003E \u003C/span\u003Ereference\u003Cspan class=\"w\"\u003E \u003C/span\u003Eto\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransaction\u003Cspan class=\"w\"\u003E \u003C/span\u003Efrom\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Eposting\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nLet us see how we can do this by pulling both transaction meta and posting meta:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8feb8b2cb009b579ef4242386793df6d", "console": [], "id": "IWgg", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='IWgg-0' random-id='75038bf6-07e9-ff3f-937b-5a32d6acbff0'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Cash USD\u0026#92;n2023-01-01 open Expenses:Food USD\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_meta\u0026#92;\u0026quot;     ; \u0026lt;= transaction-level meta\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting1\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting2\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta again\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_meta\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9ee927d14d1d2c0bc97fe174f54bdcea", "console": [], "id": "fCoF", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='fCoF-0' random-id='cb2401a9-7d61-1a15-2eea-a024a91af921'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  date, narration, account, \u0026#92;n  meta[\u0026#x27;my_meta\u0026#x27;] as posting_meta, \u0026#92;n  entry.meta[\u0026#x27;my_meta\u0026#x27;] as trans_meta\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Pulling both transaction-level and posting-level meta together\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b2ac01a197a566e5b9a78756cda5eb88", "console": [], "id": "LkGn", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date     narration      account     posting_meta  trans_me\n----------  ----------  -------------  ------------  --------\n2023-01-01  Shopping 1  Expenses:Food  tr1_posting1  tr1_meta\n2023-01-01  Shopping 1  Assets:Cash    tr1_posting2  tr1_meta\n2023-01-02  Shopping 2  Expenses:Food  tr2_posting1  tr2_meta\n2023-01-02  Shopping 2  Assets:Cash    tr2_posting1  tr2_meta\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "ab7d73f1c603803fd6c67501cae7e892", "console": [], "id": "zVRe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1013-the-other_accounts-column\"\u003E10.1.3. The \u003Ccode\u003Eother_accounts\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ea7212310ca5e9f12bed49369b81dbe9", "console": [], "id": "woaO", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eother_accounts\u003C/code\u003E column is another notable column in the postings table. It contains the set of accounts from other postings in the same transaction.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "74fb5c32bd81b77ebe6769caeb39d19f", "console": [], "id": "HnMC", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='HnMC-0' random-id='6902d78a-e305-6704-11fc-3858446ce000'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Liabilities:CreditCard\u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with cash\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Expenses:Misc   10 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with credit card\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food             30 USD\u0026#92;n  Liabilities:CreditCard   -30 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;other_accounts\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "096ddcb0322b9ad2e70eb3141d589eec", "console": [], "id": "wadT", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='wadT-0' random-id='efbdf3bd-8953-7e24-546c-25a6f46859d3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, other_accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us see, what the other_accounts column contains\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "191b312d16bb6449feb29d174e4b15f8", "console": [], "id": "VCRE", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date            account                  narration          position         other_accounts       \n----------  ----------------------  -------------------------  --------  ----------------------------\n2023-01-01  Income:Salary           Salary                     -100 USD  Assets:Cash                 \n2023-01-01  Assets:Cash             Salary                      100 USD  Income:Salary               \n2023-01-02  Expenses:Food           Shopping with cash           10 USD  Assets:Cash  Expenses:Misc  \n2023-01-02  Expenses:Misc           Shopping with cash           10 USD  Assets:Cash  Expenses:Food  \n2023-01-02  Assets:Cash             Shopping with cash          -20 USD  Expenses:Food  Expenses:Misc\n2023-01-02  Expenses:Food           Shopping with credit card    30 USD  Liabilities:CreditCard      \n2023-01-02  Liabilities:CreditCard  Shopping with credit card   -30 USD  Expenses:Food               \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "2b6f3efbcfee26253cb56e1396bf6dbf", "console": [], "id": "hgqU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us now use the \u003Ccode\u003Eother_accounts\u003C/code\u003E column to select all expenses that were paid with cash rather than with a credit card.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c747129ae55689439054ea6e15613dd9", "console": [], "id": "PSUk", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='PSUk-0' random-id='0edc022d-d191-5945-bd2c-68b04f7648c4'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position\u0026#92;nWHERE  account ~ \u0026#x27;^Expenses\u0026#x27; AND\u0026#x27;Assets:Cash\u0026#x27; IN other_accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Expenses, paid with cash\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "def700a3ed5ab76660d2c89ab76924dc", "console": [], "id": "mfOT", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account         narration       positio\n----------  -------------  ------------------  -------\n2023-01-02  Expenses:Food  Shopping with cash   10 USD\n2023-01-02  Expenses:Misc  Shopping with cash   10 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "d3ec3b1d58ef9772f31a182bc7bd5d82", "console": [], "id": "vGiW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1014-the-balance-column\"\u003E10.1.4. The \u003Ccode\u003Ebalance\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e98bc06e6c60ab4515cfcdb82a961b47", "console": [], "id": "SYQT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne common desired output is a journal of entries over time (also called a \u201cregister\u201d in Ledger).\nFor this type of report, it is convenient to also render a column of the cumulative balance of the selected postings rows. Access to the previous row is not a standard SQL feature, so we get a little creative and provide a special column called \u201cbalance\u201d which is automatically calculated based on the previous selected rows. This provides the ability to render typical account statements such as those mailed to you by a bank. Output might look like this:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d25fbd1e29d78896e495181af55a39d2", "console": [], "id": "bMrW", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='bMrW-0' random-id='ea056ebb-88cd-0890-6fa1-b5ab811c5822'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Bank-A\u0026#92;n2023-01-01 open Assets:Bank-B\u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -1000 USD\u0026#92;n  Assets:Bank-A    750 USD\u0026#92;n  Assets:Bank-B    250 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping using Bank-A\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    100 USD\u0026#92;n  Assets:Bank-A   -100 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Shopping using Bank-B\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    110 USD\u0026#92;n  Assets:Bank-B   -110 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Shopping using Bank-A again\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    120 USD\u0026#92;n  Assets:Bank-A   -120 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;balance\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "961a0829b8a2888d56e13b87adc4147a", "console": [], "id": "PSQn", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='PSQn-0' random-id='15d96ad4-a433-4b7f-2096-cb01d129cc9d'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b4658fb30c9384a8eff289c5f8947039", "console": [], "id": "OfTS", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-01  Assets:Bank-A  Salary                        750 USD   750 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD   650 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD   530 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "42c6de622c5092f1cf490138a32db274", "console": [], "id": "lQxp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that the beanquery starts counting balance from 0 and takes into account all postings, which pass through the filter. Therefore if the goal is to have a bank equivalent balance information, then one shall not put any filters, which would filter out any postings to the bank account account. E.g. if we put a filter to start later, then the result would be different.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAlso selecting more than 1 bank account would create a result, different from what you get from your bank statement:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a0b99c3df44c17d246d68f9e1ec9688c", "console": [], "id": "Plbk", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2147e6f303ee8cbb5b342f02abf185ef", "console": [], "id": "rSYo", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "0bd1be882cfedabed8002734e18993f4", "console": [], "id": "HuZB", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='Plbk-0' random-id='4c9b8ce1-cff9-9790-e9ee-2ae9f1d12cbf'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; AND date \u0026gt; 2023-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance, starting later\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD  -100 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD  -220 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='rSYo-0' random-id='c1a7808c-c63a-1d0c-c31b-f6957616ba24'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; OR account = \u0026#92;\u0026quot;Assets:Bank-B\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A, Bank-B balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position   balance \n----------  -------------  ---------------------------  --------  ---------\n2023-01-01  Assets:Bank-A  Salary                        750 USD    750 USD\n2023-01-01  Assets:Bank-B  Salary                        250 USD   1000 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD    900 USD\n2023-01-03  Assets:Bank-B  Shopping using Bank-B        -110 USD    790 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD    670 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "c5dac31cdaf1f8722ff2bf393febf3aa", "console": [], "id": "WfYj", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1015-the-weight-column\"\u003E10.1.5. The \u003Ccode\u003Eweight\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "093827467af79813b166cedecfc362d9", "console": [], "id": "Ynfw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe computed weight used for this posting\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add expamples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2179f10e3180d34940e445e6b98b872e", "console": [], "id": "LqFA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"102-transactions-table\"\u003E10.2. Transactions table\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "42493ed8462ae4f92017661a88b6abbc", "console": [], "id": "uDnK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1021-the-id-column\"\u003E10.2.1. The \u003Ccode\u003Eid\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a7b96f6e6046f7c159e6efdfd5e23d0f", "console": [], "id": "aWBL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA special column exists that identifies each transaction uniquely: \u201cid\u201d. It is a unique hash automatically computed from the transaction and should be stable between runs.\nThis hash is derived from the contents of the transaction object itself (if you change something about the transaction, e.g. you edit the narration, the id will change).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: even though the \u003Ccode\u003Eid\u003C/code\u003E field logically belongs to the transaction, it is not available in the \u003Ccode\u003Etransactions\u003C/code\u003E table. The only way to find it is to look in postings via traditional query.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d34c907c57a51e09900c8600fdbc6f95", "console": [], "id": "MIsd", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='MIsd-0' random-id='2c5267bd-af4f-41d6-8889-239342df2d44'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for to test id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "f18dee945e6316822c8af94f57969d49", "console": [], "id": "IrqS", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='IrqS-0' random-id='029547a8-7a2e-18ea-009e-d743ccb4209a'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, id\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Show some columns including the id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "03a0c2084f6527f553470ff61fdd082e", "console": [], "id": "Lpqv", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account     narration   position                 id               \n----------  -------------  ----------  --------  --------------------------------\n2023-01-01  Income:Salary  Salary      -100 USD  8c969675c23279856156d912149d33a8\n2023-01-01  Assets:Cash    Salary       100 USD  8c969675c23279856156d912149d33a8\n2023-01-02  Expenses:Food  Shopping 1    10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Assets:Cash    Shopping 1   -10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Expenses:Food  Shopping 2    20 USD  95808f6293b038c097ec1436b8527193\n2023-01-02  Assets:Cash    Shopping 2   -20 USD  95808f6293b038c097ec1436b8527193\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "f9a71e6bb027e1d2ea2cf2299b6ed02d", "console": [], "id": "upgv", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOnce the \u003Ccode\u003Eid\u003C/code\u003E field is known, one can use it also for the transaction - level filtering.  E.g. one can use the \u003Ccode\u003EPRINT\u003C/code\u003E query (discussed later) to print the specific entry. This can be useful during debugging.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "503b68c06d9189b9ad202058bb4dd0e4", "console": [], "id": "WJUG", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='WJUG-0' random-id='d111052b-e421-f813-6c18-b31c7688581c'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT from id = \u0026#x27;5801fa0babefb50972631ce070888875\u0026#x27;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;PRINT specific entry by id\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "c8ad9277c2f1138dff67c5cba0b30ee8", "console": [], "id": "pCao", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E\n2023-01-02 * \u0026quot;Shopping 1\u0026quot;\n  Expenses:Food   10 USD\n  Assets:Cash    -10 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "e11d540a981870c4bb4f5d446ced4356", "console": [], "id": "wEIy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"11-practical-conclusions-on-using-the-select-query\"\u003E11. Practical conclusions on using the SELECT Query\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "be1ce17f7bbf7d5c86dc22deeab94bc2", "console": [], "id": "wlyU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EFrom everything mentioned above one can probably make the following practical conclusions on usage of the SELECT query in beancount.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Euse traditional form of the beanquery query on postings\u003C/li\u003E\n\u003Cli\u003Euse the #table form for all other tables\u003C/li\u003E\n\u003Cli\u003Eno particular need to use the \u003Cstrong\u003EFROM\u003C/strong\u003E - clause filtering in the SELECT query, as all the fields are also available for the \u003Cstrong\u003EWHERE\u003C/strong\u003E clause\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E?? Are these conclusions correct?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "81ea95125591725436b79df22971849d", "console": [], "id": "PieA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"12-functions\"\u003E12. Functions\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "71ad1fadf2798428bb200a97e48974cc", "console": [], "id": "GrQN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shell provides a list of simple function that operate on a single data column and return a new value. These functions operate on particular types. The shell implements rudimentary type verification and should be able to warn you on incompatible types.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EList of functions, available to be used in the \u003Ccode\u003ESELECT\u003C/code\u003E expression can be obtained using the \u003Ccode\u003E.help targets\u003C/code\u003E command. List of functions, available to be used in the expression of the \u003Ccode\u003EFROM\u003C/code\u003E and \u003Ccode\u003EWHERE\u003C/code\u003E clause can be obtained using the \u003Ccode\u003E.help from\u003C/code\u003E and \u003Ccode\u003E.help where\u003C/code\u003E respectively. E.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt; .help targets\n\n\nThe list of comma-separated target expressions may consist of columns,\nsimple functions and aggregate functions. If you use any aggregate\nfunction, you must also provide a GROUP-BY clause.\n\nColumns\n-------\n...\n\nFunctions\n---------\n\nabs(decimal)\n...\n\nAggregate functions\n-------------------\n\n...\n\nsum(amount)\n  Calculate the sum of the amount. The result is an Inventory.\n\nsum(inventory)\n  Calculate the sum of the inventories. The result is an Inventory.\n\nsum(decimal)\nsum(int)\n  Calculate the sum of the numerical argument.\n\nsum(position)\n  Calculate the sum of the position. The result is an Inventory.\n\n...\n\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "af9ff779d194e24eacee85f774471f73", "console": [], "id": "Ilkb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"121-aggregate-functions-and-aggregate-queries\"\u003E12.1. Aggregate functions and Aggregate Queries\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f8255bf267754c741b9975c38d438614", "console": [], "id": "mySd", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003ESELECT\u003C/code\u003E clause (and only the \u003Ccode\u003ESELECT clause\u003C/code\u003E) allows usage of the called \u003Cstrong\u003EAggregate functions\u003C/strong\u003E, in addition to the ordinary Functions.\nThe \u003Cstrong\u003EAggregate functions\u003C/strong\u003E operate on more than a single row. These functions aggregate and summarize the multiple values for the data column that they operate on.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExamples of aggregate functions include:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003ECOUNT(...)\u003C/code\u003E: Computes the number of postings selected (an integer).\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EFIRST(...)\u003C/code\u003E, \u003Ccode\u003ELAST(...)\u003C/code\u003E: Returns first or last value seen.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EMIN(...)\u003C/code\u003E, \u003Ccode\u003EMAX(...)\u003C/code\u003E: Computes the minimum or maximum value seen.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003ESUM(...)\u003C/code\u003E: Sums up the values of each set. This works on amounts, positions, inventories, numbers, etc.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EA usage of at least one of the aggregate function turns a query into the \u003Cstrong\u003EAggregate Query\u003C/strong\u003E. An \u003Cstrong\u003EAggregate query\u003C/strong\u003E is a query, which produces a row of results for each group of postings that match the restricts in the \u003Ccode\u003EWHERE\u003C/code\u003E clause.  In order to identify the aggregation keys in a \u003Cstrong\u003Eclassical SQL\u003C/strong\u003E all the non-aggregate columns have to be flagged using the GROUP BY clause:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "abb213fe9cc81ed68bbbaa38bc573ed3", "console": [], "id": "vGkK", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='vGkK-0' random-id='3ac33bfa-2fc7-af8d-bd8b-88c651825b74'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Cash USD\u0026#92;n2023-01-01 open Income:Salary USD\u0026#92;n2023-01-01 open Expenses:Food USD\u0026#92;n2023-01-01 open Expenses:Misc USD\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -500 USD\u0026#92;n  Assets:Cash      500 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Bob\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 3\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   30 USD\u0026#92;n  Assets:Cash    -30 USD\u0026#92;n\u0026#92;n2023-01-05 * \u0026#92;\u0026quot;Bob\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 4\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   40 USD\u0026#92;n  Assets:Cash    -40 USD\u0026#92;n\u0026#92;n2023-01-06 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 5\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   50 USD\u0026#92;n  Assets:Cash    -50 USD\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for aggregate functions demo\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "df5826bc625c5c1a951ae806a9ce5969", "console": [], "id": "zmIa", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='zmIa-0' random-id='a36de185-86d3-deac-cdf8-01ab09422850'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY payee, account\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Aggregate query example\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ac315d6cbba9ec167f9a4714006a08d8", "console": [], "id": "NOfw", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee     account     sum(pos  last(date)\n-----  -------------  -------  ----------\nAlice  Expenses:Food   40 USD  2023-01-04\nBob    Expenses:Misc   60 USD  2023-01-05\nAlice  Expenses:Misc   50 USD  2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "881a13c6548f471a4abd033f7c5a2738", "console": [], "id": "jXAc", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='jXAc-0' random-id='ff409588-1bb4-0fc7-a525-8e11adbee4f0'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1, 2\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;You may also use the positional order of the targets to declare the group key, like this\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ac315d6cbba9ec167f9a4714006a08d8", "console": [], "id": "mSxP", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee     account     sum(pos  last(date)\n-----  -------------  -------  ----------\nAlice  Expenses:Food   40 USD  2023-01-04\nBob    Expenses:Misc   60 USD  2023-01-05\nAlice  Expenses:Misc   50 USD  2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "9a7144277ea3909be6b8d108c6b28e70", "console": [], "id": "IZEX", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='IZEX-0' random-id='dafb34da-9456-038e-b4bb-d2c0e0da7b5b'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account as acc, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1, acc\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Furthermore, if you name your targets, you can use the explicit target names:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "340a8cd2da6f7ab21c49aa13597feeec", "console": [], "id": "UFLA", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee       acc       sum(pos  last(date)\n-----  -------------  -------  ----------\nAlice  Expenses:Food   40 USD  2023-01-04\nBob    Expenses:Misc   60 USD  2023-01-05\nAlice  Expenses:Misc   50 USD  2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "c93c18086b3b9e8a3c2175e1d4780d50", "console": [], "id": "RCUM", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EUnlike the classical SQL, the beanquery engine however is smart enough to understand what are the grouping keys, without them being explicitly specified. So, it is possible to omit the \u003Ccode\u003EGROUP BY\u003C/code\u003E clause at all:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "24fb742f82197fea0b305b36c9e21fb3", "console": [], "id": "ynmH", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ynmH-0' random-id='b6103338-36f9-eccc-df8c-0c1cb8319618'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Aggregate query example\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "4a08f094ec40ef2ccf30415e2a81e11e", "console": [], "id": "NBGo", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee     account     sum(pos  last(date)\n-----  -------------  -------  ----------\nAlice  Expenses:Food   40 USD  2023-01-04\nBob    Expenses:Misc   60 USD  2023-01-05\nAlice  Expenses:Misc   50 USD  2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "66af194a2350c71d2f31a6b052f9554f", "console": [], "id": "eooq", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"122-notable-functions\"\u003E12.2. Notable functions\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0902eb697051ab3f1f4f487b91cfbaee", "console": [], "id": "ChmK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section discusses some of the notable functions, available in beanquery\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0825a214c0074ab4d85487c2983a32fa", "console": [], "id": "KdvC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1221-sum\"\u003E12.2.1. SUM()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "73a36f683eb1cfcfae4b3f893ad30117", "console": [], "id": "vkvV", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003ESUM()\u003C/code\u003E function is probably the most widely used aggregate function in beanquery.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Esum(amount)\n  Calculate the sum of the amount. The result is an Inventory.\n\nsum(inventory)\n  Calculate the sum of the inventories. The result is an Inventory.\n\nsum(decimal)\nsum(int)\n  Calculate the sum of the numerical argument.\n\nsum(position)\n  Calculate the sum of the position. The result is an Inventory.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nThe usage of the \u003Ccode\u003ESUM()\u003C/code\u003E function for a simple case is already demonstrated in the \u003Cstrong\u003EAggregate Functions\u003C/strong\u003E section.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us apply the \u003Ccode\u003Esum()\u003C/code\u003E function to the more complex ledger with lots, tracked at cost and to different commodities.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: for illustrative purposes on the right sit the same ledger is printed using the PRINT query command to show the full internal representation of the lot cost (with the cost date and the cost label. E.g. 1 IVV {10 USD, \u003Cstrong\u003E2023-01-11}\u003C/strong\u003E`)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b896548f7b7f7ba6ba9d29b95c8ba2fe", "console": [], "id": "EKSN", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "051d317e54cd417f12923ef9cb4edccc", "console": [], "id": "tasN", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='EKSN-0' random-id='c5fd5797-29f9-9e19-cfa2-5cb3c7e1a424'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Bank\u0026#92;n2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Investment\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100000 USD\u0026#92;n  Assets:Bank      100000 USD\u0026#92;n\u0026#92;n2023-01-11 * \u0026#92;\u0026quot;Invest in IVV 1\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   1  IVV {10 USD} \u0026#92;n  Assets:Bank        -10 USD\u0026#92;n\u0026#92;n2023-01-12 * \u0026#92;\u0026quot;Invest in IVV 2a\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   10 IVV {20 USD} \u0026#92;n  Assets:Bank        -200 USD\u0026#92;n\u0026#92;n2023-01-12 * \u0026#92;\u0026quot;Invest in IVV 2b. The same cost as 2a\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   20 IVV {20 USD} \u0026#92;n  Assets:Bank        -400 USD\u0026#92;n\u0026#92;n2023-01-12 * \u0026#92;\u0026quot;Invest in IVV 2c. The same cost as 2a, but with label\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   40 IVV {20 USD, \u0026#92;\u0026quot;lot-label\u0026#92;\u0026quot;} \u0026#92;n  Assets:Bank        -800 USD\u0026#92;n\u0026#92;n2023-01-13 * \u0026#92;\u0026quot;Invest in IVV 3. The same cost as 2a, but different date\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   100 IVV {20 USD} \u0026#92;n  Assets:Bank        -2000 USD\u0026#92;n\u0026#92;n2023-01-14 * \u0026#92;\u0026quot;Invest in IVV 4. Not at cost with USD\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   1000  IVV @ 40 USD \u0026#92;n  Assets:Bank        -40000 USD\u0026#92;n\u0026#92;n2023-01-15 * \u0026#92;\u0026quot;Invest in IPP. Not at cost\u0026#92;\u0026quot;\u0026#92;n  Assets:Investment   10 IPP @ 4 USD\u0026#92;n  Assets:Bank        -40 USD\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for SUM() function demo at costs\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E2023-01-01 open Assets:Bank\n2023-01-01 open Income:Salary\n2023-01-01 open Assets:Investment\n\n2023-01-01 * \u0026quot;Salary\u0026quot;\n  Income:Salary  -100000 USD\n  Assets:Bank     100000 USD\n\n2023-01-11 * \u0026quot;Invest in IVV 1\u0026quot;\n  Assets:Investment    1 IVV {10 USD, 2023-01-11}\n  Assets:Bank        -10 USD\n\n2023-01-12 * \u0026quot;Invest in IVV 2a\u0026quot;\n  Assets:Investment    10 IVV {20 USD, 2023-01-12}\n  Assets:Bank        -200 USD\n\n2023-01-12 * \u0026quot;Invest in IVV 2b. The same cost as 2a\u0026quot;\n  Assets:Investment    20 IVV {20 USD, 2023-01-12}\n  Assets:Bank        -400 USD\n\n2023-01-12 * \u0026quot;Invest in IVV 2c. The same cost as 2a, but with label\u0026quot;\n  Assets:Investment    40 IVV {20 USD, 2023-01-12, \u0026quot;lot-label\u0026quot;}\n  Assets:Bank        -800 USD\n\n2023-01-13 * \u0026quot;Invest in IVV 3. The same cost as 2a, but different date\u0026quot;\n  Assets:Investment    100 IVV {20 USD, 2023-01-13}\n  Assets:Bank        -2000 USD\n\n2023-01-14 * \u0026quot;Invest in IVV 4. Not at cost with USD\u0026quot;\n  Assets:Investment    1000 IVV @ 40 USD\n  Assets:Bank        -40000 USD\n\n2023-01-15 * \u0026quot;Invest in IPP. Not at cost\u0026quot;\n  Assets:Investment   10 IPP @ 4 USD\n  Assets:Bank        -40 USD\n\u003C/pre\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "e39979b6693f5fa6d9a9533f4180da42", "console": [], "id": "SXvM", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='SXvM-0' random-id='1ca54d9d-40d7-6deb-821c-11886967157a'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT sum(position)\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Investment\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Aggregate query to sum positions\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "80b16f5300d855c6608f73602ce3a70b", "console": [], "id": "CFll", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E                                                 sum(position)                                                  \n----------------------------------------------------------------------------------------------------------------\n 10 IPP   1000 IVV              100 IVV { 20 USD}     40 IVV { 20 USD}     30 IVV { 20 USD}      1 IVV { 10 USD}\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "fd35d3e6ec68ba7ed2fe9d54df121738", "console": [], "id": "wbrJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe sum of positions is an inventory\u003Cbr\u003E\n  note, that the way resulting inventory (the sum of positions) is displayed in beanquery may be is a bit confusing, as the cost date cost and label are not displayed (see \u003Ca href=\"https://groups.google.com/g/beancount/c/jdNCyhyq3Ug\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ethis\u003C/a\u003E discussion).\n  The more complete representation would be :\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E            sum(position)\n-------------------------------------------\n10   IPP\n1000 IVV\n100  IVV {20 USD, 2023-01-13}\n40   IVV {20 USD, 2023-01-12, \u0026quot;lot-label\u0026quot;}\n30   IVV {20 USD, 2023-01-12}\n1    IVV {10 USD, 2023-01-11}\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Esum()\u003C/code\u003E function joins different lots together, following the rules, which beancount uses to build inventories (see more in the document \u003Ca href=\"https://docs.google.com/document/d/11a9bIoNuxpSOth3fmfuIFzlZtpTJbvw-bPaQCnezQJs\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EHow Inventories Work\u003C/a\u003E):\u003Cul\u003E\n\u003Cli\u003Edifferent commodities are not summed together (\u003Ccode\u003E10 IPP\u003C/code\u003E and \u003Ccode\u003E1000 IVV\u003C/code\u003E are not added together).\u003C/li\u003E\n\u003Cli\u003Eeven when commodities are the same, lots are added together only when all elements of the cost are also the same: the same cost commodity, the same cost date, the same cost label (if available). E.g. in the above example only the following 2 lots are added together:\u003Cbr\u003E \u003Ccode\u003E10 IVV {20 USD, 2023-01-12} + 20 IVV {20 USD, 2023-01-12} = 30 IVV {20 USD, 2023-01-12}\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e181efcf155eef21719f37511de1f32f", "console": [], "id": "viyg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ba1fdb0b0b8ffe9f646da9b8df3051da", "console": [], "id": "GbuD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1222-units-cost\"\u003E12.2.2. UNITS(), COST()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ac2d409cc985d524b33d31748bbaf209", "console": [], "id": "bHhy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ecost(position)\n  Get the cost of a position.\n\ncost(inventory)\n  Get the cost of an inventory.\n\n\nunits(position)\n  Get the number of units of a position (stripping cost).\n\nunits(inventory)\n  Get the number of units of an inventory (stripping cost).\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us see results of these functions on the same ledger, which was used to demonstrate the \u003Ccode\u003ESUM()\u003C/code\u003E function.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "731ba232ba7e852e410bdfc1ddd67fe8", "console": [], "id": "ctlq", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ctlq-0' random-id='bd4cef62-1d2a-de86-0a94-e1f29cb8cdbb'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT date, narration, account, position, cost(position), units(position)\u0026#92;nWHERE narration ~ \u0026#92;\u0026quot;Invest\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;UNITS and COST query\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "05c129d114c33c55b3638944fa869f26", "console": [], "id": "NtNR", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date                            narration                               account             position        cost(posit  units(posi\n----------  --------------------------------------------------------  -----------------  --------------------  ----------  ----------\n2023-01-11  Invest in IVV 1                                           Assets:Investment       1 IVV { 10 USD}      10 USD       1 IVV\n2023-01-11  Invest in IVV 1                                           Assets:Bank           -10 USD               -10 USD     -10 USD\n2023-01-12  Invest in IVV 2a                                          Assets:Investment      10 IVV { 20 USD}     200 USD      10 IVV\n2023-01-12  Invest in IVV 2a                                          Assets:Bank          -200 USD              -200 USD    -200 USD\n2023-01-12  Invest in IVV 2b. The same cost as 2a                     Assets:Investment      20 IVV { 20 USD}     400 USD      20 IVV\n2023-01-12  Invest in IVV 2b. The same cost as 2a                     Assets:Bank          -400 USD              -400 USD    -400 USD\n2023-01-12  Invest in IVV 2c. The same cost as 2a, but with label     Assets:Investment      40 IVV { 20 USD}     800 USD      40 IVV\n2023-01-12  Invest in IVV 2c. The same cost as 2a, but with label     Assets:Bank          -800 USD              -800 USD    -800 USD\n2023-01-13  Invest in IVV 3. The same cost as 2a, but different date  Assets:Investment     100 IVV { 20 USD}    2000 USD     100 IVV\n2023-01-13  Invest in IVV 3. The same cost as 2a, but different date  Assets:Bank         -2000 USD             -2000 USD   -2000 USD\n2023-01-14  Invest in IVV 4. Not at cost with USD                     Assets:Investment    1000 IVV              1000 IVV    1000 IVV\n2023-01-14  Invest in IVV 4. Not at cost with USD                     Assets:Bank        -40000 USD            -40000 USD  -40000 USD\n2023-01-15  Invest in IPP. Not at cost                                Assets:Investment      10 IPP                10 IPP      10 IPP\n2023-01-15  Invest in IPP. Not at cost                                Assets:Bank           -40 USD               -40 USD     -40 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "4c4f113d73ea1193ae7cdc903c5a751a", "console": [], "id": "nebC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Ecost()\u003C/code\u003E function always returns some result, even in case the position is not \"held at cost\".  In case there is no cost, the cost function returns units.\u003C/li\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Ecost()\u003C/code\u003E function only returns a cost amount (decimal number and commodity), without the cost date and label\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBoth the \u003Ccode\u003Ecost()\u003C/code\u003E and \u003Ccode\u003Eunits()\u003C/code\u003E functions can operate on positions as well as on inventories. That means, that one can apply these functions either to columns or to the output of the \u003Ccode\u003Esum()\u003C/code\u003E function in the aggregate query.  Let us demonstrate this on the same ledger, which was used for the \u003Ccode\u003ESUM()\u003C/code\u003E function demo:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "aaf4cee1af54d9be276ec0b0211b0183", "console": [], "id": "ZsHO", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='ZsHO-0' random-id='11cabe77-3794-acbd-c60b-92c9fd703310'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT cost(sum(position)), sum(cost(position)), units(sum(position)),  sum(units(position))\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Investment\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;COST() and UNITS() of inventories\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "bc3742deddaebae2f3550cc4e51519d9", "console": [], "id": "HNXk", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E     cost(sum(position))            sum(cost(position))       units(sum(position  sum(units(position\n-----------------------------  -----------------------------  ------------------  ------------------\n 10 IPP   1000 IVV   3410 USD   10 IPP   1000 IVV   3410 USD   10 IPP   1171 IVV   10 IPP   1171 IVV\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "3742d55763d92e5e04955ffb5e9c9d14", "console": [], "id": "bhgI", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve, that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003Ecost(sum(position))\u003C/code\u003E produces the same result as the \u003Ccode\u003Esum(cost(position))\u003C/code\u003E. In another words, the \u003Ccode\u003Ecost()\u003C/code\u003E function, does some internal summing. when applied to an inventory. The same is applicable to the \u003Ccode\u003Eunits()\u003C/code\u003E.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ff907a283914ed963941c6980b511e01", "console": [], "id": "DlKN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1222-convert\"\u003E12.2.2. CONVERT()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d83816961540d49e1a491d404fc6b64f", "console": [], "id": "iFMf", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add some info\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "932b3509f0fa4d2f67d96e59ba6e35f9", "console": [], "id": "QYfb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"13-controlling-query-results\"\u003E13. Controlling query results\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "dd911b16ffeed89d0017a2d6f38653b2", "console": [], "id": "qJXu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"131-distinct\"\u003E13.1. DISTINCT\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "22fcb37293c269a0ce883af1c6903841", "console": [], "id": "LdJG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThere is a post-filtering phase that supports uniquifying result rows. You can trigger this unique filter with the DISTINCT flag after SELECT, as is common in SQL, e.g.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add practical examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c7978359012ad66250b69457765fcd2d", "console": [], "id": "fOSF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"132-order-by\"\u003E13.2. ORDER BY\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5ae6af8da2397b44fa180b5fb5a261de", "console": [], "id": "gZOs", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EAnalogous to the GROUP BY clause is an ORDER BY clause that controls the final ordering of the result rows:\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT \u2026\nGROUP BY account, payee\nORDER BY payee, date;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nThe clause is optional. If you do not specify it, the default order of iteration of selected postings is used to output the results (that is, the order of transactions-sorted by date- and then their postings).\nAs in SQL, you may reverse the order of sorting by a DESC suffix (the default is the same as specifying ASC):\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT \u2026\nGROUP BY account, payee\nORDER BY payee, date DESC;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ETODO#: add examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b6d6d3fa8a992948e1883127a990bf20", "console": [], "id": "wtAr", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"133-limit\"\u003E13.3. LIMIT\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d86e63160ea211ac19c4918a50a8e939", "console": [], "id": "SQfX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe beanquery also supports a LIMIT clause to interrupt output row generation:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003ESELECT \u2026 LIMIT 100;\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis would output the first 100 result rows and then stop. While this is a common clause present in the SQL language, in the context of double-entry bookkeeping it is not very useful: we always have relatively small datasets to work from. Nevertheless, it is provided for completeness.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ETODO#: add examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3aa05e8da4962a13f22983dcabc2c874", "console": [], "id": "HRKw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"14-statement-operators-open-on-close-on-clear\"\u003E14. Statement operators (OPEN ON, CLOSE ON, CLEAR)\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3727aa205c98b3e9d3c2f4ad1e950681", "console": [], "id": "MYoQ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shell provides a few operators designed to facilitate the generation of balance sheets and income statements. The particular methodology used to define these operations should be described in detail in the \u003Ca href=\"https://docs.google.com/document/d/100tGcA4blh6KSXPRGCZpUlyxaRUwFHEvnz_k9DyZFn4/edit?usp=sharing\" rel=\"noopener noreferrer\" target=\"_blank\"\u003E\u201cintroduction to double-entry bookkeeping\u201d\u003C/a\u003E document that accompanies Beancount and is mostly located in the source code in the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize\u003C/a\u003E module.\nThese special operators are provided on the FROM clause that is made available on the various forms of query commands in the shell. These further transform the set of entries selected by the FROM expression at the transaction levels (not postings).\nPlease note that these are not from standard SQL; these are extensions provided by this shell language only.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor demonstrations let us use the following ledger (borrowed with some changes from the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize_test.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize_test\u003C/a\u003E)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c352c8da2d2339d810509bd51294d047", "console": [], "id": "BzwM", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='BzwM-0' random-id='8243b79a-0953-3053-d8f0-81d9ee71f728'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "16d0cfac72eda0a1f8d9549fd4f25a6f", "console": [], "id": "nSRe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"141-opening-a-period-open-on-clause\"\u003E14.1. Opening a Period (OPEN ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d92b52aa88faa9c6d589716884e9544b", "console": [], "id": "TmyF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOpening an exercise period at a particular date replaces all entries before that date by summarization entries that book the expected balance against an Equity \u201copening balances\u201d account and implicitly clears the income and expenses to zero by transferring their balances to an Equity \u201cprevious earnings\u201d account (see beancount.ops.summarize.open() for implementation details)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "546657158cab5b13e3b34fc2304d9a92", "console": [], "id": "tbSj", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2011319e3cedbd5a9733b3827c7ed32b", "console": [], "id": "lPrT", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='tbSj-0' random-id='436a8ba7-2e9f-5c66-4c3e-13aad98a9a9b'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT FROM OPEN ON 2012-08-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us use PRINT statement to demonstrate how OPEN ON converts the ledger\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOn the left side you see the original ledger for reference and on the right side the ledger transformed by the OPEN ON statement\u003C/span\u003E\u003C/span\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='BzwM-0' random-id='8243b79a-0953-3053-d8f0-81d9ee71f728'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2011-01-01 open Income:Salary\u0026#92;n2011-01-01 open Expenses:Taxes\u0026#92;n2011-01-01 open Expenses:Shopping\u0026#92;n2011-01-01 open Liabilities:CreditCard\u0026#92;n2011-01-01 open Assets:US:Checking\u0026#92;n2011-01-01 open Assets:CA:Checking\u0026#92;n\u0026#92;n2011-03-01 * \u0026#92;\u0026quot;Some income and expense to be summarized\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n\u0026#92;n2012-03-02 * \u0026#92;\u0026quot;Some expenses and liabilities to be summarized\u0026#92;\u0026quot;\u0026#92;n    Liabilities:CreditCard -200 USD\u0026#92;n    Expenses:Shopping       200 USD\u0026#92;n\u0026#92;n2012-03-03 * \u0026#92;\u0026quot;Some conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -5000 USD @ 1.2 CAD\u0026#92;n    Assets:CA:Checking    6000 CAD\u0026#92;n\u0026#92;n;; 2012-06-01  BEGIN --------------------------------\u0026#92;n\u0026#92;n2012-08-01 * \u0026#92;\u0026quot;Some income and expense to show\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -11000 USD\u0026#92;n    Expenses:Taxes        3200 USD\u0026#92;n    Assets:US:Checking    7800 USD\u0026#92;n\u0026#92;n2012-08-02 * \u0026#92;\u0026quot;Some other conversion to be summarized\u0026#92;\u0026quot;\u0026#92;n    Assets:US:Checking   -3000 USD @ 1.25 CAD\u0026#92;n    Assets:CA:Checking    3750 CAD\u0026#92;n\u0026#92;n;; 2013-01-01  END   --------------------------------\u0026#92;n\u0026#92;n2013-02-01 * \u0026#92;\u0026quot;Some income and expense to be truncated\u0026#92;\u0026quot;\u0026#92;n    Income:Salary       -10000 USD\u0026#92;n    Expenses:Taxes        3600 USD\u0026#92;n    Assets:US:Checking    6400 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for Statement Operators demo:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E2011-01-01 open Income:Salary\n2011-01-01 open Expenses:Taxes\n2011-01-01 open Expenses:Shopping\n2011-01-01 open Liabilities:CreditCard\n2011-01-01 open Assets:US:Checking\n2011-01-01 open Assets:CA:Checking\n\n2012-07-31 S \u0026quot;Opening balance for \u0026#x27;Assets:CA:Checking\u0026#x27; (Summarization)\u0026quot;\n  Assets:CA:Checking        6000 CAD\n  Equity:Opening-Balances  -6000 CAD\n\n2012-07-31 S \u0026quot;Opening balance for \u0026#x27;Assets:US:Checking\u0026#x27; (Summarization)\u0026quot;\n  Assets:US:Checking        1400 USD\n  Equity:Opening-Balances  -1400 USD\n\n2012-07-31 S \u0026quot;Opening balance for \u0026#x27;Equity:Conversions:Previous\u0026#x27; (Summarization)\u0026quot;\n  Equity:Conversions:Previous   5000 USD\n  Equity:Opening-Balances      -5000 USD\n  Equity:Conversions:Previous  -6000 CAD\n  Equity:Opening-Balances       6000 CAD\n\n2012-07-31 S \u0026quot;Opening balance for \u0026#x27;Equity:Earnings:Previous\u0026#x27; (Summarization)\u0026quot;\n  Equity:Earnings:Previous  -6200 USD\n  Equity:Opening-Balances    6200 USD\n\n2012-07-31 S \u0026quot;Opening balance for \u0026#x27;Liabilities:CreditCard\u0026#x27; (Summarization)\u0026quot;\n  Liabilities:CreditCard   -200 USD\n  Equity:Opening-Balances   20
