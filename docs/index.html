3Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Etransactions\u003C/span\u003E\u003Cspan class=\"p\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eid\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nBeanquery however does not support \u003Ca href=\"https://groups.google.com/g/beancount/c/O0x0eZEp-Lk/m/WFnOS_flEQAJ\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Eyet\u003C/a\u003E table joining. On the other hand, the postings table returns records that include a reference to the transaction that contains them, so they are kind of pre-joined already (in addition to the fact that transaction columns are also available in the postings table).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EOne can check this by issuing the \u003Ccode\u003E.describe postings\u003C/code\u003E command:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-shell codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt;\u003Cspan class=\"w\"\u003E \u003C/span\u003E.describe\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings\ntable\u003Cspan class=\"w\"\u003E \u003C/span\u003Epostings:\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E....\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eentry\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Etransaction\u003Cspan class=\"o\"\u003E)\u003C/span\u003E\u003Cspan class=\"w\"\u003E    \u003C/span\u003E\u0026lt;\u003Cspan class=\"o\"\u003E==\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethis\u003Cspan class=\"w\"\u003E \u003C/span\u003Eis\u003Cspan class=\"w\"\u003E \u003C/span\u003Ea\u003Cspan class=\"w\"\u003E \u003C/span\u003Ereference\u003Cspan class=\"w\"\u003E \u003C/span\u003Eto\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Etransaction\u003Cspan class=\"w\"\u003E \u003C/span\u003Efrom\u003Cspan class=\"w\"\u003E \u003C/span\u003Ethe\u003Cspan class=\"w\"\u003E \u003C/span\u003Eposting\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003Eaccounts\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"o\"\u003E(\u003C/span\u003Eset\u003Cspan class=\"o\"\u003E[\u003C/span\u003Estr\u003Cspan class=\"o\"\u003E])\u003C/span\u003E\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nLet us see how we can do this by pulling both transaction meta and posting meta:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8feb8b2cb009b579ef4242386793df6d", "console": [], "id": "IaQp", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='IaQp-0' random-id='5669401b-1cc6-37a8-058b-56458ef51412'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Cash USD\u0026#92;n2023-01-01 open Expenses:Food USD\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_meta\u0026#92;\u0026quot;     ; \u0026lt;= transaction-level meta\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting1\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr1_posting2\u0026#92;\u0026quot; ; \u0026lt;= posting-level meta again\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_meta\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  my_meta: \u0026#92;\u0026quot;tr2_posting1\u0026#92;\u0026quot;\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "9ee927d14d1d2c0bc97fe174f54bdcea", "console": [], "id": "IWgg", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='IWgg-0' random-id='96bc99e4-6ac7-4474-5e8d-683fdfad5b17'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n  date, narration, account, \u0026#92;n  meta[\u0026#x27;my_meta\u0026#x27;] as posting_meta, \u0026#92;n  entry.meta[\u0026#x27;my_meta\u0026#x27;] as trans_meta\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Pulling both transaction-level and posting-level meta together\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b2ac01a197a566e5b9a78756cda5eb88", "console": [], "id": "fCoF", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date     narration      account     posting_meta  trans_meta\n----------  ----------  -------------  ------------  ----------\n2023-01-01  Shopping 1  Expenses:Food  tr1_posting1  tr1_meta  \n2023-01-01  Shopping 1  Assets:Cash    tr1_posting2  tr1_meta  \n2023-01-02  Shopping 2  Expenses:Food  tr2_posting1  tr2_meta  \n2023-01-02  Shopping 2  Assets:Cash    tr2_posting1  tr2_meta  \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "e5c66497b7e8fc58cd65dc2f0da2dc20", "console": [], "id": "LkGn", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1013-the-other_accounts-column\"\u003E10.1.3 The \u003Ccode\u003Eother_accounts\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ea7212310ca5e9f12bed49369b81dbe9", "console": [], "id": "zVRe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eother_accounts\u003C/code\u003E column is another notable column in the postings table. It contains the set of accounts from other postings in the same transaction.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "74fb5c32bd81b77ebe6769caeb39d19f", "console": [], "id": "woaO", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='woaO-0' random-id='a27c429a-eeb5-2c0a-6a29-f01149107fdb'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Liabilities:CreditCard\u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with cash\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Expenses:Misc   10 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping with credit card\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food             30 USD\u0026#92;n  Liabilities:CreditCard   -30 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;other_accounts\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "096ddcb0322b9ad2e70eb3141d589eec", "console": [], "id": "HnMC", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='HnMC-0' random-id='f4742693-0364-49bb-c4f8-9bdc2795cf70'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, other_accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Let us see, what the other_accounts column contains\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "191b312d16bb6449feb29d174e4b15f8", "console": [], "id": "wadT", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date            account                  narration          position         other_accounts       \n----------  ----------------------  -------------------------  --------  ----------------------------\n2023-01-01  Income:Salary           Salary                     -100 USD  Assets:Cash                 \n2023-01-01  Assets:Cash             Salary                      100 USD  Income:Salary               \n2023-01-02  Expenses:Food           Shopping with cash           10 USD  Assets:Cash  Expenses:Misc  \n2023-01-02  Expenses:Misc           Shopping with cash           10 USD  Assets:Cash  Expenses:Food  \n2023-01-02  Assets:Cash             Shopping with cash          -20 USD  Expenses:Food  Expenses:Misc\n2023-01-02  Expenses:Food           Shopping with credit card    30 USD  Liabilities:CreditCard      \n2023-01-02  Liabilities:CreditCard  Shopping with credit card   -30 USD  Expenses:Food               \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "2b6f3efbcfee26253cb56e1396bf6dbf", "console": [], "id": "VCRE", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELet us now use the \u003Ccode\u003Eother_accounts\u003C/code\u003E column to select all expenses that were paid with cash rather than with a credit card.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c747129ae55689439054ea6e15613dd9", "console": [], "id": "hgqU", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='hgqU-0' random-id='6f40ed8b-6eee-f553-6373-9e9d33cfa640'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position\u0026#92;nWHERE  account ~ \u0026#x27;^Expenses\u0026#x27; AND\u0026#x27;Assets:Cash\u0026#x27; IN other_accounts\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Expenses, paid with cash\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "def700a3ed5ab76660d2c89ab76924dc", "console": [], "id": "PSUk", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account         narration       position\n----------  -------------  ------------------  --------\n2023-01-02  Expenses:Food  Shopping with cash   10 USD \n2023-01-02  Expenses:Misc  Shopping with cash   10 USD \n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "2f2018d55464afaa1ad85145abde8177", "console": [], "id": "mfOT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1014-the-balance-column\"\u003E10.1.4 The \u003Ccode\u003Ebalance\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e98bc06e6c60ab4515cfcdb82a961b47", "console": [], "id": "vGiW", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne common desired output is a journal of entries over time (also called a \u201cregister\u201d in Ledger).\nFor this type of report, it is convenient to also render a column of the cumulative balance of the selected postings rows. Access to the previous row is not a standard SQL feature, so we get a little creative and provide a special column called \u201cbalance\u201d which is automatically calculated based on the previous selected rows. This provides the ability to render typical account statements such as those mailed to you by a bank. Output might look like this:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d25fbd1e29d78896e495181af55a39d2", "console": [], "id": "SYQT", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='SYQT-0' random-id='5f5e6c62-f8b5-8708-6821-58d58119f26f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Bank-A\u0026#92;n2023-01-01 open Assets:Bank-B\u0026#92;n2023-01-01 open Expenses:Misc \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -1000 USD\u0026#92;n  Assets:Bank-A    750 USD\u0026#92;n  Assets:Bank-B    250 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping using Bank-A\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    100 USD\u0026#92;n  Assets:Bank-A   -100 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Shopping using Bank-B\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    110 USD\u0026#92;n  Assets:Bank-B   -110 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Shopping using Bank-A again\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc    120 USD\u0026#92;n  Assets:Bank-A   -120 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;The \u0026lt;code\u0026gt;balance\u0026lt;/code\u0026gt; ledger:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "961a0829b8a2888d56e13b87adc4147a", "console": [], "id": "bMrW", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='bMrW-0' random-id='8c6c0a72-b3cd-82c2-c17c-ac24201437a4'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "b4658fb30c9384a8eff289c5f8947039", "console": [], "id": "PSQn", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-01  Assets:Bank-A  Salary                        750 USD   750 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD   650 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD   530 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "42c6de622c5092f1cf490138a32db274", "console": [], "id": "OfTS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that the beanquery starts counting balance from 0 and takes into account all postings, which pass through the filter. Therefore if the goal is to have a bank equivalent balance information, then one shall not put any filters, which would filter out any postings to the bank account account. E.g. if we put a filter to start later, then the result would be different.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EAlso selecting more than 1 bank account would create a result, different from what you get from your bank statement:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a0b99c3df44c17d246d68f9e1ec9688c", "console": [], "id": "lQxp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2147e6f303ee8cbb5b342f02abf185ef", "console": [], "id": "Plbk", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "0bd1be882cfedabed8002734e18993f4", "console": [], "id": "rSYo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: space-between;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='lQxp-0' random-id='99bd0fca-d20f-2026-969e-3f2d33079459'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; AND date \u0026gt; 2023-01-01\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A balance, starting later\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position  balance \n----------  -------------  ---------------------------  --------  --------\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD  -100 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD  -220 USD\n\u003C/pre\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='Plbk-0' random-id='5583e666-4ecd-5c2d-7bb2-799ead10497f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, balance\u0026#92;nWHERE account = \u0026#92;\u0026quot;Assets:Bank-A\u0026#92;\u0026quot; OR account = \u0026#92;\u0026quot;Assets:Bank-B\u0026#92;\u0026quot;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Bank-A, Bank-B balance over time\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E\u003Cpre class='text-xs'\u003E   date        account              narration           position   balance \n----------  -------------  ---------------------------  --------  ---------\n2023-01-01  Assets:Bank-A  Salary                        750 USD    750 USD\n2023-01-01  Assets:Bank-B  Salary                        250 USD   1000 USD\n2023-01-02  Assets:Bank-A  Shopping using Bank-A        -100 USD    900 USD\n2023-01-03  Assets:Bank-B  Shopping using Bank-B        -110 USD    790 USD\n2023-01-04  Assets:Bank-A  Shopping using Bank-A again  -120 USD    670 USD\n\u003C/pre\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "5b56eff702ff9eb20b0e3d9e7fcfc6b9", "console": [], "id": "HuZB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1015-the-weight-column\"\u003E10.1.5 The \u003Ccode\u003Eweight\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "093827467af79813b166cedecfc362d9", "console": [], "id": "WfYj", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe computed weight used for this posting\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add expamples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d37699fc18290d0eaaab7c089a681257", "console": [], "id": "Ynfw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"102-transactions-table\"\u003E10.2 Transactions table\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "da5aa2005a24eda2d523492e542b9d98", "console": [], "id": "LqFA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1021-the-id-column\"\u003E10.2.1 The \u003Ccode\u003Eid\u003C/code\u003E column\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a7b96f6e6046f7c159e6efdfd5e23d0f", "console": [], "id": "uDnK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA special column exists that identifies each transaction uniquely: \u201cid\u201d. It is a unique hash automatically computed from the transaction and should be stable between runs.\nThis hash is derived from the contents of the transaction object itself (if you change something about the transaction, e.g. you edit the narration, the id will change).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: even though the \u003Ccode\u003Eid\u003C/code\u003E field logically belongs to the transaction, it is not available in the \u003Ccode\u003Etransactions\u003C/code\u003E table. The only way to find it is to look in postings via traditional query.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d34c907c57a51e09900c8600fdbc6f95", "console": [], "id": "aWBL", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='aWBL-0' random-id='9d57ec11-eb34-5e76-26c9-d38c282e4c45'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Income:Salary\u0026#92;n2023-01-01 open Assets:Cash \u0026#92;n2023-01-01 open Expenses:Food \u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -100 USD\u0026#92;n  Assets:Cash      100 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n  \u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Simple ledger for to test id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "f18dee945e6316822c8af94f57969d49", "console": [], "id": "MIsd", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='MIsd-0' random-id='fc1d529d-89fe-6943-e68c-bfd621db939f'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT  date, account, narration, position, id\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Show some columns including the id column\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "03a0c2084f6527f553470ff61fdd082e", "console": [], "id": "IrqS", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E   date        account     narration   position                 id               \n----------  -------------  ----------  --------  --------------------------------\n2023-01-01  Income:Salary  Salary      -100 USD  8c969675c23279856156d912149d33a8\n2023-01-01  Assets:Cash    Salary       100 USD  8c969675c23279856156d912149d33a8\n2023-01-02  Expenses:Food  Shopping 1    10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Assets:Cash    Shopping 1   -10 USD  5801fa0babefb50972631ce070888875\n2023-01-02  Expenses:Food  Shopping 2    20 USD  95808f6293b038c097ec1436b8527193\n2023-01-02  Assets:Cash    Shopping 2   -20 USD  95808f6293b038c097ec1436b8527193\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "f9a71e6bb027e1d2ea2cf2299b6ed02d", "console": [], "id": "Lpqv", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOnce the \u003Ccode\u003Eid\u003C/code\u003E field is known, one can use it also for the transaction - level filtering.  E.g. one can use the \u003Ccode\u003EPRINT\u003C/code\u003E query (discussed later) to print the specific entry. This can be useful during debugging.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "503b68c06d9189b9ad202058bb4dd0e4", "console": [], "id": "upgv", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='upgv-0' random-id='741291c0-bc91-7ac7-5b33-7b6c24b1b752'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;PRINT from id = \u0026#x27;5801fa0babefb50972631ce070888875\u0026#x27;\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;PRINT specific entry by id\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "c8ad9277c2f1138dff67c5cba0b30ee8", "console": [], "id": "WJUG", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003E\n2023-01-02 * \u0026quot;Shopping 1\u0026quot;\n  Expenses:Food   10 USD\n  Assets:Cash    -10 USD\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "629e6aec4c87d7f9a70318c9a4bb3c21", "console": [], "id": "pCao", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"11-practical-conclusions-on-using-the-select-query\"\u003E11 Practical conclusions on using the SELECT Query\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "be1ce17f7bbf7d5c86dc22deeab94bc2", "console": [], "id": "wEIy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EFrom everything mentioned above one can probably make the following practical conclusions on usage of the SELECT query in beancount.\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Euse traditional form of the beanquery query on postings\u003C/li\u003E\n\u003Cli\u003Euse the #table form for all other tables\u003C/li\u003E\n\u003Cli\u003Eno particular need to use the \u003Cstrong\u003EFROM\u003C/strong\u003E - clause filtering in the SELECT query, as all the fields are also available for the \u003Cstrong\u003EWHERE\u003C/strong\u003E clause\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003E?? Are these conclusions correct?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7a9d02e6db36449a7a770904634a3106", "console": [], "id": "wlyU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"12-functions\"\u003E12 Functions\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "71ad1fadf2798428bb200a97e48974cc", "console": [], "id": "PieA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shell provides a list of simple function that operate on a single data column and return a new value. These functions operate on particular types. The shell implements rudimentary type verification and should be able to warn you on incompatible types.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EList of functions, available to be used in the \u003Ccode\u003ESELECT\u003C/code\u003E expression can be obtained using the \u003Ccode\u003E.help targets\u003C/code\u003E command. List of functions, available to be used in the expression of the \u003Ccode\u003EFROM\u003C/code\u003E and \u003Ccode\u003EWHERE\u003C/code\u003E clause can be obtained using the \u003Ccode\u003E.help from\u003C/code\u003E and \u003Ccode\u003E.help where\u003C/code\u003E respectively. E.g.:\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ebeanquery\u0026gt; .help targets\n\n\nThe list of comma-separated target expressions may consist of columns,\nsimple functions and aggregate functions. If you use any aggregate\nfunction, you must also provide a GROUP-BY clause.\n\nColumns\n-------\n...\n\nFunctions\n---------\n\nabs(decimal)\n...\n\nAggregate functions\n-------------------\n\n...\n\nsum(amount)\n  Calculate the sum of the amount. The result is an Inventory.\n\nsum(inventory)\n  Calculate the sum of the inventories. The result is an Inventory.\n\nsum(decimal)\nsum(int)\n  Calculate the sum of the numerical argument.\n\nsum(position)\n  Calculate the sum of the position. The result is an Inventory.\n\n...\n\nbeanquery\u0026gt;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "dd2795dae4ed63d32b6d761bea62ff42", "console": [], "id": "GrQN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"121-aggregate-functions-and-aggregate-queries\"\u003E12.1 Aggregate functions and Aggregate Queries\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f8255bf267754c741b9975c38d438614", "console": [], "id": "Ilkb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003ESELECT\u003C/code\u003E clause (and only the \u003Ccode\u003ESELECT clause\u003C/code\u003E) allows usage of the called \u003Cstrong\u003EAggregate functions\u003C/strong\u003E, in addition to the ordinary Functions.\nThe \u003Cstrong\u003EAggregate functions\u003C/strong\u003E operate on more than a single row. These functions aggregate and summarize the multiple values for the data column that they operate on.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExamples of aggregate functions include:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003ECOUNT(...)\u003C/code\u003E: Computes the number of postings selected (an integer).\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EFIRST(...)\u003C/code\u003E, \u003Ccode\u003ELAST(...)\u003C/code\u003E: Returns first or last value seen.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003EMIN(...)\u003C/code\u003E, \u003Ccode\u003EMAX(...)\u003C/code\u003E: Computes the minimum or maximum value seen.\u003C/li\u003E\n\u003Cli\u003E\u003Ccode\u003ESUM(...)\u003C/code\u003E: Sums up the values of each set. This works on amounts, positions, inventories, numbers, etc.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EA usage of at least one of the aggregate function turns a query into the \u003Cstrong\u003EAggregate Query\u003C/strong\u003E. An \u003Cstrong\u003EAggregate query\u003C/strong\u003E is a query, which produces a row of results for each group of postings that match the restricts in the \u003Ccode\u003EWHERE\u003C/code\u003E clause.  In order to identify the aggregation keys in a \u003Cstrong\u003Eclassical SQL\u003C/strong\u003E all the non-aggregate columns have to be flagged using the GROUP BY clause:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "abb213fe9cc81ed68bbbaa38bc573ed3", "console": [], "id": "mySd", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='mySd-0' random-id='a56b3b27-e7ea-86d2-4609-a4cac9da2498'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;2023-01-01 open Assets:Cash USD\u0026#92;n2023-01-01 open Income:Salary USD\u0026#92;n2023-01-01 open Expenses:Food USD\u0026#92;n2023-01-01 open Expenses:Misc USD\u0026#92;n\u0026#92;n2023-01-01 * \u0026#92;\u0026quot;Salary\u0026#92;\u0026quot;\u0026#92;n  Income:Salary   -500 USD\u0026#92;n  Assets:Cash      500 USD\u0026#92;n\u0026#92;n2023-01-02 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 1\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   10 USD\u0026#92;n  Assets:Cash    -10 USD\u0026#92;n\u0026#92;n2023-01-03 * \u0026#92;\u0026quot;Bob\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 2\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   20 USD\u0026#92;n  Assets:Cash    -20 USD\u0026#92;n\u0026#92;n2023-01-04 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 3\u0026#92;\u0026quot;\u0026#92;n  Expenses:Food   30 USD\u0026#92;n  Assets:Cash    -30 USD\u0026#92;n\u0026#92;n2023-01-05 * \u0026#92;\u0026quot;Bob\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 4\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   40 USD\u0026#92;n  Assets:Cash    -40 USD\u0026#92;n\u0026#92;n2023-01-06 * \u0026#92;\u0026quot;Alice\u0026#92;\u0026quot; \u0026#92;\u0026quot;Shopping 5\u0026#92;\u0026quot;\u0026#92;n  Expenses:Misc   50 USD\u0026#92;n  Assets:Cash    -50 USD\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Ledger for aggregate functions demo\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;python\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "df5826bc625c5c1a951ae806a9ce5969", "console": [], "id": "vGkK", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='vGkK-0' random-id='2031642e-d6c8-4cf4-ba51-4413b954c20a'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY payee, account\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Aggregate query example\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ac315d6cbba9ec167f9a4714006a08d8", "console": [], "id": "zmIa", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee     account     sum(position)  last(date)\n-----  -------------  -------------  ----------\nAlice  Expenses:Food   40 USD        2023-01-04\nBob    Expenses:Misc   60 USD        2023-01-05\nAlice  Expenses:Misc   50 USD        2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "881a13c6548f471a4abd033f7c5a2738", "console": [], "id": "NOfw", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='NOfw-0' random-id='fc3fc23c-09f3-07db-4831-06f00e4e30f3'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1, 2\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;You may also use the positional order of the targets to declare the group key, like this\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "ac315d6cbba9ec167f9a4714006a08d8", "console": [], "id": "jXAc", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee     account     sum(position)  last(date)\n-----  -------------  -------------  ----------\nAlice  Expenses:Food   40 USD        2023-01-04\nBob    Expenses:Misc   60 USD        2023-01-05\nAlice  Expenses:Misc   50 USD        2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "9a7144277ea3909be6b8d108c6b28e70", "console": [], "id": "mSxP", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='mSxP-0' random-id='5d0c59cc-337f-36fc-525f-9c07b5334df5'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account as acc, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;nGROUP BY 1, acc\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Furthermore, if you name your targets, you can use the explicit target names:\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "340a8cd2da6f7ab21c49aa13597feeec", "console": [], "id": "IZEX", "outputs": [{"data": {"text/html": "\u003Cpre class='text-xs'\u003Epayee       acc       sum(position)  last(date)\n-----  -------------  -------------  ----------\nAlice  Expenses:Food   40 USD        2023-01-04\nBob    Expenses:Misc   60 USD        2023-01-05\nAlice  Expenses:Misc   50 USD        2023-01-06\n\u003C/pre\u003E"}, "type": "data"}]}, {"code_hash": "c93c18086b3b9e8a3c2175e1d4780d50", "console": [], "id": "UFLA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EUnlike the classical SQL, the beanquery engine however is smart enough to understand what are the grouping keys, without them being explicitly specified. So, it is possible to omit the \u003Ccode\u003EGROUP BY\u003C/code\u003E clause at all:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "24fb742f82197fea0b305b36c9e21fb3", "console": [], "id": "RCUM", "outputs": [{"data": {"text/html": "\u003Cmarimo-ui-element object-id='RCUM-0' random-id='6ebdccbb-8fa5-f9e4-a233-76b2995d9648'\u003E\u003Cmarimo-code-editor data-initial-value='\u0026quot;SELECT \u0026#92;n    payee, account, sum(position), last(date)\u0026#92;nWHERE \u0026#92;n    account ~ \u0026#92;\u0026quot;^Expenses\u0026#92;\u0026quot;\u0026#92;n\u0026#92;n\u0026quot;' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;Aggregate query example\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-language='\u0026quot;sql\u0026quot;' data-placeholder='\u0026quot;\u0026quot;' data-disabled='false' data-min-height='1' data-show-copy-button='true' data-debounce='true'\u003E\u003C/marimo-code-editor\u003E\u003C/marimo-ui-element\u003E"}, "type": "data"}]}, {"code_hash": "4a08f094ec40ef2ccf30415e2a81e11e", "console": [], "id": "ynmH", "outputs": []}, {"code_hash": "5eea0ca4ec2d22e62773559a73e99751", "console": [], "id": "NBGo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"122-notable-functions\"\u003E12.2 Notable functions\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0902eb697051ab3f1f4f487b91cfbaee", "console": [], "id": "eooq", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section discusses some of the notable functions, available in beanquery\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "97b56b5a5c74d16532d504e669a1d852", "console": [], "id": "ChmK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1221-sum\"\u003E12.2.1 SUM()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "73a36f683eb1cfcfae4b3f893ad30117", "console": [], "id": "KdvC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003ESUM()\u003C/code\u003E function is probably the most widely used aggregate function in beanquery.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Esum(amount)\n  Calculate the sum of the amount. The result is an Inventory.\n\nsum(inventory)\n  Calculate the sum of the inventories. The result is an Inventory.\n\nsum(decimal)\nsum(int)\n  Calculate the sum of the numerical argument.\n\nsum(position)\n  Calculate the sum of the position. The result is an Inventory.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nThe usage of the \u003Ccode\u003ESUM()\u003C/code\u003E function for a simple case is already demonstrated in the \u003Cstrong\u003EAggregate Functions\u003C/strong\u003E section.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us apply the \u003Ccode\u003Esum()\u003C/code\u003E function to the more complex ledger with lots, tracked at cost and to different commodities.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote: for illustrative purposes on the right sit the same ledger is printed using the PRINT query command to show the full internal representation of the lot cost (with the cost date and the cost label. E.g. 1 IVV {10 USD, \u003Cstrong\u003E2023-01-11}\u003C/strong\u003E`)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "b896548f7b7f7ba6ba9d29b95c8ba2fe", "console": [], "id": "vkvV", "outputs": []}, {"code_hash": "051d317e54cd417f12923ef9cb4edccc", "console": [], "id": "EKSN", "outputs": []}, {"code_hash": "e39979b6693f5fa6d9a9533f4180da42", "console": [], "id": "tasN", "outputs": []}, {"code_hash": "80b16f5300d855c6608f73602ce3a70b", "console": [], "id": "SXvM", "outputs": []}, {"code_hash": "fd35d3e6ec68ba7ed2fe9d54df121738", "console": [], "id": "CFll", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe sum of positions is an inventory\u003Cbr\u003E\n  note, that the way resulting inventory (the sum of positions) is displayed in beanquery may be is a bit confusing, as the cost date cost and label are not displayed (see \u003Ca href=\"https://groups.google.com/g/beancount/c/jdNCyhyq3Ug\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Ethis\u003C/a\u003E discussion).\n  The more complete representation would be :\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E            sum(position)\n-------------------------------------------\n10   IPP\n1000 IVV\n100  IVV {20 USD, 2023-01-13}\n40   IVV {20 USD, 2023-01-12, \u0026quot;lot-label\u0026quot;}\n30   IVV {20 USD, 2023-01-12}\n1    IVV {10 USD, 2023-01-11}\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Esum()\u003C/code\u003E function joins different lots together, following the rules, which beancount uses to build inventories (see more in the document \u003Ca href=\"https://docs.google.com/document/d/11a9bIoNuxpSOth3fmfuIFzlZtpTJbvw-bPaQCnezQJs\" rel=\"noopener noreferrer\" target=\"_blank\"\u003EHow Inventories Work\u003C/a\u003E):\u003Cul\u003E\n\u003Cli\u003Edifferent commodities are not summed together (\u003Ccode\u003E10 IPP\u003C/code\u003E and \u003Ccode\u003E1000 IVV\u003C/code\u003E are not added together).\u003C/li\u003E\n\u003Cli\u003Eeven when commodities are the same, lots are added together only when all elements of the cost are also the same: the same cost commodity, the same cost date, the same cost label (if available). E.g. in the above example only the following 2 lots are added together:\u003Cbr\u003E \u003Ccode\u003E10 IVV {20 USD, 2023-01-12} + 20 IVV {20 USD, 2023-01-12} = 30 IVV {20 USD, 2023-01-12}\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e181efcf155eef21719f37511de1f32f", "console": [], "id": "wbrJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0875224e750c93bcae48d1956b58754e", "console": [], "id": "viyg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1222-units-cost\"\u003E12.2.2 UNITS(), COST()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ac2d409cc985d524b33d31748bbaf209", "console": [], "id": "GbuD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Ecost(position)\n  Get the cost of a position.\n\ncost(inventory)\n  Get the cost of an inventory.\n\n\nunits(position)\n  Get the number of units of a position (stripping cost).\n\nunits(inventory)\n  Get the number of units of an inventory (stripping cost).\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us see results of these functions on the same ledger, which was used to demonstrate the \u003Ccode\u003ESUM()\u003C/code\u003E function.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "731ba232ba7e852e410bdfc1ddd67fe8", "console": [], "id": "bHhy", "outputs": []}, {"code_hash": "05c129d114c33c55b3638944fa869f26", "console": [], "id": "ctlq", "outputs": []}, {"code_hash": "4c4f113d73ea1193ae7cdc903c5a751a", "console": [], "id": "NtNR", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Ecost()\u003C/code\u003E function always returns some result, even in case the position is not \"held at cost\".  In case there is no cost, the cost function returns units.\u003C/li\u003E\n\u003Cli\u003Ethe \u003Ccode\u003Ecost()\u003C/code\u003E function only returns a cost amount (decimal number and commodity), without the cost date and label\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EBoth the \u003Ccode\u003Ecost()\u003C/code\u003E and \u003Ccode\u003Eunits()\u003C/code\u003E functions can operate on positions as well as on inventories. That means, that one can apply these functions either to columns or to the output of the \u003Ccode\u003Esum()\u003C/code\u003E function in the aggregate query.  Let us demonstrate this on the same ledger, which was used for the \u003Ccode\u003ESUM()\u003C/code\u003E function demo:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "aaf4cee1af54d9be276ec0b0211b0183", "console": [], "id": "nebC", "outputs": []}, {"code_hash": "bc3742deddaebae2f3550cc4e51519d9", "console": [], "id": "ZsHO", "outputs": []}, {"code_hash": "3742d55763d92e5e04955ffb5e9c9d14", "console": [], "id": "HNXk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve, that:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Ccode\u003Ecost(sum(position))\u003C/code\u003E produces the same result as the \u003Ccode\u003Esum(cost(position))\u003C/code\u003E. In another words, the \u003Ccode\u003Ecost()\u003C/code\u003E function, does some internal summing. when applied to an inventory. The same is applicable to the \u003Ccode\u003Eunits()\u003C/code\u003E.\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "745d201864379fac4428fb672278f3eb", "console": [], "id": "bhgI", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1223-convert\"\u003E12.2.3 CONVERT()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7535e501a9e7834708ba2459d46af50c", "console": [], "id": "DlKN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBeancount offers first-class support for multi-currency accounting. The \u003Ccode\u003ECONVERT()\u003C/code\u003E function is a key element of it.\u003C/span\u003E\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Econvert(amount, str)\nconvert(amount, str, date)\n  Coerce an amount to a particular currency.\n\nconvert(position, str)\nconvert(position, str, date)\n  Coerce a position to a particular currency.\n\nconvert(inventory, str)\nconvert(inventory, str, date)\n  Coerce an inventory to a particular currency.\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Cul\u003E\n\u003Cli\u003EThe first argument is the amount, position, or inventory to be converted.\u003C/li\u003E\n\u003Cli\u003EThe second argument is the target commodity to convert to.\u003C/li\u003E\n\u003Cli\u003EThe third (optional) argument is the date at which the exchange rate is looked up. Note that:\u003Cul\u003E\n\u003Cli\u003Ethe function picks the latest price available on or before (but not after) the specified date\u003C/li\u003E\n\u003Cli\u003Eif the date is omitted, the latest available price is used (?? this may have limited practical financial meaning)\u003C/li\u003E\n\u003C/ul\u003E\n\u003C/li\u003E\n\u003Cli\u003EEven though not mentioned explicitly, \u003Ccode\u003ECONVERT()\u003C/code\u003E internally uses the \u003Cstrong\u003Eprices\u003C/strong\u003E table, which is populated by \u003Ccode\u003Eprice\u003C/code\u003E directives. Beanquery hides this complexity from users.\u003C/li\u003E\n\u003Cli\u003EPrice specifications are reciprocal. In other words, the following two entries are equivalent:\n  \u003Cdiv class=\"language-cbmbas codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"mf\"\u003E2024\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E01\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E01\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eprice\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EXXX\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mf\"\u003E2.0\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EYYY\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n  \u003Cdiv class=\"language-cbmbas codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"mf\"\u003E2024\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E01\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E01\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003Eprice\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EYYY\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mf\"\u003E0.5\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EXXX\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EIn practice, there are several ways to use the \u003Ccode\u003Edate\u003C/code\u003E parameter:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003ESpecify a fixed date (e.g. \u003Ccode\u003E2023-01-02\u003C/code\u003E). This is typically used in queries that convert \u003Cstrong\u003EAssets\u003C/strong\u003E and \u003Cstrong\u003ELiabilities\u003C/strong\u003E to a target currency, since under accepted accounting practices these are translated using the exchange rate in effect on the date of the \u003Cstrong\u003ENet Worth report\u003C/strong\u003E.\u003C/li\u003E\n\u003Cli\u003EPass the \u003Ccode\u003Edate\u003C/code\u003E column as the date parameter. In this case \u003Ccode\u003ECONVERT()\u003C/code\u003E uses the posting date to look up the exchange rate, so each posting may use a different rate. This is typically used to convert \u003Cstrong\u003EIncome\u003C/strong\u003E and \u003Cstrong\u003EExpenses\u003C/strong\u003E, since under accepted accounting practices these are translated using the exchange rate in effect on the transaction date.\u003C/li\u003E\n\u003Cli\u003EOmit the date parameter entirely. In this case \u003Ccode\u003ECONVERT()\u003C/code\u003E uses the latest available exchange rate (this may have limited accounting meaning).\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003ELet us demonstrate this with a simple example:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7f56fdfd00cf9332e56a2efaf2a52b31", "console": [], "id": "iFMf", "outputs": []}, {"code_hash": "c5a6ab3be2a40f15d33ce92490237a6f", "console": [], "id": "QYfb", "outputs": []}, {"code_hash": "b7b1e429f73f93efcd147e0b35ef7b75", "console": [], "id": "qJXu", "outputs": []}, {"code_hash": "c35e016b72b82fd1b6a6dd6fb7e019b4", "console": [], "id": "LdJG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIf no exchange rate is available, \u003Ccode\u003ECONVERT()\u003C/code\u003E returns the value in the original currency.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor example, let us try to convert the previous ledger to EUR.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1699093ca864202cb8551f9aa0edca67", "console": [], "id": "fOSF", "outputs": []}, {"code_hash": "430e52a7e7dd9c45a2dc57ce28c415fe", "console": [], "id": "gZOs", "outputs": []}, {"code_hash": "f8bba7296ae78818cbcb04485d864a41", "console": [], "id": "wtAr", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EWhen converting a position that has a cost, \u003Ccode\u003ECONVERT()\u003C/code\u003E converts the \u003Ccode\u003EUNITS\u003C/code\u003E amount and ignores the cost.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn the example below, the purchase price is deliberately set differently from the official exchange rate specified by the \u003Ccode\u003Eprice\u003C/code\u003E directive, to illustrate that \u003Ccode\u003ECONVERT()\u003C/code\u003E uses only the rate from the \u003Ccode\u003Eprice\u003C/code\u003E directive.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a5574d99871543c21a1c211f2fa1d9b7", "console": [], "id": "SQfX", "outputs": []}, {"code_hash": "df780b03a2958836f204837fd77e6ea3", "console": [], "id": "HRKw", "outputs": []}, {"code_hash": "b2b6d6fda9583778e862e63441171d03", "console": [], "id": "MYoQ", "outputs": []}, {"code_hash": "a16b5c576f969872c52db0c60bc27cd0", "console": [], "id": "BzwM", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EFor aggregate queries, you can either convert an inventory created by \u003Ccode\u003ESUM()\u003C/code\u003E, or sum the results of \u003Ccode\u003ECONVERT()\u003C/code\u003E. Note that the former approach is not possible when a different exchange rate must be applied to each posting (i.e., when the \u003Ccode\u003Edate\u003C/code\u003E column is used instead of a fixed date).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fceab93ce116c56fd42e32e7b42578f5", "console": [], "id": "nSRe", "outputs": []}, {"code_hash": "ff2ee7a74c1b290e751b1d3644d749c0", "console": [], "id": "TmyF", "outputs": []}, {"code_hash": "b588749f8479d8c185b7e0fc1422e873", "console": [], "id": "tbSj", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1224-root\"\u003E12.2.4 ROOT()\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d83816961540d49e1a491d404fc6b64f", "console": [], "id": "lPrT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add some info\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0004abc7f758bfcff872fe2ccb50d1c7", "console": [], "id": "KoaX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"13-controlling-query-results\"\u003E13 Controlling query results\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "57a4791bfd1055a0fc11a250a4b068df", "console": [], "id": "eLzN", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"131-distinct\"\u003E13.1 DISTINCT\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "22fcb37293c269a0ce883af1c6903841", "console": [], "id": "JHzP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThere is a post-filtering phase that supports uniquifying result rows. You can trigger this unique filter with the DISTINCT flag after SELECT, as is common in SQL, e.g.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add practical examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7f92b38bed25b0d74d0fe37f4b9cb2c2", "console": [], "id": "elJp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"132-order-by\"\u003E13.2 ORDER BY\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5ae6af8da2397b44fa180b5fb5a261de", "console": [], "id": "EyBw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EAnalogous to the GROUP BY clause is an ORDER BY clause that controls the final ordering of the result rows:\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT \u2026\nGROUP BY account, payee\nORDER BY payee, date;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\nThe clause is optional. If you do not specify it, the default order of iteration of selected postings is used to output the results (that is, the order of transactions-sorted by date- and then their postings).\nAs in SQL, you may reverse the order of sorting by a DESC suffix (the default is the same as specifying ASC):\n\u003Cdiv class=\"language-text codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003ESELECT \u2026\nGROUP BY account, payee\nORDER BY payee, date DESC;\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ETODO#: add examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "559d928d7b306858778e186a47a11509", "console": [], "id": "MrKo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"133-limit\"\u003E13.3 LIMIT\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d86e63160ea211ac19c4918a50a8e939", "console": [], "id": "ngkg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe beanquery also supports a LIMIT clause to interrupt output row generation:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003ESELECT \u2026 LIMIT 100;\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis would output the first 100 result rows and then stop. While this is a common clause present in the SQL language, in the context of double-entry bookkeeping it is not very useful: we always have relatively small datasets to work from. Nevertheless, it is provided for completeness.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003ETODO#: add examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5ccfd2737a8cecd7217ca4056dfd5a12", "console": [], "id": "BNjl", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"14-statement-operators-open-on-close-on-clear\"\u003E14 Statement operators (OPEN ON, CLOSE ON, CLEAR)\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3727aa205c98b3e9d3c2f4ad1e950681", "console": [], "id": "zLYB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shell provides a few operators designed to facilitate the generation of balance sheets and income statements. The particular methodology used to define these operations should be described in detail in the \u003Ca href=\"https://docs.google.com/document/d/100tGcA4blh6KSXPRGCZpUlyxaRUwFHEvnz_k9DyZFn4/edit?usp=sharing\" rel=\"noopener noreferrer\" target=\"_blank\"\u003E\u201cintroduction to double-entry bookkeeping\u201d\u003C/a\u003E document that accompanies Beancount and is mostly located in the source code in the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize\u003C/a\u003E module.\nThese special operators are provided on the FROM clause that is made available on the various forms of query commands in the shell. These further transform the set of entries selected by the FROM expression at the transaction levels (not postings).\nPlease note that these are not from standard SQL; these are extensions provided by this shell language only.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor demonstrations let us use the following ledger (borrowed with some changes from the \u003Ca href=\"https://github.com/beancount/beancount/blob/master/beancount/ops/summarize_test.py\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esummarize_test\u003C/a\u003E)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c352c8da2d2339d810509bd51294d047", "console": [], "id": "ofkl", "outputs": []}, {"code_hash": "93f48ffbb9f588dd573a1ca8ac995315", "console": [], "id": "jaBo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1401-opening-a-period-open-on-clause\"\u003E14.0.1 Opening a Period (OPEN ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d92b52aa88faa9c6d589716884e9544b", "console": [], "id": "YCKg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOpening an exercise period at a particular date replaces all entries before that date by summarization entries that book the expected balance against an Equity \u201copening balances\u201d account and implicitly clears the income and expenses to zero by transferring their balances to an Equity \u201cprevious earnings\u201d account (see beancount.ops.summarize.open() for implementation details)\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "546657158cab5b13e3b34fc2304d9a92", "console": [], "id": "TzTD", "outputs": []}, {"code_hash": "2011319e3cedbd5a9733b3827c7ed32b", "console": [], "id": "ywjc", "outputs": []}, {"code_hash": "4187297008fece96ea93324c9ebd5451", "console": [], "id": "WyQu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts on the date before 2012-08-01  without and with OPEN ON 2012-08-01 clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "25c2ec94688850a32a4df00108141a91", "console": [], "id": "dGch", "outputs": []}, {"code_hash": "1de01b3a001e93854fabc1365151e9b5", "console": [], "id": "DpZg", "outputs": []}, {"code_hash": "fdb70b22a5ba5f6032d11efe9c76393a", "console": [], "id": "NFPl", "outputs": []}, {"code_hash": "ea16be637fb83ed6129236da81abedcf", "console": [], "id": "BxxS", "outputs": []}, {"code_hash": "344c066f0596dd958caa1e6917be38ee", "console": [], "id": "ZpGF", "outputs": []}, {"code_hash": "66ef29534f154de4b1f6cae4b445f75e", "console": [], "id": "MXkk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne can see that balances on Assets and Liabilities did not change, but Income and Expenses were summarized into Equity:Earnings:Previous.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ad0ebf4f01113c9d1731539e48cb708f", "console": [], "id": "Iijd", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1402-closing-a-period-close-on-clause\"\u003E14.0.2 Closing a Period (CLOSE ON clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "67603d20c0ca94192359d274d2a0c558", "console": [], "id": "axEp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EClosing an exercise period involves mainly truncating all entries that come after the given date and ensuring that currency conversions are correctly corrected for (see beancount.ops.summarize.close() for implementation details).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ENote that the closing date should be one day after the last transaction you would like to include (this is in line with the convention we use everywhere in Beancount whereby starting dates are inclusive and ending dates exclusive).\nThe closing date is optional. If the date is not specified, the date one day beyond the date of the last entry is used.\nClosing a period leaves the Income and Expenses accounts as they are, that is, their balances are not cleared to zero to Equity. This is because closing is also used to produce final balances for income statements. \u201cClearing\u201d, as described in the next section, is only needed for balance sheets.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c57ca7fa331d2e276b8248f335e64dd0", "console": [], "id": "mKKx", "outputs": []}, {"code_hash": "86a97061e997c681fc68481569c9501a", "console": [], "id": "JWOG", "outputs": []}, {"code_hash": "907a30e971f6fc96961cc88f599fcccb", "console": [], "id": "IWwC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E??\u003C/strong\u003E What is this   @ 0 NOTHING. Why is this needed?\nWhy is it not possible to put this like this\u003C/span\u003E\n\u003Cdiv class=\"language-cbmbas codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"mf\"\u003E2012\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E12\u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E31\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EC\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"s\"\u003E\u0026quot;Conversion for (-8000 USD, 9750 CAD)\u0026quot;\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E   \u003C/span\u003E\u003Cspan class=\"mf\"\u003E8000\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003EUSD\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"err\"\u003E@@\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"n\"\u003EEquity\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003EConversions\u003C/span\u003E\u003Cspan class=\"p\"\u003E:\u003C/span\u003E\u003Cspan class=\"n\"\u003ECurrent\u003C/span\u003E\u003Cspan class=\"w\"\u003E  \u003C/span\u003E\u003Cspan class=\"o\"\u003E-\u003C/span\u003E\u003Cspan class=\"mf\"\u003E9750\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"n\"\u003ECAD\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "913e7018c592587fcbb8caa6e9a7b605", "console": [], "id": "HVQd", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1403-clearing-income-expenses-clear-clause\"\u003E14.0.3 Clearing Income \u0026amp; Expenses (CLEAR clause)\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "17f060e06f10d086ddb3c170094bfa61", "console": [], "id": "ipMD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIn order to produce a balance sheet, we need to transfer final balances of the Income and Expenses to an Equity \u201ccurrent earnings\u201d account (sometimes called \u201cretained earnings\u201d or \u201cnet income\u201d; you can select the specific account name to use using options in the input file). The resulting balances of income statement accounts should be zero (see beancount.ops.summarize.clear() for implementation details).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3399baf8e6c755597a59c00189c2c184", "console": [], "id": "pgJK", "outputs": []}, {"code_hash": "8f957af9932f68d364c8a10380edba9e", "console": [], "id": "XAze", "outputs": []}, {"code_hash": "58cc6d2993ab3087384c440d33bb821d", "console": [], "id": "cwqn", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo make it more demonstrative, let's compare balances of accounts without and with CLEAR clause\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4689f02b4a4d4639b12abbb3b0d33f52", "console": [], "id": "eYRD", "outputs": []}, {"code_hash": "16efabb81655b2060ac771053a218811", "console": [], "id": "XZIo", "outputs": []}, {"code_hash": "35916c7eefd77076017d80773d0178c4", "console": [], "id": "cNyH", "outputs": []}, {"code_hash": "67f3ac9676a1ed57ada325dcd3f9bbd4", "console": [], "id": "VjEH", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve, that the \u003Ccode\u003EEquity:Earnings:Current\u003C/code\u003E (by default) contains the net income accumulated during the preceding period. No balances for the Income nor Expenses accounts appear in the output.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "f091f9a599dc6345e73bd1dec03481ee", "console": [], "id": "zesr", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch4 id=\"1404-example-statements\"\u003E14.0.4 Example Statements\u003C/h4\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "e0ed060aa63a3037a39af0392baba1fb", "console": [], "id": "ISrK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe statement operators of course may be combined. For instance, if you wanted to output data for an income statement for year 2012, you could issue the following statement:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "cdeffe3f059054dee3749085838ab5f0", "console": [], "id": "oXQC", "outputs": []}, {"code_hash": "388c89bffef6c7fe7c498ff34d0dc93e", "console": [], "id": "xqqY", "outputs": []}, {"code_hash": "c4b416c3c1c9bbdc89c27adae255c8d6", "console": [], "id": "vAZI", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe same can be achieved by using more traditional WHERE filtering:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7c1c4cc79f2481ec780154e541e1d8c5", "console": [], "id": "Cvjs", "outputs": []}, {"code_hash": "388c89bffef6c7fe7c498ff34d0dc93e", "console": [], "id": "NGNk", "outputs": []}, {"code_hash": "ebec5ac0613338d51739650c174ba08e", "console": [], "id": "CWwK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ETo generate a balance sheet, you would add the CLEAR option and select the other accounts:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "65e6f53cb875e375f1855f92604ed976", "console": [], "id": "gYFm", "outputs": []}, {"code_hash": "afb287395434b21ab1e290e786aa6b94", "console": [], "id": "iCCe", "outputs": []}, {"code_hash": "1f45d5c8a7d82e1402b691b2dcd5262f", "console": [], "id": "ZVxg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"15-high-level-shortcuts-journal-balance-print\"\u003E15 High-level shortcuts (JOURNAL, BALANCE, PRINT)\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4d8e1a58b3440237d28e0167f3011599", "console": [], "id": "RzLA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThere are two types of queries that are very common for accounting applications: journals and balances reports. This section describes a few additional selection commands that translate directly into SELECT statements and which are then run with the same query code. These are intended as convenient shortcuts.  ?? It looks like the equivalent SELECT statements are more flexible (see more below).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIn this section we will be using the following ledger for all the examples:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "332baf8687196e45943a294d0aa74906", "console": [], "id": "oRYm", "outputs": []}, {"code_hash": "22fff68e6ecd1c09a0ef1279e8301513", "console": [], "id": "CtVA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"151-selecting-journals-journal-query\"\u003E15.1 Selecting Journals (JOURNAL query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "76f5ba720a3f5fc461cbe6f99f338fe5", "console": [], "id": "TSoP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EA common type of query is one that generates a linear journal of entries (Ledger calls this a \u201cregister\u201d). This roughly corresponds to an account statement, but with our language, such
