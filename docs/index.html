a statement can be generated for any subset of postings.\nYou can generate a journal with the following syntax:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EJOURNAL \u0026lt;account-regexp\u0026gt; [AT \u0026lt;function\u0026gt;] [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe regular expression account-regexp is used to select which subset of accounts to generate a journal for. The optional \u003Ccode\u003EAT \u0026lt;function\u0026gt;\u003C/code\u003E clause is used to specify an aggregation function for the amounts rendered (typically \u003Ccode\u003EUNITS\u003C/code\u003E or \u003Ccode\u003ECOST\u003C/code\u003E). The \u003Ccode\u003EFROM\u003C/code\u003E clause follows the same rules as for the \u003Ccode\u003ESELECT\u003C/code\u003E statement and is optional.\nHere is an example journal-generating query:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4c0d164e2991a13010dcd69a59135968", "console": [], "id": "vWAQ", "outputs": []}, {"code_hash": "ee092d8a3be6bb98c818f27be691fa44", "console": [], "id": "opEZ", "outputs": []}, {"code_hash": "a96caeb65f7dc05b8cf34ed72e48a4b7", "console": [], "id": "zhCr", "outputs": []}, {"code_hash": "2e539e8faf09a4c9f356e215ee27912a", "console": [], "id": "CCxq", "outputs": []}, {"code_hash": "f9307e4def91b26e2437cb401ee7af66", "console": [], "id": "jKDm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"152-selecting-balances-balances-query\"\u003E15.2 Selecting Balances (BALANCES query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "881af78b6b39fc06e612019723dc38e0", "console": [], "id": "OcMK", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe other most common type of report is a table of the balances of various accounts at a particular date. This can be viewed as a SELECT query aggregating positions grouping by account.\nYou can generate a balances report with the following syntax:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EBALANCES [AT \u0026lt;function\u0026gt;] [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe optional \u003Ccode\u003EAT \u0026lt;function\u0026gt;\u003C/code\u003E clause is used to specify an aggregation function for the balances rendered (usually UNITS or COST). The \u003Ccode\u003EFROM\u003C/code\u003E clause follows the same rules as for the SELECT statement and is optional.\nTo generate your balances at a particular date, close your set of entries using the \u003Ccode\u003EFROM\u2026 CLOSE ON\u003C/code\u003E form described above.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EObserve that typical balance sheets and income statements seen in an accounting context are subsets of tables of balances such as reported by this query. An income statement reports on just the transactions that appears during a period of time, and a balance sheet summarizes transactions before its reporting before and clears the income \u0026amp; expenses accumulated during the period to an equity account. Then some minor reformatting is carried out. Please consult the introduction document on double-entry bookkeeping for more details, and the section above that discusses the \u201copen\u201d, \u201cclose\u201d and \u201cclear\u201d operations.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5d683ff6532e8807460b35f2e3996293", "console": [], "id": "QuIQ", "outputs": []}, {"code_hash": "280cee5c7dfbf6c3a45a652e347a7bae", "console": [], "id": "ZzbA", "outputs": []}, {"code_hash": "fd350b514cec11895b7bf63d7ffe62f1", "console": [], "id": "ETTw", "outputs": []}, {"code_hash": "6ecc96f793aa68162aaff6d55d079531", "console": [], "id": "BxLv", "outputs": []}, {"code_hash": "15a73c2bda6e9dc59a43b24f08b6065f", "console": [], "id": "IiyY", "outputs": []}, {"code_hash": "849712299a3e53463db455c5e2246081", "console": [], "id": "rKHS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E?? Seems that the SELECT ... WHERE  offers the same functionality, but with a better flexibility. E.g. it is also possible to filter spesific accounts, and / or apply the root() function to accounts.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.: would it be possible to do the following with the BALANCES query, where we select balances only for assets?\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "c7715c6e1b6d174d75ac386811379855", "console": [], "id": "SStq", "outputs": []}, {"code_hash": "9c60a2aebe3cfadf6c7abddd2a5cee6f", "console": [], "id": "LNTb", "outputs": []}, {"code_hash": "9a1786fdb103e610033becbbd3fb22dc", "console": [], "id": "dGVZ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"153-print-print-query\"\u003E15.3 Print (PRINT query)\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3f27d659bb688cee020c72f172ce51e3", "console": [], "id": "MwfG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EIt can be useful to generate output in Beancount format, so that subsets of transactions can be saved to files, for example. The shell provides that ability via the PRINT command:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003EPRINT [FROM \u2026]\u003C/code\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe FROM clause obeys the usual semantics as described elsewhere in this document. The resulting filtered stream of Beancount entries is then printed out on the output in Beancount syntax.\nIn particular, just running the \u003Ccode\u003EPRINT\u003C/code\u003E command will spit out the parsed and loaded contents of a Beancount file. You can use this for troubleshooting if needed, or to expand transactions generated from a plugin you may be in the process of developing.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EExample:\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "badf3b038768bec54e96988312c59f9d", "console": [], "id": "TxKU", "outputs": []}, {"code_hash": "5a8e7171febb002956edc981929d1815", "console": [], "id": "cPpt", "outputs": []}, {"code_hash": "feaac33b7d5294c897f11e3f3584072d", "console": [], "id": "hBDP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote, that unlike any other type of query commands, the \u003Ccode\u003EPRINT\u003C/code\u003E does not produce a tabular data, but just a text output.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "51f5f87c2667b73d3e154582284f09f8", "console": [], "id": "ieTG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"16-usage-of-beanquery-with-data-frame\"\u003E16 Usage of beanquery with Data Frame\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4427d2e080c91086c05fd8c71899c04b", "console": [], "id": "mVhx", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add information\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ba9daf334217d43d70de01e126c41670", "console": [], "id": "nnaP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"17-working-around-beanquery-limitations\"\u003E17 Working around beanquery limitations\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "da77d56218bc2c92e5b0288805c5b73a", "console": [], "id": "UJiw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section will discuss of the beanquery limitations and how to work around them\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: add information\u003C/em\u003E\u003C/span\u003E\n\u003Ch3 id=\"no-pivot-functionality\"\u003ENo PIVOT functionality\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EUse dataframes\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"no-table-joining\"\u003ENo table joining\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EUse built in functions\u003C/li\u003E\n\u003Cli\u003EUse data frames\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "47183065b7f4aea83e1b258d670cace5", "console": [], "id": "rEHw", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"18-example-queries-for-typical-situations\"\u003E18 Example queries for typical situations\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0fd79863c5fabc05aee5ce8c55dee116", "console": [], "id": "nRku", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThis section collects example of queries to be used in different practical situations\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003E#TODO: don't by shy to add lots  of examples\u003C/em\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0881fb2d9bd0602e894505a8a3c01489", "console": [], "id": "zmDD", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"181-net-worth-and-pl-like-reports-in-multi-commodities-ledger\"\u003E18.1 Net Worth and P\u0026amp;L-like reports in multi-commodities ledger\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a8a99371ad1dcbf307230c3096a3eddc", "console": [], "id": "ZpYI", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EOne of the typical situations is when some (or all) of Income and  Expenses are done in one currency, but reporting has to be done in another currency. Throughout the accounting period one currency fluctuates against another currency.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EE.g.: let us look at the situation when Income and Expenses are in one currency (TUG), but reporting has to be done in USD. Throughout the accounting period the value of TUG drops from 1 USD to 0.25 USD.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "65a1e980d49016e172d78a3071c46c86", "console": [], "id": "oDJM", "outputs": []}, {"code_hash": "b9962501b11d8a1de4ae5bbde4181c91", "console": [], "id": "cFzV", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ENote that, following accepted accounting practices, \u003Cstrong\u003EAssets\u003C/strong\u003E and \u003Cstrong\u003ELiabilities\u003C/strong\u003E are translated into the reporting currency using the exchange rate in effect on the date of the \u003Cstrong\u003ENet Worth report\u003C/strong\u003E. For instance, to determine the current value of your bitcoins, you need to know only your current bitcoin holdings and the current bitcoin price, not the various exchange rates at which you bought them in the past.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, broken by accounts the Net-Worth-like report for Y2023 could look like this (for illustration purpose let us also add a column in the original currency):\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "9c85325640bd686c8398a66c723db508", "console": [], "id": "oPFs", "outputs": []}, {"code_hash": "ea3954cd93f74d95aa1b7e419095c528", "console": [], "id": "HGJL", "outputs": []}, {"code_hash": "c8ffe217fb0087c313082e78b0e8a82a", "console": [], "id": "IRGU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EFor P\u0026amp;L -like report, inline with accepted accounting practices  \u003Cstrong\u003EIncome\u003C/strong\u003E, \u003Cstrong\u003EExpenses\u003C/strong\u003E, and \u003Cstrong\u003ELiabilities\u003C/strong\u003E are translated into the reporting currency using the exchange rate in effect on the transaction date (in contrast to the Net Worth report, which uses the exchange rate on the report date).\nThus, for example, if you purchased an item for 60 Turkish lira while on vacation in Turkey when 60 lira equaled 2 USD, it will remain 2 USD in the P\u0026amp;L report, regardless of subsequent exchange rate fluctuations.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ESo, the P\u0026amp;L -like report could look like this (for illustration purpose let us also add a column in the original currency):\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "95cdacd7856899295b10e0868b19ab23", "console": [], "id": "HqwE", "outputs": []}, {"code_hash": "1fadfa79cc0e46ce732e3dcc0ebdbaf6", "console": [], "id": "MepM", "outputs": []}, {"code_hash": "5b6ab9ee2b0fd72897627889c17e5358", "console": [], "id": "jgCY", "outputs": []}, {"code_hash": "9db314460181dfd2718f87d08f88f1c1", "console": [], "id": "BVRn", "outputs": []}, {"code_hash": "5052310af62d3dd69fb4056686781f63", "console": [], "id": "QzPM", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EObserve, that in this case the P\u0026amp;L report (1750 USD) does not explain the change in the Net Worth in Y2023 (0 USD =\u0026gt; 750 USD). However the P\u0026amp;L in TUG (3000 TUG) does explain the change in the Net Worth (3000 TUG).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is expected and is happening, because the value of TUG was constantly dropping throughout the year against USD.\nTo be able to do the Net Worth reconciliation in the reporting currency (USD in this case) one has to take into account unrealized gains / losses due exchange rate changes (e.g. using the \u003Ca href=\"https://github.com/Ev2geny/evbeantools/blob/main/docs/sing_curr_conv.md\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Esing_curr_conv\u003C/a\u003E tool).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "54618cfc1937cd688959648ed35141ae", "console": [], "id": "rfYh", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"19-appendixes\"\u003E19 Appendixes\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a2ea765a827b7e6ad901fa78cd869907", "console": [], "id": "YSLY", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"191-appendix-a-shell-variables\"\u003E19.1 Appendix A. Shell variables.\u003C/h3\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "163e29ea9686274f9134321b94b78545", "console": [], "id": "YPtP", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe interactive shell has a few \u201cset\u201d variables that you can customize to change some of the behavior of the shell. These are like environment variables. Type the \u003Ccode\u003E.set\u003C/code\u003E command to see the list of available variables and their current value.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe variables are:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003Eboxed (boolean): Whether we should draw a box around the output table.\u003C/li\u003E\n\u003Cli\u003Eexpand (boolean): If true, expand columns that render to lists on multiple rows.\u003C/li\u003E\n\u003Cli\u003Eformat (string): The output format. Supported formats: \u201ctext\u201d, \"csv\".\u003C/li\u003E\n\u003Cli\u003Enarrow (boolean): Whether the column header names are truncated to fit within the display width.\u003C/li\u003E\n\u003Cli\u003Enullvalue: '' ?? what does it do?\u003C/li\u003E\n\u003Cli\u003Enumberify: (boolean): If set to \u003Ccode\u003Etrue\u003C/code\u003E splits columns that contain monetary types (Amount, Position, Inventory) into separate plain-number columns \u2014 one per currency found in that column.\u003C/li\u003E\n\u003Cli\u003Epager (string): The name of the pager program to pipe multi-page output to when the output is larger than the screen. The initial value is copied from the PAGER environment variable.\u003C/li\u003E\n\u003Cli\u003Espaced (boolean): Whether to insert an empty line between every result row. This is only relevant because postings with multiple lots may require multiple lines to be rendered, and inserting an empty line helps delineate those as separate.\u003C/li\u003E\n\u003Cli\u003Eunicode: (boolean): ?? what does it do?\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003ETo change a variable from its default value, type \u003Ccode\u003E.set \u0026lt;variable-name\u0026gt; \u0026lt;new-value\u0026gt;\u003C/code\u003E. E.g.:\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003E.set numberify true\u003C/code\u003E\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.1", "script_metadata_hash": null}, "version": "1"},
            "runtimeConfig": null,
        };
    </script>
